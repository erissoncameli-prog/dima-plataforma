<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Plataforma de Gestão UNESCO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#1F4E2C;--verde-m:#2D6A4F;--verde-c:#52B788;
  --ouro-c:#F4D35E;
  --cinza-9:#111827;--cinza-7:#374151;--cinza-5:#6B7280;
  --cinza-3:#D1D5DB;--borda:#E5E7EB;--branco:#fff;
  --font-sans:'DM Sans',system-ui,sans-serif;
}
body{font-family:var(--font-sans);min-height:100vh;display:flex;overflow:hidden;}

/* ── PAINEL ESQUERDO ── */
.painel-esq{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;}

/* Slides */
.slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.4s ease-in-out;}
.slide.ativo{opacity:1;}

/* Overlay — mais suave no centro para a logo aparecer */
.slide-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to bottom, rgba(20,55,30,.85) 0%, rgba(20,55,30,.50) 35%, rgba(20,55,30,.50) 65%, rgba(10,35,18,.85) 100%);
}

/* Conteúdo sobre o slide */
.painel-conteudo{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  justify-content:space-between;
  height:100%;padding:28px 36px 28px 36px;
}

/* TOPO: logos Governo + SEMA — SEM filtro para preservar cores */
.logos-topo{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,.92);
  border-radius:10px;
  padding:8px 16px;
  width:fit-content;
  gap:12px;
}
.logo-gov{height:42px;width:auto;object-fit:contain;}
.logo-sep-topo{width:1px;height:36px;background:rgba(0,0,0,.15);flex-shrink:0;}
.logo-sema{height:30px;width:auto;object-fit:contain;}

/* CENTRO: logo Resiliência em destaque — caixa branca para garantir visibilidade */
.logo-central-wrap{
  display:flex;align-items:center;justify-content:center;
  flex:1;padding:16px 0;
}
.logo-central-box{
  background:rgba(255,255,255,.93);
  border-radius:16px;
  padding:20px 32px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
  max-width:460px;width:100%;
}
.logo-central{
  width:100%;max-width:400px;
  height:auto;
  object-fit:contain;
  display:block;
}

/* RODAPÉ: card projeto */
.projeto-info{
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:12px;padding:16px 22px;
}
.proj-badge{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ouro-c);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.proj-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--ouro-c);flex-shrink:0;animation:pulso 2s ease-in-out infinite;}
@keyframes pulso{0%,100%{opacity:1}50%{opacity:.4}}
.proj-nome{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px;line-height:1.4;}
.proj-sub{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:12px;}
.slide-dots{display:flex;gap:6px;align-items:center;}
.slide-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .35s;cursor:pointer;border:none;padding:0;}
.slide-dot.ativo{background:var(--ouro-c);width:22px;border-radius:4px;}
.foto-legenda{position:absolute;bottom:12px;right:14px;z-index:3;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.04em;}

/* ── PAINEL DIREITO ── */
.painel-dir{
  width:440px;flex-shrink:0;
  background:var(--branco);
  display:flex;align-items:center;justify-content:center;
  padding:36px 32px;
}
.login-box{width:100%;max-width:360px;}
.login-titulo{font-size:21px;font-weight:600;color:var(--cinza-9);margin-bottom:5px;}
.login-sub{font-size:13px;color:var(--cinza-5);margin-bottom:24px;}
.lang-row{display:flex;gap:5px;margin-bottom:20px;}
.lang-opt{flex:1;padding:6px;border-radius:6px;border:1px solid var(--borda);background:transparent;cursor:pointer;font-family:var(--font-sans);font-size:11px;font-weight:500;color:var(--cinza-5);transition:all .15s;}
.lang-opt:hover{border-color:var(--verde-c);color:var(--verde-m);}
.lang-opt.ativo{background:var(--verde-m);border-color:var(--verde-m);color:#fff;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--cinza-7);margin-bottom:5px;}
.form-input{width:100%;height:42px;border:1px solid var(--borda);border-radius:8px;padding:0 14px;font-family:var(--font-sans);font-size:14px;color:var(--cinza-9);transition:border-color .15s,box-shadow .15s;background:var(--branco);}
.form-input:focus{outline:none;border-color:var(--verde-c);box-shadow:0 0 0 3px rgba(82,183,136,.18);}
.form-input::placeholder{color:var(--cinza-3);}
.btn-login{width:100%;height:44px;margin-top:8px;background:var(--verde-m);color:#fff;border:none;border-radius:8px;font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-login:hover{background:var(--verde);}
.btn-login:active{transform:scale(.99);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}
.erro-msg{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;border-radius:6px;padding:10px 14px;font-size:12px;margin-bottom:14px;display:none;line-height:1.4;}

/* Logos parceiros — mais espaço, tamanhos maiores */
.parceiros-form{
  margin-top:24px;padding-top:18px;
  border-top:1px solid var(--borda);
}
.parceiros-label{font-size:10px;color:var(--cinza-5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:block;}
.parceiros-logos{
  display:flex;align-items:center;
  justify-content:flex-start;
  gap:16px;flex-wrap:wrap;
}
.logo-form{
  height:36px;width:auto;
  object-fit:contain;
  max-width:110px;
  opacity:.85;
  transition:opacity .2s;
}
.logo-form:hover{opacity:1;}
.logo-form.unesco{height:30px;max-width:100px;}
.logo-form.onu{height:34px;max-width:120px;}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;}

@media(max-width:900px){
  body{flex-direction:column;}
  .painel-esq{min-height:320px;flex:none;}
  .painel-conteudo{padding:18px 16px;}
  .logo-central-box{padding:14px 20px;}
  .painel-dir{width:100%;padding:24px 20px 32px;}
}
</style>
</head>
<body>

<!-- PAINEL ESQUERDO -->
<div class="painel-esq">
  <!-- Fotos via picsum.photos (sempre funciona, sem bloqueio) -->
  <div class="slide ativo" id="slide-0"
    style="background-image:url('https://picsum.photos/seed/amazon1/1400/900')"></div>
  <div class="slide" id="slide-1"
    style="background-image:url('https://picsum.photos/seed/forest2/1400/900')"></div>
  <div class="slide" id="slide-2"
    style="background-image:url('https://picsum.photos/seed/nature3/1400/900')"></div>
  <div class="slide" id="slide-3"
    style="background-image:url('https://picsum.photos/seed/river4/1400/900')"></div>

  <div class="slide-overlay"></div>

  <div class="painel-conteudo">

    <!-- TOPO: logos com fundo branco — cores preservadas -->
    <div>
      <div class="logos-topo">
        <img class="logo-gov"
          src="assets/3-vertical-verde-conjunto-1024x805.png"
          alt="Governo do Acre">
        <div class="logo-sep-topo"></div>
        <img class="logo-sema"
          src="assets/1695134345-1-horizontal-verde-solo.png"
          alt="SEMA — Secretaria de Estado do Meio Ambiente">
      </div>
    </div>

    <!-- CENTRO: logo Resiliência em caixa branca -->
    <div class="logo-central-wrap">
      <div class="logo-central-box">
        <img class="logo-central"
          src="assets/logo-resiliencia.png"
          alt="Resiliência Socioambiental — APAs Igarapé São Francisco e Lago do Amapá">
      </div>
    </div>

    <!-- RODAPÉ: card do projeto + dots -->
    <div class="projeto-info">
      <div class="proj-badge">
        <div class="proj-badge-dot"></div>
        Projeto 218BRA2001 · UNESCO/MPTF
      </div>
      <div class="proj-nome">Programa de Resiliência Socioambiental nas APAs Igarapé São Francisco e Lago do Amapá</div>
      <div class="proj-sub">Rio Branco, Acre — Fundo Multipartes das Nações Unidas</div>
      <div class="slide-dots" id="slide-dots"></div>
    </div>
  </div>

  <div class="foto-legenda" id="foto-legenda">Floresta Amazônica · Acre, Brasil</div>
</div>

<!-- PAINEL DIREITO -->
<div class="painel-dir">
  <div class="login-box">
    <div class="lang-row">
      <button class="lang-opt ativo" onclick="setLang('pt',this)">🇧🇷 PT</button>
      <button class="lang-opt" onclick="setLang('en',this)">🇺🇸 EN</button>
      <button class="lang-opt" onclick="setLang('es',this)">🇪🇸 ES</button>
    </div>
    <div class="login-titulo" id="lbl-titulo">Entrar na plataforma</div>
    <div class="login-sub" id="lbl-sub">Acesse com suas credenciais institucionais</div>
    <div class="erro-msg" id="erro-msg"></div>
    <div class="form-group">
      <label class="form-label" id="lbl-email">E-mail</label>
      <input class="form-input" type="email" id="inp-email" autocomplete="email" placeholder="seu@email.gov.br">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-senha">Senha</label>
      <input class="form-input" type="password" id="inp-senha" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login" onclick="fazerLogin()">
      <span id="btn-texto">Entrar</span>
      <div class="spinner-sm" id="spinner"></div>
    </button>

    <!-- Logos parceiros com mais espaço -->
    <div class="parceiros-form">
      <span class="parceiros-label">Realização e parceiros</span>
      <div class="parceiros-logos">
        <img class="logo-form"
          src="assets/1695134345-1-horizontal-verde-solo.png"
          alt="SEMA/AC">
        <img class="logo-form unesco"
          src="assets/UNESCO_logo_hor_blue_transparent_png.webp"
          alt="UNESCO">
        <img class="logo-form onu"
          src="assets/UNCT_Logo_RGB_Brazil_Portuguese_horiz_color.png"
          alt="Nações Unidas Brasil">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://wfymnmlinonvdqfucjya.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmeW1ubWxpbm9udmRxZnVjanlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzM1NzksImV4cCI6MjA5MDMwOTU3OX0.eC6T9VQ6OzF9mISEGy_pgbIbrOAnG4xp2z6WN-sCMt8';
const{createClient}=supabase;const db=createClient(SUPABASE_URL,SUPABASE_KEY);

// Galeria
const legendas=['Floresta Amazônica · Biodiversidade','Natureza · Recursos Naturais','Meio Ambiente · Conservação','Amazônia · Resiliência Socioambiental'];
let slideAtual=0;
const dotsEl=document.getElementById('slide-dots');
legendas.forEach((_,i)=>{const btn=document.createElement('button');btn.className='slide-dot'+(i===0?' ativo':'');btn.onclick=()=>irParaSlide(i);dotsEl.appendChild(btn);});
function irParaSlide(n){document.getElementById('slide-'+slideAtual).classList.remove('ativo');document.querySelectorAll('.slide-dot')[slideAtual].classList.remove('ativo');slideAtual=(n+legendas.length)%legendas.length;document.getElementById('slide-'+slideAtual).classList.add('ativo');document.querySelectorAll('.slide-dot')[slideAtual].classList.add('ativo');document.getElementById('foto-legenda').textContent=legendas[slideAtual];}
setInterval(()=>irParaSlide(slideAtual+1),5500);

// i18n
let lang=localStorage.getItem('dima_idioma')||'pt';
const textos={
  pt:{titulo:'Entrar na plataforma',sub:'Acesse com suas credenciais institucionais',email:'E-mail',senha:'Senha',btn:'Entrar',erro_cred:'E-mail ou senha incorretos.',erro_gen:'Erro ao conectar. Tente novamente.'},
  en:{titulo:'Sign in',sub:'Access with your institutional credentials',email:'Email',senha:'Password',btn:'Sign in',erro_cred:'Incorrect email or password.',erro_gen:'Connection error. Please try again.'},
  es:{titulo:'Iniciar sesión',sub:'Acceda con sus credenciales institucionales',email:'Correo electrónico',senha:'Contraseña',btn:'Entrar',erro_cred:'Correo o contraseña incorrectos.',erro_gen:'Error de conexión. Inténtelo de nuevo.'}
};
function setLang(l,el){lang=l;localStorage.setItem('dima_idioma',l);document.querySelectorAll('.lang-opt').forEach(b=>b.classList.remove('ativo'));el.classList.add('ativo');aplicarTextos();}
function aplicarTextos(){const t=textos[lang]||textos.pt;document.getElementById('lbl-titulo').textContent=t.titulo;document.getElementById('lbl-sub').textContent=t.sub;document.getElementById('lbl-email').textContent=t.email;document.getElementById('lbl-senha').textContent=t.senha;document.getElementById('btn-texto').textContent=t.btn;document.documentElement.lang=lang==='pt'?'pt-BR':lang;}

// Login
async function fazerLogin(){
  const email=document.getElementById('inp-email').value.trim();
  const senha=document.getElementById('inp-senha').value;
  const erroEl=document.getElementById('erro-msg');
  const btn=document.getElementById('btn-login');
  const spinner=document.getElementById('spinner');
  const btnTexto=document.getElementById('btn-texto');
  const t=textos[lang]||textos.pt;
  if(!email||!senha)return;
  erroEl.style.display='none';btn.disabled=true;spinner.style.display='inline-block';btnTexto.style.opacity='0.6';
  try{
    const{data,error}=await db.auth.signInWithPassword({email,password:senha});
    if(error){erroEl.textContent=error.message.includes('Invalid')?t.erro_cred:t.erro_gen;erroEl.style.display='block';return;}
    const{data:usuario}=await db.from('usuarios').select('idioma_pref').eq('id',data.user.id).single();
    if(usuario?.idioma_pref)localStorage.setItem('dima_idioma',usuario.idioma_pref);
    window.location.href='pages/dashboard.html';
  }catch(e){erroEl.textContent=t.erro_gen;erroEl.style.display='block';}
  finally{btn.disabled=false;spinner.style.display='none';btnTexto.style.opacity='1';}
}
document.getElementById('inp-senha').addEventListener('keydown',e=>{if(e.key==='Enter')fazerLogin();});
document.getElementById('inp-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-senha').focus();});
(async()=>{const{data:{session}}=await db.auth.getSession();if(session)window.location.href='pages/dashboard.html';aplicarTextos();})();
</script>
</body>
</html>
