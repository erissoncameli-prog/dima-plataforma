<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Contratos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<style>
.contrato-num{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--cinza-700);background:var(--cinza-100);padding:2px 8px;border-radius:4px;}

.status-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;}
.sb-vigente{background:#ECFDF5;color:#065F46}
.sb-encerrado{background:#F3F4F6;color:#374151}
.sb-suspenso{background:#FEF2F2;color:#991B1B}

.saldo-bar-wrap{margin:6px 0 2px}
.saldo-bar{height:8px;background:var(--cinza-100);border-radius:4px;overflow:hidden;display:flex;}
.sb-usado{height:100%;background:var(--aviso);transition:width .4s}
.sb-livre{height:100%;background:var(--verde-claro);transition:width .4s}
.sb-critico{background:var(--erro)!important}

.contrato-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);overflow:hidden;margin-bottom:10px;transition:all .15s;}
.contrato-card:hover{border-color:var(--verde-claro);box-shadow:0 2px 10px rgba(45,106,79,.08);}
.contrato-card-header{padding:14px 18px;border-bottom:1px solid var(--borda);display:flex;align-items:flex-start;gap:12px;}
.contrato-card-body{padding:14px 18px;}
.contrato-nome{font-size:13px;font-weight:600;color:var(--cinza-900);margin-bottom:3px;line-height:1.3;}
.contrato-meta{font-size:11px;color:var(--cinza-500);display:flex;gap:12px;flex-wrap:wrap;}

.vals-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.val-item{text-align:center;padding:10px;background:var(--cinza-50);border-radius:var(--raio);}
.val-lbl{font-size:9px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.val-num{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--cinza-900);}
.val-num.vermelho{color:var(--erro)}
.val-num.verde{color:var(--sucesso)}
.val-num.amber{color:var(--aviso)}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc-g::after{background:var(--verde-claro)}.sc-b::after{background:var(--azul-medio)}.sc-a::after{background:var(--aviso)}.sc-r::after{background:var(--erro)}
.stat-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:600;color:var(--cinza-900);letter-spacing:-.02em;}
.stat-sub{font-size:11px;color:var(--cinza-500);margin-top:3px;}

.tipo-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;background:var(--cinza-100);color:var(--cinza-600,#4B5563);}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#6B7280">
    <div style="text-align:center">
      <div style="width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2D6A4F;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      Carregando contratos...
    </div>
  </div>
</div>

<!-- MODAL CONTRATO -->
<div class="modal-overlay" id="modal-contrato">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="m-titulo">Contrato</div>
        <div style="font-size:11px;color:var(--cinza-500);margin-top:2px" id="m-sub"></div>
      </div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-footer" id="m-footer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
let todosContratos = [];
let atividades = [], fornecedores = [], tdrs = [];
let contratoEditando = null;

const STATUS_LABELS = { vigente:'Vigente', encerrado:'Encerrado', suspenso:'Suspenso' };
const TIPOS = ['Serviço','Consumo','Diária','Passagens','Consultoria','Obra'];

(async () => {
  const usuario = await carregarUsuario();
  if (!usuario) { window.location.href = '../index.html'; return; }

  if (!PODE.verFinanceiro()) {
    document.getElementById('app').innerHTML =
      gerarLayout('Contratos','contratos') +
      `<div class="alert alert-danger" style="max-width:500px">🔒 Acesso restrito ao perfil financeiro.</div>` +
      `</div></div></div>`;
    return;
  }

  document.getElementById('app').innerHTML =
    gerarLayout('Contratos','contratos') + `
    <div class="fade-in">
      <div class="stat-row" id="stats"></div>

      <div class="filter-bar">
        <input class="form-control" type="text" id="busca" style="width:240px"
          placeholder="Buscar número ou objeto..." oninput="filtrar()">
        <select class="form-control" id="fil-status" onchange="filtrar()" style="width:140px">
          <option value="">Todos os status</option>
          <option value="vigente">Vigente</option>
          <option value="encerrado">Encerrado</option>
          <option value="suspenso">Suspenso</option>
        </select>
        <select class="form-control" id="fil-tipo" onchange="filtrar()" style="width:140px">
          <option value="">Todos os tipos</option>
          ${TIPOS.map(t=>`<option value="${t}">${t}</option>`).join('')}
        </select>
        <span id="cont" style="font-size:12px;color:var(--cinza-500);margin-left:auto"></span>
        ${PODE.verFinanceiro()?`<button class="btn btn-primary btn-sm" onclick="abrirNovo()">+ Novo contrato</button>`:''}
      </div>

      <div id="lista"></div>
    </div>` + `</div></div></div>`;

  await carregar();
})();

async function carregar() {
  try {
    const [
      {data:contratos},
      {data:ativs},
      {data:forns},
      {data:tdrList}
    ] = await Promise.all([
      db.from('contratos').select(`
        *,
        fornecedores(id,nome,tipo,cpf_cnpj),
        atividades(id,codigo,nome_pt)
      `).order('criado_em',{ascending:false}),
      db.from('atividades').select('id,codigo,nome_pt').order('codigo'),
      db.from('fornecedores').select('id,nome,tipo').order('nome'),
      db.from('tdrs').select('id,numero,objeto_pt,atividade_id').order('numero')
    ]);

    todosContratos = contratos || [];
    atividades = ativs || [];
    fornecedores = forns || [];
    tdrs = tdrList || [];

    renderStats();
    filtrar();
  } catch(e) {
    console.error(e);
    toast('Erro ao carregar contratos.', 'error');
  }
}

function renderStats() {
  const vigentes = todosContratos.filter(c => c.status === 'vigente');
  const totalContratado = vigentes.reduce((s,c) => s + parseFloat(c.valor_total_brl||0), 0);
  const totalUtilizado = vigentes.reduce((s,c) => s + parseFloat(c.valor_utilizado_brl||0), 0);
  const totalSaldo = vigentes.reduce((s,c) => s + parseFloat(c.saldo_brl||0), 0);
  const criticos = vigentes.filter(c => {
    const pct = parseFloat(c.valor_total_brl||0) > 0
      ? parseFloat(c.valor_utilizado_brl||0) / parseFloat(c.valor_total_brl||0)
      : 0;
    return pct > 0.9;
  }).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card sc-g">
      <div class="stat-lbl">Contratos Vigentes</div>
      <div class="stat-val">${vigentes.length}</div>
      <div class="stat-sub">de ${todosContratos.length} totais</div>
    </div>
    <div class="stat-card sc-b">
      <div class="stat-lbl">Total Contratado</div>
      <div class="stat-val" style="font-size:15px">${fmtBRL(totalContratado)}</div>
      <div class="stat-sub">contratos vigentes</div>
    </div>
    <div class="stat-card sc-a">
      <div class="stat-lbl">Total Utilizado</div>
      <div class="stat-val" style="font-size:15px">${fmtBRL(totalUtilizado)}</div>
      <div class="stat-sub">${totalContratado>0?Math.round(totalUtilizado/totalContratado*100):0}% do contratado</div>
    </div>
    <div class="stat-card ${criticos>0?'sc-r':'sc-g'}">
      <div class="stat-lbl">Saldo Total</div>
      <div class="stat-val" style="font-size:15px;color:${totalSaldo<0?'var(--erro)':'var(--sucesso)'}">${fmtBRL(totalSaldo)}</div>
      <div class="stat-sub">${criticos} contrato(s) crítico(s)</div>
    </div>`;
}

function filtrar() {
  const b = document.getElementById('busca').value.toLowerCase();
  const s = document.getElementById('fil-status').value;
  const tp = document.getElementById('fil-tipo').value;

  const fil = todosContratos.filter(c => {
    const obj = (c.objeto_pt||'').toLowerCase();
    if (b && !c.numero.toLowerCase().includes(b) && !obj.includes(b) &&
        !(c.fornecedores?.nome||'').toLowerCase().includes(b)) return false;
    if (s && c.status !== s) return false;
    if (tp && c.tipo !== tp) return false;
    return true;
  });

  document.getElementById('cont').textContent = `${fil.length} de ${todosContratos.length} contratos`;

  const el = document.getElementById('lista');
  if (!fil.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">◪</div><div class="empty-state-msg">Nenhum contrato encontrado.</div></div>`;
    return;
  }

  el.innerHTML = fil.map(c => {
    const total = parseFloat(c.valor_total_brl||0);
    const usado = parseFloat(c.valor_utilizado_brl||0);
    const saldo = parseFloat(c.saldo_brl||0);
    const pct = total > 0 ? Math.min(usado/total*100, 100) : 0;
    const critico = pct > 90;
    const vencido = c.dt_fim && new Date(c.dt_fim) < new Date() && c.status === 'vigente';

    return `
    <div class="contrato-card">
      <div class="contrato-card-header">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
            <span class="contrato-num">${c.numero}</span>
            <span class="status-badge sb-${c.status}">${STATUS_LABELS[c.status]||c.status}</span>
            ${c.tipo?`<span class="tipo-tag">${c.tipo}</span>`:''}
            ${vencido?`<span class="badge" style="background:var(--erro)">⚠ Vencido</span>`:''}
            ${critico&&c.status==='vigente'?`<span class="badge" style="background:var(--aviso)">⚠ Saldo crítico</span>`:''}
          </div>
          <div class="contrato-nome">${c.objeto_pt||'—'}</div>
          <div class="contrato-meta">
            ${c.fornecedores?`<span>👤 ${c.fornecedores.nome} (${c.fornecedores.tipo})</span>`:''}
            ${c.atividades?`<span>📋 ${c.atividades.codigo}</span>`:''}
            ${c.dt_inicio?`<span>📅 ${fmtData(c.dt_inicio)} → ${c.dt_fim?fmtData(c.dt_fim):'—'}</span>`:''}
            ${c.notas_emitidas?`<span>🧾 ${c.notas_emitidas} nota(s)</span>`:''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0">
          ${PODE.verFinanceiro()?`<button class="btn btn-sm btn-secondary" onclick="abrirEditar('${c.id}')">✏️ Editar</button>`:''}
          <button class="btn btn-sm btn-secondary" onclick="abrirDetalhe('${c.id}')">Ver detalhes</button>
        </div>
      </div>
      <div class="contrato-card-body">
        <!-- Barra de saldo -->
        <div class="saldo-bar-wrap">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--cinza-500);margin-bottom:4px">
            <span>Utilizado: ${fmtBRL(usado)} (${Math.round(pct)}%)</span>
            <span style="color:${critico?'var(--erro)':saldo<0?'var(--erro)':'var(--cinza-500)'}">
              Saldo: ${fmtBRL(saldo)}
            </span>
          </div>
          <div class="saldo-bar">
            <div class="sb-usado ${critico?'sb-critico':''}" style="width:${pct}%"></div>
          </div>
        </div>
        <!-- Valores -->
        <div class="vals-grid" style="margin-top:10px">
          <div class="val-item">
            <div class="val-lbl">Valor Total</div>
            <div class="val-num">${fmtBRL(total)}</div>
          </div>
          <div class="val-item">
            <div class="val-lbl">Utilizado</div>
            <div class="val-num amber">${fmtBRL(usado)}</div>
          </div>
          <div class="val-item">
            <div class="val-lbl">Saldo</div>
            <div class="val-num ${saldo<0?'vermelho':saldo<total*0.1?'amber':'verde'}">${fmtBRL(saldo)}</div>
          </div>
          <div class="val-item">
            <div class="val-lbl">% Utilizado</div>
            <div class="val-num ${pct>90?'vermelho':pct>70?'amber':''}">${Math.round(pct)}%</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── ABRIR DETALHE ─────────────────────────────────────────────
async function abrirDetalhe(id) {
  const c = todosContratos.find(x => x.id === id);
  if (!c) return;
  contratoEditando = c;

  // Buscar lançamentos financeiros vinculados
  const { data: lançamentos } = await db
    .from('execucao_financeira')
    .select('*')
    .eq('contrato_id', id)
    .order('dt_vencimento', { ascending: false });

  const total = parseFloat(c.valor_total_brl||0);
  const usado = parseFloat(c.valor_utilizado_brl||0);
  const saldo = parseFloat(c.saldo_brl||0);
  const pct = total > 0 ? Math.min(usado/total*100,100) : 0;

  document.getElementById('m-titulo').textContent = c.numero;
  document.getElementById('m-sub').textContent =
    `${c.fornecedores?.nome||'—'} · ${c.tipo||'—'} · ${STATUS_LABELS[c.status]}`;

  document.getElementById('m-body').innerHTML = `
    <!-- Resumo financeiro -->
    <div class="grid-2" style="gap:12px;margin-bottom:16px">
      <div style="background:var(--cinza-50);border-radius:var(--raio-lg);padding:16px;border:1px solid var(--borda)">
        <div style="font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Valor Total</div>
        <div style="font-size:24px;font-weight:600;color:var(--cinza-900)">${fmtBRL(total)}</div>
        <div style="margin-top:8px">
          <div class="saldo-bar">
            <div class="sb-usado ${pct>90?'sb-critico':''}" style="width:${pct}%"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--cinza-500);margin-top:4px">
            <span>Utilizado ${Math.round(pct)}%</span>
            <span>Saldo ${Math.round(100-pct)}%</span>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${[
          ['Valor Contratado', fmtBRL(total), ''],
          ['Valor Utilizado', fmtBRL(usado), pct>90?'color:var(--erro)':'color:var(--aviso)'],
          ['Saldo Disponível', fmtBRL(saldo), saldo<0?'color:var(--erro)':'color:var(--sucesso)'],
          ['Notas Emitidas', `${c.notas_emitidas||0} nota(s)`, ''],
        ].map(([l,v,style])=>`
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--borda)">
            <span style="color:var(--cinza-500)">${l}</span>
            <span style="font-weight:600;font-family:var(--font-mono);${style}">${v}</span>
          </div>`).join('')}
      </div>
    </div>

    <!-- Informações do contrato -->
    <div style="background:var(--cinza-50);border-radius:var(--raio-lg);padding:14px 16px;border:1px solid var(--borda);margin-bottom:16px">
      <div style="font-size:11px;font-weight:600;color:var(--cinza-700);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Informações</div>
      <div class="grid-2" style="gap:8px">
        ${[
          ['Fornecedor', c.fornecedores?.nome||'—'],
          ['Tipo', c.tipo||'—'],
          ['Atividade', c.atividades?.codigo||'—'],
          ['Elemento Despesa', c.elemento_despesa||'—'],
          ['Início', c.dt_inicio?fmtData(c.dt_inicio):'—'],
          ['Término', c.dt_fim?fmtData(c.dt_fim):'—'],
        ].map(([l,v])=>`
          <div style="font-size:12px;padding:4px 0">
            <span style="color:var(--cinza-500)">${l}:</span>
            <span style="font-weight:500;color:var(--cinza-900);margin-left:6px">${v}</span>
          </div>`).join('')}
      </div>
      ${c.objeto_pt?`<div style="margin-top:10px;font-size:12px;color:var(--cinza-700);line-height:1.5;padding-top:8px;border-top:1px solid var(--borda)"><strong>Objeto:</strong> ${c.objeto_pt}</div>`:''}
    </div>

    <!-- Lançamentos financeiros vinculados -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--cinza-700);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">
        Lançamentos vinculados (${(lançamentos||[]).length})
      </div>
      ${(lançamentos||[]).length ?
        `<div class="table-wrap"><table>
          <thead><tr>
            <th>Descrição</th><th>NF</th><th>Vencimento</th>
            <th style="text-align:right">Valor R$</th><th>Situação</th>
          </tr></thead>
          <tbody>
            ${lançamentos.map(l=>`<tr>
              <td style="font-size:12px">${l.descricao||'—'}</td>
              <td class="mono">${l.numero_nf||'—'}</td>
              <td style="font-size:12px">${fmtData(l.dt_vencimento)}</td>
              <td style="text-align:right;font-family:var(--font-mono);font-size:12px">${fmtBRL(l.valor_brl)}</td>
              <td>${badgeSituacao(l.situacao)}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>` :
        `<div class="empty-state" style="padding:20px"><div class="empty-state-msg">Nenhum lançamento vinculado.</div></div>`}
    </div>
  `;

  document.getElementById('m-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="fecharModal()">Fechar</button>
    ${PODE.verFinanceiro()?`<button class="btn btn-primary" onclick="abrirEditar('${c.id}')">✏️ Editar contrato</button>`:''}`;

  document.getElementById('modal-contrato').classList.add('aberto');
}

// ── FORMULÁRIO NOVO/EDITAR ────────────────────────────────────
function abrirNovo() {
  contratoEditando = null;
  document.getElementById('m-titulo').textContent = 'Novo Contrato';
  document.getElementById('m-sub').textContent = '';
  renderForm(null);
  document.getElementById('m-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvar()">Criar contrato</button>`;
  document.getElementById('modal-contrato').classList.add('aberto');
}

function abrirEditar(id) {
  contratoEditando = todosContratos.find(c => c.id === id);
  if (!contratoEditando) return;
  document.getElementById('m-titulo').textContent = `Editar — ${contratoEditando.numero}`;
  document.getElementById('m-sub').textContent = contratoEditando.fornecedores?.nome||'';
  renderForm(contratoEditando);
  document.getElementById('m-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvar()">Salvar alterações</button>`;
  document.getElementById('modal-contrato').classList.add('aberto');
}

function renderForm(c) {
  document.getElementById('m-body').innerHTML = `
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Número do contrato <span class="obrig">*</span></label>
        <input class="form-control" id="f-num" type="text" value="${c?.numero||''}"
          placeholder="Ex: CT-2026-001" style="font-family:var(--font-mono)">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-control" id="f-tipo">
          <option value="">Selecione...</option>
          ${TIPOS.map(t=>`<option value="${t}" ${c?.tipo===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Fornecedor <span class="obrig">*</span></label>
      <select class="form-control" id="f-forn">
        <option value="">Selecione o fornecedor...</option>
        ${fornecedores.map(f=>`<option value="${f.id}" ${c?.fornecedor_id===f.id?'selected':''}>
          ${f.nome} (${f.tipo})
        </option>`).join('')}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Atividade vinculada</label>
      <select class="form-control" id="f-ativ">
        <option value="">Selecione a atividade...</option>
        ${atividades.map(a=>`<option value="${a.id}" ${c?.atividade_id===a.id?'selected':''}>
          ${a.codigo} — ${a.nome_pt?.substring(0,55)}
        </option>`).join('')}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Objeto do contrato</label>
      <textarea class="form-control" id="f-objeto" rows="2">${c?.objeto_pt||''}</textarea>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Valor total R$ <span class="obrig">*</span></label>
        <input class="form-control" id="f-total" type="number" step="0.01"
          value="${c?.valor_total_brl||''}" placeholder="0,00">
      </div>
      <div class="form-group">
        <label class="form-label">Valor utilizado R$</label>
        <input class="form-control" id="f-usado" type="number" step="0.01"
          value="${c?.valor_utilizado_brl||0}" placeholder="0,00">
        <div class="form-hint">Atualizado automaticamente pelos lançamentos financeiros.</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Data de início</label>
        <input class="form-control" id="f-inicio" type="date" value="${c?.dt_inicio||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Data de término</label>
        <input class="form-control" id="f-fim" type="date" value="${c?.dt_fim||''}">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Elemento de despesa</label>
        <input class="form-control" id="f-elemento" type="text"
          value="${c?.elemento_despesa||''}" placeholder="Ex: 33903900">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-control" id="f-status">
          ${['vigente','encerrado','suspenso'].map(s=>
            `<option value="${s}" ${(c?.status||'vigente')===s?'selected':''}>${STATUS_LABELS[s]}</option>`
          ).join('')}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notas emitidas</label>
      <input class="form-control" id="f-notas" type="number" min="0"
        value="${c?.notas_emitidas||0}" style="width:120px">
    </div>
  `;
}

async function salvar() {
  const num = document.getElementById('f-num').value.trim();
  const fornId = document.getElementById('f-forn').value;
  const total = parseFloat(document.getElementById('f-total').value) || 0;

  if (!num || !fornId || !total) {
    toast('Preencha número, fornecedor e valor total.', 'error'); return;
  }

  const dados = {
    numero: num,
    fornecedor_id: fornId||null,
    atividade_id: document.getElementById('f-ativ').value||null,
    objeto_pt: document.getElementById('f-objeto').value.trim()||null,
    tipo: document.getElementById('f-tipo').value||null,
    valor_total_brl: total,
    valor_utilizado_brl: parseFloat(document.getElementById('f-usado').value)||0,
    dt_inicio: document.getElementById('f-inicio').value||null,
    dt_fim: document.getElementById('f-fim').value||null,
    elemento_despesa: document.getElementById('f-elemento').value.trim()||null,
    status: document.getElementById('f-status').value,
    notas_emitidas: parseInt(document.getElementById('f-notas').value)||0,
  };

  try {
    if (!contratoEditando) {
      const { data, error } = await db.from('contratos')
        .insert({ ...dados, criado_por: appState.usuario.id })
        .select(`*,fornecedores(id,nome,tipo),atividades(id,codigo,nome_pt)`)
        .single();
      if (error) throw error;
      todosContratos.unshift(data);
      toast(`Contrato ${data.numero} criado!`, 'success');
    } else {
      const { error } = await db.from('contratos')
        .update(dados).eq('id', contratoEditando.id);
      if (error) throw error;
      // Buscar fornecedor/atividade para atualizar local
      const forn = fornecedores.find(f=>f.id===dados.fornecedor_id);
      const ativ = atividades.find(a=>a.id===dados.atividade_id);
      Object.assign(contratoEditando, dados, {
        fornecedores: forn?{id:forn.id,nome:forn.nome,tipo:forn.tipo}:null,
        atividades: ativ?{id:ativ.id,codigo:ativ.codigo,nome_pt:ativ.nome_pt}:null,
        saldo_brl: dados.valor_total_brl - dados.valor_utilizado_brl
      });
      toast('Contrato atualizado!', 'success');
    }
    fecharModal();
    renderStats();
    filtrar();
  } catch(e) {
    if (e.code === '23505') toast('Número de contrato já cadastrado.', 'error');
    else toast('Erro ao salvar: ' + (e.message||''), 'error');
  }
}

function fecharModal() {
  document.getElementById('modal-contrato').classList.remove('aberto');
  contratoEditando = null;
}

document.addEventListener('keydown', e => { if(e.key==='Escape') fecharModal(); });
</script>
</body>
</html>
