<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Visão Geral</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<link href="../css/sidebar.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
.dash-tabs{display:flex;gap:0;border-bottom:1px solid var(--borda);background:var(--branco);position:sticky;top:58px;z-index:40;overflow-x:auto;}
.dash-tab{padding:10px 18px;font-size:12px;font-weight:500;color:var(--cinza-500);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);white-space:nowrap;transition:all .15s;}
.dash-tab:hover{color:var(--cinza-700);}
.dash-tab.ativo{color:var(--verde-medio);border-bottom-color:var(--verde-medio);font-weight:600;}
.dash-pane{display:none;padding:24px;}
.dash-pane.ativo{display:block;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-verde::after{background:var(--verde-claro);}
.kpi-ouro::after{background:var(--ouro);}
.kpi-azul::after{background:var(--azul-medio);}
.kpi-verm::after{background:var(--erro);}
.kpi-roxo::after{background:#7C3AED;}
.kpi-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.kpi-val{font-size:22px;font-weight:600;color:var(--cinza-900);letter-spacing:-.02em;line-height:1.1;}
.kpi-sub{font-size:11px;color:var(--cinza-500);margin-top:4px;}
.kpi-bar{height:3px;background:var(--cinza-100);border-radius:2px;margin-top:8px;overflow:hidden;}
.kpi-fill{height:100%;border-radius:2px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;}
.ch-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px;}
.ch-tit{font-size:12px;font-weight:600;color:var(--cinza-700);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.bh{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bh-l{font-size:11px;color:var(--cinza-700);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bh-t{flex:1;height:8px;background:var(--cinza-100);border-radius:2px;overflow:hidden;}
.bh-f{height:100%;border-radius:2px;}
.bh-v{font-size:10px;color:var(--cinza-500);width:60px;text-align:right;font-family:var(--font-mono);}
.sb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sb-lbl{font-size:11px;color:var(--cinza-700);width:80px;flex-shrink:0;}
.sb-bar{flex:1;display:flex;height:18px;border-radius:3px;overflow:hidden;background:var(--cinza-100);}
.sb-seg{display:flex;align-items:center;justify-content:center;}
.sb-seg span{font-size:9px;color:#fff;font-weight:500;white-space:nowrap;padding:0 3px;overflow:hidden;}
.sb-tot{font-size:10px;color:var(--cinza-500);width:55px;text-align:right;font-family:var(--font-mono);flex-shrink:0;}
.leg{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--cinza-600,#4B5563);}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.ind-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--borda);}
.ind-row:last-child{border-bottom:none;}
.ind-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ind-nome{font-size:11px;color:var(--cinza-900);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ind-meta{font-size:10px;color:var(--cinza-400,#9CA3AF);width:60px;text-align:center;flex-shrink:0;}
.ind-prog{width:80px;flex-shrink:0;}
.ind-bar{height:5px;background:var(--cinza-100);border-radius:2px;overflow:hidden;margin-bottom:2px;}
.ind-fill{height:100%;border-radius:2px;}
.ind-pct{font-size:9px;color:var(--cinza-500);text-align:right;}
.ind-val{font-size:11px;font-weight:600;width:40px;text-align:right;flex-shrink:0;font-family:var(--font-mono);}
.al-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--borda);align-items:flex-start;}
.al-item:last-child{border-bottom:none;}
.al-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.al-body{flex:1;}
.al-tit{font-size:12px;font-weight:500;color:var(--cinza-900);}
.al-desc{font-size:11px;color:var(--cinza-500);margin-top:2px;}
.al-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;flex-shrink:0;}
.gauge-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px;text-align:center;}
.gauge-n{font-size:26px;font-weight:600;line-height:1;}
.gauge-l{font-size:11px;color:var(--cinza-500);margin-top:4px;}
.fin-tbl{width:100%;font-size:12px;border-collapse:collapse;}
.fin-tbl th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--borda);background:var(--cinza-50);text-align:left;white-space:nowrap;}
.fin-tbl td{padding:9px 10px;border-bottom:1px solid var(--borda);color:var(--cinza-700);vertical-align:middle;}
.fin-tbl tr:last-child td{border-bottom:none;}
.fin-tbl tr:hover td{background:var(--cinza-50);}
.sit-pago{background:#DCFCE7;color:#166534;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;}
.exec-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.exec-card{background:var(--cinza-50);border-top:3px solid var(--borda);border-radius:var(--raio);padding:10px 12px;text-align:center;}
.exec-val{font-size:16px;font-weight:600;color:var(--cinza-900);}
.exec-lbl{font-size:9px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
// Tudo dentro de uma IIFE para evitar conflito com config.js
(function(){

// ── Utilitários locais (sem conflito com config.js) ──────
var D_fmtBRL = function(v){ return 'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); };
var D_fmtPct = function(v){ return Math.round(parseFloat(v||0))+'%'; };
var D_fmtData = function(d){ return d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—'; };
var D_pct = function(v,t){ return t>0 ? Math.min(parseFloat(v||0)/parseFloat(t)*100,100) : 0; };

// ── Estado global ────────────────────────────────────────
var D = {};

// ── Init ─────────────────────────────────────────────────
(async function init(){
  var u = await carregarUsuario();
  if(!u){ window.location.href='../index.html'; return; }

  document.getElementById('app').innerHTML = gerarLayout(
    'Bem-vindo(a), '+u.nome_completo.split(' ')[0]+'!', 'dashboard'
  ) + `
    <div class="dash-tabs">
      <button class="dash-tab ativo" onclick="mudarAba('financiadores',this)">Financiadores</button>
      <button class="dash-tab" onclick="mudarAba('operacional',this)">Gestão operacional</button>
      <button class="dash-tab" onclick="mudarAba('resultados',this)">Resultados × Financeiro</button>
      <button class="dash-tab" onclick="mudarAba('execucao',this)">Execução financeira</button>
      <button class="dash-tab" onclick="mudarAba('alertas',this)">Alertas</button>
    </div>
    <div id="pane-financiadores" class="dash-pane ativo"></div>
    <div id="pane-operacional" class="dash-pane"></div>
    <div id="pane-resultados" class="dash-pane"></div>
    <div id="pane-execucao" class="dash-pane"></div>
    <div id="pane-alertas" class="dash-pane"></div>
  ` + fecharLayout();

  await carregarDados();
})();

// ── Trocar aba ────────────────────────────────────────────
window.mudarAba = function(id, btn){
  document.querySelectorAll('.dash-tab').forEach(function(b){b.classList.remove('ativo');});
  document.querySelectorAll('.dash-pane').forEach(function(p){p.classList.remove('ativo');});
  btn.classList.add('ativo');
  document.getElementById('pane-'+id).classList.add('ativo');
};

// ── Carregar dados ────────────────────────────────────────
async function carregarDados(){
  var res = await Promise.all([
    db.from('atividades').select('*'),
    db.from('tdrs').select('*'),
    db.from('resultados').select('*'),
    db.from('vw_saldo_atividade').select('*'),
    db.from('indicadores').select('*,resultados(codigo,nome_pt)').eq('ativo',true),
    db.from('execucao_financeira').select('*,atividades(codigo,nome_pt),fornecedores(nome)'),
    db.from('contratos').select('*'),
  ]);
  D.atv   = res[0].data||[];
  D.tdrs  = res[1].data||[];
  D.res   = res[2].data||[];
  D.sal   = res[3].data||[];
  D.ind   = res[4].data||[];
  D.lanc  = res[5].data||[];
  D.contr = res[6].data||[];

  renderFinanciadores();
  renderOperacional();
  renderResultados();
  renderExecucao();
  renderAlertas();
}

// ── Helpers ───────────────────────────────────────────────
function kpiBar(val, cor){
  return '<div class="kpi-bar"><div class="kpi-fill" style="width:'+Math.min(val,100)+'%;background:'+cor+'"></div></div>';
}
function bh(lbl, pct, cor, val){
  return '<div class="bh"><div class="bh-l" title="'+lbl+'">'+lbl+'</div><div class="bh-t"><div class="bh-f" style="width:'+Math.min(pct,100)+'%;background:'+cor+'"></div></div><div class="bh-v">'+val+'</div></div>';
}
function resMapBuild(){
  var m={};
  D.sal.forEach(function(s){
    var a=D.atv.find(function(x){return x.id===s.id;});
    if(!a)return;
    var r=D.res.find(function(x){return x.id===a.resultado_id;});
    if(!r)return;
    if(!m[r.codigo])m[r.codigo]={orc:0,comp:0,pago:0,nome:r.nome_pt,ind:[]};
    m[r.codigo].orc+=parseFloat(s.orcamento_usd||0);
    m[r.codigo].comp+=parseFloat(s.comprometido_usd||0);
    m[r.codigo].pago+=parseFloat(s.pago_usd||0);
  });
  D.ind.forEach(function(i){
    var k=i.resultados&&i.resultados.codigo||'Sem resultado';
    if(m[k])m[k].ind.push(i);
  });
  return m;
}

// ─────────────────────────────────────────────────────────
// GUIA 1 — FINANCIADORES
// ─────────────────────────────────────────────────────────
function renderFinanciadores(){
  var orc = D.atv.reduce(function(s,a){return s+parseFloat(a.orcamento_usd||0);},0);
  var comp = D.sal.reduce(function(s,a){return s+parseFloat(a.comprometido_usd||0);},0);
  var pago = D.lanc.filter(function(l){return l.situacao==='pago';}).reduce(function(s,l){return s+parseFloat(l.valor_usd||0);},0);
  var taprov = D.tdrs.filter(function(t){return t.status==='aprovado';}).length;
  var metasProg = D.ind.filter(function(i){return parseFloat(i.valor_atingido||0)>0;}).length;
  var pExec = orc>0?pago/orc*100:0;
  var pComp = orc>0?comp/orc*100:0;
  var pTdr = D.tdrs.length>0?taprov/D.tdrs.length*100:0;
  var rm = resMapBuild();
  var rkList = Object.keys(rm);
  var maxOrc = Math.max.apply(null,rkList.map(function(k){return rm[k].orc;}).concat([1]));

  var html = '<div class="kpi-row">';
  html += '<div class="kpi-card kpi-verde"><div class="kpi-lbl">Taxa de execução</div><div class="kpi-val" style="color:var(--sucesso)">'+pExec.toFixed(1)+'%</div><div class="kpi-sub">'+fmtUSD(pago)+' pagos de '+fmtUSD(orc)+'</div>'+kpiBar(pExec,'var(--sucesso)')+'</div>';
  html += '<div class="kpi-card kpi-ouro"><div class="kpi-lbl">Comprometido</div><div class="kpi-val" style="color:var(--ouro)">'+D_fmtPct(pComp)+'</div><div class="kpi-sub">'+fmtUSD(comp)+' em TDRs ativos</div>'+kpiBar(pComp,'var(--ouro)')+'</div>';
  html += '<div class="kpi-card kpi-azul"><div class="kpi-lbl">TDRs aprovados</div><div class="kpi-val" style="color:var(--azul-medio)">'+taprov+' / '+D.tdrs.length+'</div><div class="kpi-sub">'+D_fmtPct(pTdr)+' do total</div>'+kpiBar(pTdr,'var(--azul-medio)')+'</div>';
  html += '<div class="kpi-card kpi-roxo"><div class="kpi-lbl">Metas com avanço</div><div class="kpi-val" style="color:#7C3AED">'+metasProg+' / '+D.ind.length+'</div><div class="kpi-sub">indicadores em progresso</div>'+kpiBar(D_pct(metasProg,D.ind.length),'#7C3AED')+'</div>';
  html += '</div>';

  // Orçamento por resultado
  html += '<div class="g2">';
  html += '<div class="ch-card"><div class="ch-tit">Orçamento por resultado (U$)</div>';
  rkList.forEach(function(k){
    html += bh(k, rm[k].orc/maxOrc*100, '#185FA5', fmtUSD(rm[k].orc));
  });
  html += '</div>';

  // Status TDRs
  html += '<div class="ch-card"><div class="ch-tit">Status dos TDRs</div>';
  var stMap={rascunho:0,revisao_interna:0,aprovado:0,enviado_unesco:0};
  D.tdrs.forEach(function(t){if(stMap[t.status]!==undefined)stMap[t.status]++;});
  var stCor={rascunho:'#D1D5DB',revisao_interna:'#93C5FD',aprovado:'#34D399',enviado_unesco:'#6EE7B7'};
  var stNm={rascunho:'Rascunho',revisao_interna:'Revisão interna',aprovado:'Aprovado',enviado_unesco:'Enviado UNESCO'};
  var maxSt=Math.max.apply(null,Object.values(stMap).concat([1]));
  Object.keys(stMap).forEach(function(k){
    if(stMap[k]>0) html += bh(stNm[k], stMap[k]/maxSt*100, stCor[k], stMap[k]+' TDRs');
  });
  html += '</div></div>';

  // Stacked bar por resultado
  html += '<div class="ch-card"><div class="ch-tit">Execução por resultado — pago × comprometido × livre</div>';
  html += '<div class="leg"><div class="leg-i"><div class="leg-sq" style="background:#059669"></div>Pago</div><div class="leg-i"><div class="leg-sq" style="background:#D97706"></div>Comprometido</div><div class="leg-i"><div class="leg-sq" style="background:var(--cinza-100)"></div>Livre</div></div>';
  rkList.forEach(function(k){
    var r=rm[k];
    var tot=Math.max(r.orc,r.comp,1);
    var pP=r.pago/tot*100, pC=(r.comp-r.pago)/tot*100, pL=Math.max(0,100-pP-pC);
    html += '<div class="sb-row"><div class="sb-lbl">'+k+'</div><div class="sb-bar">';
    if(pP>1) html += '<div class="sb-seg" style="width:'+pP+'%;background:#059669"><span>'+fmtUSD(r.pago)+'</span></div>';
    if(pC>1) html += '<div class="sb-seg" style="width:'+pC+'%;background:#D97706"><span>'+fmtUSD(r.comp)+'</span></div>';
    if(pL>1) html += '<div class="sb-seg" style="width:'+pL+'%;background:var(--cinza-100)"><span style="color:var(--cinza-500)">'+fmtUSD(r.orc-r.comp)+'</span></div>';
    html += '</div><div class="sb-tot">'+fmtUSD(r.orc)+'</div></div>';
  });
  html += '</div>';

  document.getElementById('pane-financiadores').innerHTML = html;
}

// ─────────────────────────────────────────────────────────
// GUIA 2 — OPERACIONAL
// ─────────────────────────────────────────────────────────
function renderOperacional(){
  var orc = D.atv.reduce(function(s,a){return s+parseFloat(a.orcamento_usd||0);},0);
  var comp = D.sal.reduce(function(s,a){return s+parseFloat(a.comprometido_usd||0);},0);
  var pago = D.lanc.filter(function(l){return l.situacao==='pago';}).reduce(function(s,l){return s+parseFloat(l.valor_usd||0);},0);
  var taprov = D.tdrs.filter(function(t){return t.status==='aprovado';}).length;
  var fases={A_INICIAR:0,ELABORACAO:0,LICITACAO:0,ELABORADO:0,CONTRATADO:0,CONCLUIDO:0};
  D.atv.forEach(function(a){if(fases[a.fase]!==undefined)fases[a.fase]++;});
  var maxFase=Math.max.apply(null,Object.values(fases).concat([1]));
  var faseCor={A_INICIAR:'#D1D5DB',ELABORACAO:'#93C5FD',LICITACAO:'#FCD34D',ELABORADO:'#6EE7B7',CONTRATADO:'#34D399',CONCLUIDO:'#059669'};
  var faseNm={A_INICIAR:'A Iniciar',ELABORACAO:'Elaboração',LICITACAO:'Licitação',ELABORADO:'Elaborado',CONTRATADO:'Contratado',CONCLUIDO:'Concluído'};

  var html = '<div class="g3">';
  html += '<div class="gauge-card" style="border-top:3px solid var(--sucesso)"><div class="gauge-n" style="color:var(--sucesso)">'+(orc>0?pago/orc*100:0).toFixed(1)+'%</div><div class="gauge-l">Execução paga</div><div style="font-size:10px;color:var(--cinza-400,#9CA3AF);margin-top:2px">'+fmtUSD(pago)+'</div></div>';
  html += '<div class="gauge-card" style="border-top:3px solid var(--ouro)"><div class="gauge-n" style="color:var(--ouro)">'+(orc>0?comp/orc*100:0).toFixed(1)+'%</div><div class="gauge-l">Comprometido</div><div style="font-size:10px;color:var(--cinza-400,#9CA3AF);margin-top:2px">'+fmtUSD(comp)+'</div></div>';
  html += '<div class="gauge-card" style="border-top:3px solid var(--azul-medio)"><div class="gauge-n" style="color:var(--azul-medio)">'+(D.tdrs.length>0?Math.round(taprov/D.tdrs.length*100):0)+'%</div><div class="gauge-l">TDRs aprovados</div><div style="font-size:10px;color:var(--cinza-400,#9CA3AF);margin-top:2px">'+taprov+' de '+D.tdrs.length+'</div></div>';
  html += '</div><div class="g2">';

  // Pipeline fases
  html += '<div class="ch-card"><div class="ch-tit">Pipeline de contratação</div>';
  Object.keys(fases).forEach(function(k){
    html += bh(faseNm[k], fases[k]/maxFase*100, faseCor[k], fases[k]+' ativ.');
  });
  html += '</div>';

  // Top comprometidas
  var topAtv = D.sal.filter(function(s){return parseFloat(s.comprometido_usd||0)>0;})
    .sort(function(a,b){return parseFloat(b.comprometido_usd)-parseFloat(a.comprometido_usd);}).slice(0,8);
  var maxComp = Math.max.apply(null,topAtv.map(function(s){return parseFloat(s.comprometido_usd||0);}).concat([1]));
  html += '<div class="ch-card"><div class="ch-tit">Top atividades — comprometimento</div>';
  topAtv.forEach(function(s){
    var p = parseFloat(s.comprometido_usd||0)/maxComp*100;
    var po = parseFloat(s.pct_comprometido||0);
    var cor = po>100?'var(--erro)':po>95?'var(--aviso)':'var(--azul-medio)';
    html += bh(s.codigo, p, cor, fmtUSD(s.comprometido_usd)+' ('+Math.round(po)+'%)');
  });
  html += '</div></div>';

  document.getElementById('pane-operacional').innerHTML = html;
}

// ─────────────────────────────────────────────────────────
// GUIA 3 — RESULTADOS × FINANCEIRO
// ─────────────────────────────────────────────────────────
function renderResultados(){
  var rm = resMapBuild();
  var rkList = Object.keys(rm);
  var pago = D.lanc.filter(function(l){return l.situacao==='pago';}).reduce(function(s,l){return s+parseFloat(l.valor_usd||0);},0);
  var orc = D.atv.reduce(function(s,a){return s+parseFloat(a.orcamento_usd||0);},0);
  var metasProg = D.ind.filter(function(i){return parseFloat(i.valor_atingido||0)>0;}).length;

  var html = '<div class="kpi-row">';
  html += '<div class="kpi-card kpi-verde"><div class="kpi-lbl">Metas com progresso</div><div class="kpi-val" style="color:var(--sucesso)">'+metasProg+' / '+D.ind.length+'</div><div class="kpi-sub">indicadores com valor > 0</div>'+kpiBar(D_pct(metasProg,D.ind.length),'var(--sucesso)')+'</div>';
  html += '<div class="kpi-card kpi-ouro"><div class="kpi-lbl">Financeiro vs metas</div><div class="kpi-val" style="color:var(--ouro)">'+(orc>0?pago/orc*100:0).toFixed(1)+'%</div><div class="kpi-sub">pago vs. orçamento total</div>'+kpiBar(orc>0?pago/orc*100:0,'var(--ouro)')+'</div>';
  html += '<div class="kpi-card kpi-verm"><div class="kpi-lbl">Indicadores em risco</div><div class="kpi-val" style="color:var(--erro)">'+(D.ind.length-metasProg)+'</div><div class="kpi-sub">sem avanço registrado</div>'+kpiBar(D_pct(D.ind.length-metasProg,D.ind.length),'var(--erro)')+'</div>';
  html += '<div class="kpi-card kpi-azul"><div class="kpi-lbl">Resultados ativos</div><div class="kpi-val" style="color:var(--azul-medio)">'+rkList.length+'</div><div class="kpi-sub">com atividades cadastradas</div></div>';
  html += '</div>';

  rkList.forEach(function(k){
    var r = rm[k];
    var tot = Math.max(r.orc,1);
    var pP = r.pago/tot*100, pC = (r.comp-r.pago)/tot*100;
    html += '<div class="ch-card" style="margin-bottom:14px">';
    html += '<div class="ch-tit"><span>'+k+' — '+r.nome.substring(0,55)+'</span><div style="display:flex;gap:8px;font-size:10px"><span style="color:var(--sucesso)">'+fmtUSD(r.pago)+' pago</span><span style="color:var(--ouro)">'+fmtUSD(r.comp)+' comprom.</span><span style="color:var(--cinza-500)">'+fmtUSD(r.orc)+' orçamento</span></div></div>';
    // Barra financeira
    html += '<div class="sb-row" style="margin-bottom:12px"><div class="sb-lbl" style="font-size:10px">Financeiro</div><div class="sb-bar" style="height:12px">';
    if(pP>0.5) html += '<div class="sb-seg" style="width:'+Math.min(pP,100)+'%;background:#059669"><span>'+D_fmtPct(pP)+'</span></div>';
    if(pC>0.5) html += '<div class="sb-seg" style="width:'+Math.min(pC,100)+'%;background:#D97706"><span>'+fmtUSD(r.comp-r.pago)+'</span></div>';
    html += '<div class="sb-seg" style="flex:1;background:var(--cinza-100)"></div></div></div>';
    // Indicadores
    r.ind.slice(0,5).forEach(function(i){
      var meta = parseFloat(i.meta_numerica||0);
      var atual = parseFloat(i.valor_atingido||0);
      var p = meta>0?Math.min(atual/meta*100,100):0;
      var cor = p>=75?'var(--sucesso)':p>=30?'var(--aviso)':'var(--erro)';
      html += '<div class="ind-row"><div class="ind-dot" style="background:'+cor+'"></div><div class="ind-nome">'+i.nome_pt+'</div><div class="ind-meta">meta '+meta+' '+(i.unidade_pt||'')+'</div><div class="ind-val" style="color:'+cor+'">'+atual+'</div><div class="ind-prog"><div class="ind-bar"><div class="ind-fill" style="width:'+p+'%;background:'+cor+'"></div></div><div class="ind-pct">'+Math.round(p)+'%</div></div></div>';
    });
    if(r.ind.length>5) html += '<div style="font-size:10px;color:var(--cinza-500);text-align:center;margin-top:6px">+ '+(r.ind.length-5)+' indicadores</div>';
    html += '</div>';
  });

  if(rkList.length===0) html += '<div class="empty-state"><div class="empty-state-icon">◎</div><div class="empty-state-msg">Nenhum resultado com atividades cadastradas.</div></div>';
  document.getElementById('pane-resultados').innerHTML = html;
}

// ─────────────────────────────────────────────────────────
// GUIA 4 — EXECUÇÃO FINANCEIRA
// ─────────────────────────────────────────────────────────
function renderExecucao(){
  var pago = D.lanc.filter(function(l){return l.situacao==='pago';}).reduce(function(s,l){return s+parseFloat(l.valor_usd||0);},0);
  var pagoBRL = D.lanc.filter(function(l){return l.situacao==='pago';}).reduce(function(s,l){return s+parseFloat(l.valor_brl||0);},0);
  var orc = D.atv.reduce(function(s,a){return s+parseFloat(a.orcamento_usd||0);},0);
  var comp = D.sal.reduce(function(s,a){return s+parseFloat(a.comprometido_usd||0);},0);
  var saldoLivre = orc-comp;
  var extrap = D.sal.filter(function(s){return parseFloat(s.saldo_livre_usd||0)<0;});

  var html = '<div class="exec-grid">';
  html += '<div class="exec-card" style="border-top-color:var(--verde-medio)"><div class="exec-val">'+D_fmtBRL(pagoBRL)+'</div><div class="exec-lbl">Total pago (BRL)</div></div>';
  html += '<div class="exec-card" style="border-top-color:var(--verde-claro)"><div class="exec-val">'+fmtUSD(pago)+'</div><div class="exec-lbl">Total pago (USD)</div></div>';
  html += '<div class="exec-card" style="border-top-color:var(--ouro)"><div class="exec-val">'+fmtUSD(comp)+'</div><div class="exec-lbl">Comprometido (TDRs)</div></div>';
  html += '<div class="exec-card" style="border-top-color:var(--azul-medio)"><div class="exec-val">'+fmtUSD(saldoLivre)+'</div><div class="exec-lbl">Saldo livre total</div></div>';
  html += '<div class="exec-card" style="border-top-color:var(--erro)"><div class="exec-val" style="color:var(--erro)">'+extrap.length+'</div><div class="exec-lbl">Atividades extrapoladas</div></div>';
  html += '</div>';

  // Saldo por status
  var stCount={ok:0,atencao:0,critico:0,extrapolado:0};
  D.sal.forEach(function(s){if(stCount[s.status_saldo]!==undefined)stCount[s.status_saldo]++;});
  var maxSt=Math.max.apply(null,Object.values(stCount).concat([1]));
  html += '<div class="g2" style="margin-bottom:14px">';
  html += '<div class="ch-card"><div class="ch-tit">Saldo por status — atividades</div>';
  [['ok','OK','#34D399'],['atencao','Atenção','#FCD34D'],['critico','Crítico','#FB923C'],['extrapolado','Extrapolado','#EF4444']].forEach(function(st){
    html += bh(st[1], stCount[st[0]]/maxSt*100, st[2], stCount[st[0]]+' ativ.');
  });
  html += '</div>';

  // Distribuição orçamento
  var distItems=[['Pago',pago,'#059669'],['Comprometido',Math.max(0,comp-pago),'#D97706'],['Saldo livre',Math.max(0,saldoLivre),'#BFDBFE']];
  var distMax=Math.max.apply(null,distItems.map(function(d){return d[1];}).concat([1]));
  html += '<div class="ch-card"><div class="ch-tit">Distribuição do orçamento (U$)</div>';
  distItems.forEach(function(d){
    html += bh(d[0], d[1]/distMax*100, d[2], fmtUSD(d[1]));
  });
  html += '</div></div>';

  // Atividades extrapoladas
  if(extrap.length>0){
    html += '<div class="ch-card" style="margin-bottom:14px;border-color:var(--erro)"><div class="ch-tit" style="color:var(--erro)">⚠ Atividades com saldo extrapolado</div>';
    extrap.forEach(function(s){
      html += bh(s.codigo, 100, 'var(--erro)', fmtUSD(Math.abs(parseFloat(s.saldo_livre_usd)))+' extra');
    });
    html += '</div>';
  }

  // Top atividades comprometidas
  var topComp = D.sal.filter(function(s){return parseFloat(s.comprometido_usd||0)>0;})
    .sort(function(a,b){return parseFloat(b.comprometido_usd)-parseFloat(a.comprometido_usd);});
  var maxTop = Math.max.apply(null,topComp.map(function(s){return parseFloat(s.comprometido_usd||0);}).concat([1]));
  html += '<div class="ch-card" style="margin-bottom:14px"><div class="ch-tit">Comprometimento por atividade</div>';
  topComp.forEach(function(s){
    var p=parseFloat(s.comprometido_usd||0)/maxTop*100;
    var po=parseFloat(s.pct_comprometido||0);
    var cor=po>100?'var(--erro)':po>95?'var(--aviso)':'#378ADD';
    html += bh(s.codigo, p, cor, fmtUSD(s.comprometido_usd)+' ('+Math.round(po)+'%)');
  });
  html += '</div>';

  // Tabela de lançamentos
  html += '<div class="ch-card"><div class="ch-tit">Lançamentos financeiros</div><div style="overflow-x:auto"><table class="fin-tbl"><thead><tr>';
  html += '<th>Atividade</th><th>Descrição</th><th>Fornecedor</th><th>NF</th><th>Elem. Despesa</th><th>Valor BRL</th><th>Valor USD</th><th>Vencimento</th><th>Situação</th>';
  html += '</tr></thead><tbody>';
  if(D.lanc.length===0){
    html += '<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--cinza-500)">Nenhum lançamento registrado</td></tr>';
  } else {
    D.lanc.forEach(function(l){
      html += '<tr>';
      html += '<td style="font-family:var(--font-mono);font-size:11px;font-weight:500">'+(l.atividades&&l.atividades.codigo||'—')+'</td>';
      html += '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(l.descricao||'—')+'</td>';
      html += '<td>'+(l.fornecedores&&l.fornecedores.nome||'—')+'</td>';
      html += '<td style="font-family:var(--font-mono);font-size:11px">'+(l.numero_nf||'—')+'</td>';
      html += '<td>'+(l.elemento_despesa||'—')+'</td>';
      html += '<td style="font-family:var(--font-mono);text-align:right">'+D_fmtBRL(l.valor_brl)+'</td>';
      html += '<td style="font-family:var(--font-mono);text-align:right;font-weight:500">'+fmtUSD(l.valor_usd)+'</td>';
      html += '<td style="white-space:nowrap">'+D_fmtData(l.dt_vencimento)+'</td>';
      html += '<td><span class="sit-pago">'+(l.situacao||'—')+'</span></td>';
      html += '</tr>';
    });
  }
  html += '</tbody></table></div>';
  var totBRL = D.lanc.reduce(function(s,l){return s+parseFloat(l.valor_brl||0);},0);
  var totUSD = D.lanc.reduce(function(s,l){return s+parseFloat(l.valor_usd||0);},0);
  html += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--borda);display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--cinza-500)">'+D.lanc.length+' lançamento(s)</span><span style="font-weight:500">'+D_fmtBRL(totBRL)+' / '+fmtUSD(totUSD)+'</span></div>';
  html += '</div>';

  document.getElementById('pane-execucao').innerHTML = html;
}

// ─────────────────────────────────────────────────────────
// GUIA 5 — ALERTAS
// ─────────────────────────────────────────────────────────
function renderAlertas(){
  var alertas = [];

  D.sal.filter(function(s){return s.status_saldo==='extrapolado';}).forEach(function(s){
    alertas.push({nivel:'alto',titulo:'Atividade '+s.codigo+' — saldo extrapolado',desc:'TDRs somam '+fmtUSD(s.comprometido_usd)+' vs orçamento '+fmtUSD(s.orcamento_usd)+' ('+Math.round(parseFloat(s.pct_comprometido||0))+'%)'});
  });
  D.sal.filter(function(s){return s.status_saldo==='critico';}).forEach(function(s){
    alertas.push({nivel:'medio',titulo:'Atividade '+s.codigo+' — saldo crítico ('+Math.round(parseFloat(s.pct_comprometido||0))+'%)',desc:'Saldo livre: '+fmtUSD(s.saldo_livre_usd)});
  });
  D.tdrs.filter(function(t){return t.status==='revisao_interna';}).forEach(function(t){
    alertas.push({nivel:'info',titulo:'TDR '+t.numero+' aguardando revisão',desc:'Objeto: '+(t.objeto_pt||'').substring(0,70)+'...'});
  });
  var semResp = D.atv.filter(function(a){return !D.sal.some(function(s){return s.id===a.id&&parseFloat(s.comprometido_usd||0)>0;});});
  if(semResp.length>0) alertas.push({nivel:'info',titulo:semResp.length+' atividade(s) sem TDR cadastrado',desc:'Atividades sem comprometimento financeiro registrado'});

  var alto=alertas.filter(function(a){return a.nivel==='alto';}).length;
  var medio=alertas.filter(function(a){return a.nivel==='medio';}).length;
  var info=alertas.filter(function(a){return a.nivel==='info';}).length;

  var html = '<div class="g3">';
  html += '<div class="gauge-card" style="border-top:3px solid var(--erro)"><div class="gauge-n" style="color:var(--erro)">'+alto+'</div><div class="gauge-l">Críticos</div></div>';
  html += '<div class="gauge-card" style="border-top:3px solid var(--ouro)"><div class="gauge-n" style="color:var(--ouro)">'+medio+'</div><div class="gauge-l">Atenção</div></div>';
  html += '<div class="gauge-card" style="border-top:3px solid var(--azul-medio)"><div class="gauge-n" style="color:var(--azul-medio)">'+info+'</div><div class="gauge-l">Informativos</div></div>';
  html += '</div><div class="ch-card">';
  html += '<div class="ch-tit">Todos os alertas ('+alertas.length+')</div>';
  if(alertas.length===0){
    html += '<div class="empty-state"><div class="empty-state-icon">✓</div><div class="empty-state-msg">Nenhum alerta ativo.</div></div>';
  } else {
    alertas.forEach(function(a){
      var bg = a.nivel==='alto'?'#FEE2E2':a.nivel==='medio'?'#FEF9C3':'#EFF6FF';
      var cor = a.nivel==='alto'?'var(--erro)':a.nivel==='medio'?'var(--ouro)':'var(--azul-medio)';
      var lbl = a.nivel==='alto'?'CRÍTICO':a.nivel==='medio'?'ATENÇÃO':'INFO';
      html += '<div class="al-item"><div class="al-icon" style="background:'+bg+';color:'+cor+'">!</div><div class="al-body"><div class="al-tit">'+a.titulo+'</div><div class="al-desc">'+a.desc+'</div></div><span class="al-badge" style="background:'+bg+';color:'+cor+'">'+lbl+'</span></div>';
    });
  }
  html += '</div>';
  document.getElementById('pane-alertas').innerHTML = html;
}

})(); // fim IIFE
</script>
</body>
</html>
