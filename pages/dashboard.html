<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Visão Geral</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── Guias ────────────────────────────────────────────────── */
.dash-tabs{display:flex;gap:0;border-bottom:1px solid var(--borda);background:var(--branco);position:sticky;top:58px;z-index:40;overflow-x:auto;}
.dash-tab{padding:10px 18px;font-size:12px;font-weight:500;color:var(--cinza-500);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);white-space:nowrap;transition:all .15s;}
.dash-tab:hover{color:var(--cinza-700);}
.dash-tab.ativo{color:var(--verde-medio);border-bottom-color:var(--verde-medio);font-weight:600;}
.dash-content{display:none;padding:20px 24px;}
.dash-content.ativo{display:block;}

/* ── KPI cards ────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-card.verde::after{background:var(--verde-claro);}
.kpi-card.ouro::after{background:var(--ouro);}
.kpi-card.azul::after{background:var(--azul-medio);}
.kpi-card.vermelho::after{background:var(--erro);}
.kpi-card.roxo::after{background:#7C3AED;}
.kpi-label{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.kpi-valor{font-size:22px;font-weight:600;color:var(--cinza-900);letter-spacing:-.02em;line-height:1.1;}
.kpi-sub{font-size:11px;color:var(--cinza-500);margin-top:4px;}
.kpi-prog{height:3px;background:var(--cinza-100);border-radius:2px;margin-top:8px;overflow:hidden;}
.kpi-fill{height:100%;border-radius:2px;transition:width .6s ease;}

/* ── Charts ───────────────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.charts-grid.tres{grid-template-columns:2fr 1fr;}
.chart-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px;}
.chart-titulo{font-size:12px;font-weight:600;color:var(--cinza-700);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.chart-sub{font-size:10px;color:var(--cinza-500);font-weight:400;}

/* ── Barra horizontal ─────────────────────────────────────── */
.bh-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bh-lbl{font-size:11px;color:var(--cinza-700);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bh-track{flex:1;height:8px;background:var(--cinza-100);border-radius:2px;overflow:hidden;position:relative;}
.bh-fill{height:100%;border-radius:2px;transition:width .5s;}
.bh-val{font-size:10px;color:var(--cinza-500);width:55px;text-align:right;flex-shrink:0;font-family:var(--font-mono);}

/* ── Stacked bar ──────────────────────────────────────────── */
.sb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sb-lbl{font-size:11px;color:var(--cinza-700);width:80px;flex-shrink:0;}
.sb-bar{flex:1;display:flex;height:18px;border-radius:3px;overflow:hidden;background:var(--cinza-100);}
.sb-seg{display:flex;align-items:center;justify-content:center;transition:width .5s;}
.sb-seg span{font-size:9px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;padding:0 3px;}
.sb-total{font-size:10px;color:var(--cinza-500);width:50px;text-align:right;font-family:var(--font-mono);flex-shrink:0;}

/* ── Indicadores ──────────────────────────────────────────── */
.ind-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--borda);}
.ind-item:last-child{border-bottom:none;}
.ind-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ind-nome{font-size:11px;color:var(--cinza-900);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ind-meta{font-size:10px;color:var(--cinza-400,#9CA3AF);width:55px;text-align:center;flex-shrink:0;}
.ind-prog{width:80px;flex-shrink:0;}
.ind-bar{height:5px;background:var(--cinza-100);border-radius:2px;overflow:hidden;margin-bottom:2px;}
.ind-fill{height:100%;border-radius:2px;}
.ind-pct{font-size:9px;color:var(--cinza-500);text-align:right;}
.ind-atual{font-size:11px;font-weight:600;width:40px;text-align:right;flex-shrink:0;font-family:var(--font-mono);}

/* ── Alertas ──────────────────────────────────────────────── */
.alert-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--borda);align-items:flex-start;}
.alert-item:last-child{border-bottom:none;}
.alert-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.alert-corpo{flex:1;}
.alert-titulo{font-size:12px;font-weight:500;color:var(--cinza-900);}
.alert-desc{font-size:11px;color:var(--cinza-500);margin-top:2px;}
.alert-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;flex-shrink:0;}

/* ── Tabela financeiro ────────────────────────────────────── */
.fin-table{width:100%;font-size:12px;border-collapse:collapse;}
.fin-table th{padding:9px 10px;font-size:10px;font-weight:600;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--borda);background:var(--cinza-50);text-align:left;white-space:nowrap;}
.fin-table td{padding:10px;border-bottom:1px solid var(--borda);color:var(--cinza-700);vertical-align:middle;}
.fin-table tr:last-child td{border-bottom:none;}
.fin-table tr:hover td{background:var(--cinza-50);}
.situacao-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;}
.sit-pago{background:#DCFCE7;color:#166534;}
.sit-pendente{background:#FEF9C3;color:#854D0E;}
.sit-vencido{background:#FEE2E2;color:#991B1B;}
.sit-comprometido{background:#E0E7FF;color:#3730A3;}

/* ── Gauge ────────────────────────────────────────────────── */
.gauge-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.gauge-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px;text-align:center;}
.gauge-num{font-size:26px;font-weight:600;line-height:1;}
.gauge-lbl{font-size:11px;color:var(--cinza-500);margin-top:4px;}

/* ── Legenda ──────────────────────────────────────────────── */
.legenda{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--cinza-600,#4B5563);}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* ── Resumo execução ──────────────────────────────────────── */
.exec-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.exec-card{background:var(--cinza-50);border-radius:var(--raio);padding:10px 12px;text-align:center;}
.exec-val{font-size:16px;font-weight:600;color:var(--cinza-900);}
.exec-lbl{font-size:9px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
(async()=>{
  const u = await carregarUsuario();
  if(!u){ window.location.href='../index.html'; return; }

  document.getElementById('app').innerHTML = gerarLayout('Bem-vindo(a), '+u.nome_completo.split(' ')[0]+'!','dashboard') + `
    <div class="dash-tabs" id="dash-tabs">
      <button class="dash-tab ativo" onclick="mudarAba('financiadores',this)">Financiadores</button>
      <button class="dash-tab" onclick="mudarAba('operacional',this)">Gestão operacional</button>
      <button class="dash-tab" onclick="mudarAba('resultados',this)">Resultados × Financeiro</button>
      <button class="dash-tab" onclick="mudarAba('execucao',this)">Execução financeira</button>
      <button class="dash-tab" onclick="mudarAba('alertas',this)">Alertas</button>
    </div>
    <div id="dash-financiadores" class="dash-content ativo"></div>
    <div id="dash-operacional" class="dash-content"></div>
    <div id="dash-resultados" class="dash-content"></div>
    <div id="dash-execucao" class="dash-content"></div>
    <div id="dash-alertas" class="dash-content"></div>
  ` + fecharLayout();

  await carregarDados();
})();

function mudarAba(id, btn){
  document.querySelectorAll('.dash-tab').forEach(b=>b.classList.remove('ativo'));
  document.querySelectorAll('.dash-content').forEach(c=>c.classList.remove('ativo'));
  btn.classList.add('ativo');
  document.getElementById('dash-'+id).classList.add('ativo');
}

// ── DADOS GLOBAIS ─────────────────────────────────────────
let D = {};

async function carregarDados(){
  const [
    {data:atividades},
    {data:tdrs},
    {data:resultados},
    {data:saldos},
    {data:indicadores},
    {data:lancamentos},
    {data:contratos},
    {data:fornecedores}
  ] = await Promise.all([
    db.from('atividades').select('*'),
    db.from('tdrs').select('*,atividades(codigo,resultado_id),fornecedores(nome,tipo)'),
    db.from('resultados').select('*'),
    db.from('vw_saldo_atividade').select('*'),
    db.from('indicadores').select('*,resultados(codigo,nome_pt)').eq('ativo',true),
    db.from('execucao_financeira').select('*,atividades(codigo,nome_pt),fornecedores(nome,tipo),resultados(codigo)'),
    db.from('contratos').select('*'),
    db.from('fornecedores').select('*'),
  ]);

  D = { atividades:atividades||[], tdrs:tdrs||[], resultados:resultados||[],
        saldos:saldos||[], indicadores:indicadores||[], lancamentos:lancamentos||[],
        contratos:contratos||[], fornecedores:fornecedores||[] };

  renderFinanciadores();
  renderOperacional();
  renderResultados();
  renderExecucao();
  renderAlertas();
}

// ── UTILITÁRIOS LOCAIS ────────────────────────────────────
const fmtBRL = v => 'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = v => Math.round(parseFloat(v||0))+'%';
const fmtData = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const pct = (v,t) => t>0 ? Math.min(parseFloat(v||0)/parseFloat(t)*100,100) : 0;

function barChart(canvas, labels, datasets, opts={}){
  new Chart(canvas, {
    type: opts.horizontal ? 'bar' : 'bar',
    data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      indexAxis: opts.horizontal?'y':'x',
      plugins:{ legend:{ display: opts.legend||false } },
      scales:{
        x:{ grid:{ color:'rgba(0,0,0,.05)' }, ticks:{ font:{size:10}, color:'#9CA3AF' }, stacked: opts.stacked||false },
        y:{ grid:{ color:'rgba(0,0,0,.05)' }, ticks:{ font:{size:10}, color:'#9CA3AF' }, stacked: opts.stacked||false }
      }, ...opts.extra
    }
  });
}

function doughnutChart(canvas, labels, data, colors){
  new Chart(canvas, {
    type:'doughnut',
    data:{ labels, datasets:[{ data, backgroundColor:colors, borderWidth:2, borderColor:'#fff' }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, cutout:'65%' }
  });
}

// ─────────────────────────────────────────────────────────
// GUIA 1 — FINANCIADORES
// ─────────────────────────────────────────────────────────
function renderFinanciadores(){
  const { atividades:atv, tdrs, saldos, lancamentos, resultados, indicadores } = D;
  const orcTotal = atv.reduce((s,a)=>s+parseFloat(a.orcamento_usd||0),0);
  const compTotal = saldos.reduce((s,a)=>s+parseFloat(a.comprometido_usd||0),0);
  const pagoTotal = lancamentos.filter(l=>l.situacao==='pago').reduce((s,l)=>s+parseFloat(l.valor_usd||0),0);
  const tdrsAprov = tdrs.filter(t=>t.status==='aprovado').length;
  const atvContrat = atv.filter(a=>['CONTRATADO','CONCLUIDO'].includes(a.fase)).length;
  const pctExec = orcTotal>0 ? pagoTotal/orcTotal*100 : 0;
  const pctComp = orcTotal>0 ? compTotal/orcTotal*100 : 0;
  const metasComProg = indicadores.filter(i=>parseFloat(i.valor_atingido||0)>0).length;

  document.getElementById('dash-financiadores').innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card verde">
        <div class="kpi-label">Taxa de execução</div>
        <div class="kpi-valor" style="color:var(--sucesso)">${pctExec.toFixed(1)}%</div>
        <div class="kpi-sub">${fmtUSD(pagoTotal)} pagos de ${fmtUSD(orcTotal)}</div>
        <div class="kpi-prog"><div class="kpi-fill" style="width:${Math.min(pctExec,100)}%;background:var(--sucesso)"></div></div>
      </div>
      <div class="kpi-card ouro">
        <div class="kpi-label">Comprometido</div>
        <div class="kpi-valor" style="color:var(--ouro)">${fmtPct(pctComp)}</div>
        <div class="kpi-sub">${fmtUSD(compTotal)} em TDRs ativos</div>
        <div class="kpi-prog"><div class="kpi-fill" style="width:${Math.min(pctComp,100)}%;background:var(--ouro)"></div></div>
      </div>
      <div class="kpi-card azul">
        <div class="kpi-label">TDRs aprovados</div>
        <div class="kpi-valor" style="color:var(--azul-medio)">${tdrsAprov} / ${tdrs.length}</div>
        <div class="kpi-sub">${fmtPct(pct(tdrsAprov,tdrs.length))} do total</div>
        <div class="kpi-prog"><div class="kpi-fill" style="width:${pct(tdrsAprov,tdrs.length)}%;background:var(--azul-medio)"></div></div>
      </div>
      <div class="kpi-card roxo">
        <div class="kpi-label">Metas com avanço</div>
        <div class="kpi-valor" style="color:#7C3AED">${metasComProg} / ${indicadores.length}</div>
        <div class="kpi-sub">Atividades contratadas: ${atvContrat}</div>
        <div class="kpi-prog"><div class="kpi-fill" style="width:${pct(metasComProg,indicadores.length)}%;background:#7C3AED"></div></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-titulo">Orçamento por resultado (U$)</div>
        <div style="position:relative;height:200px"><canvas id="ch-orc-result"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-titulo">Status dos TDRs <span class="chart-sub">por valor U$</span></div>
        <div style="display:flex;align-items:center;gap:16px;height:200px">
          <div style="position:relative;flex:1;height:100%"><canvas id="ch-tdr-status"></canvas></div>
          <div id="leg-tdr-status" style="font-size:11px;color:var(--cinza-600,#4B5563)"></div>
        </div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-titulo">Execução financeira — pago × comprometido × orçamento livre por resultado</div>
      <div class="legenda">
        <div class="leg-item"><div class="leg-sq" style="background:#059669"></div>Pago</div>
        <div class="leg-item"><div class="leg-sq" style="background:#D97706"></div>Comprometido (TDRs)</div>
        <div class="leg-item"><div class="leg-sq" style="background:#E5E7EB"></div>Saldo livre</div>
      </div>
      <div id="sb-resultados"></div>
    </div>
  `;

  // Gráfico orçamento por resultado
  const resMap = {};
  D.saldos.forEach(s=>{
    const a = D.atividades.find(x=>x.id===s.id||x.codigo===s.codigo);
    if(!a) return;
    const res = D.resultados.find(r=>r.id===a.resultado_id);
    if(!res) return;
    if(!resMap[res.codigo]) resMap[res.codigo]={orc:0,comp:0,pago:0,nome:res.codigo};
    resMap[res.codigo].orc += parseFloat(s.orcamento_usd||0);
    resMap[res.codigo].comp += parseFloat(s.comprometido_usd||0);
    resMap[res.codigo].pago += parseFloat(s.pago_usd||0);
  });
  const resArr = Object.values(resMap);
  barChart(document.getElementById('ch-orc-result'),
    resArr.map(r=>r.nome),
    [{ label:'Orçamento', data:resArr.map(r=>r.orc), backgroundColor:'#BFDBFE', borderRadius:3 },
     { label:'Comprometido', data:resArr.map(r=>r.comp), backgroundColor:'#FCD34D', borderRadius:3 }],
    {legend:true, extra:{scales:{x:{stacked:false},y:{stacked:false}}}}
  );

  // Donut TDRs por status
  const statusMap={rascunho:0,revisao_interna:0,ajustes:0,enviado_unesco:0,retorno_unesco:0,aprovado:0};
  D.tdrs.forEach(t=>{ if(t.status&&t.status!=='cancelado') statusMap[t.status]=(statusMap[t.status]||0)+parseFloat(t.valor_usd||0); });
  const sKeys=Object.keys(statusMap).filter(k=>statusMap[k]>0);
  const sColors={rascunho:'#D1D5DB',revisao_interna:'#93C5FD',ajustes:'#FCD34D',enviado_unesco:'#6EE7B7',retorno_unesco:'#FCA5A5',aprovado:'#34D399'};
  const sLabels={rascunho:'Rascunho',revisao_interna:'Revisão',ajustes:'Ajustes',enviado_unesco:'UNESCO',retorno_unesco:'Retorno',aprovado:'Aprovado'};
  doughnutChart(document.getElementById('ch-tdr-status'),sKeys.map(k=>sLabels[k]),sKeys.map(k=>statusMap[k]),sKeys.map(k=>sColors[k]));
  document.getElementById('leg-tdr-status').innerHTML = sKeys.map(k=>`
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px">
      <div style="width:10px;height:10px;border-radius:2px;background:${sColors[k]};flex-shrink:0"></div>
      <span>${sLabels[k]}<br><span style="font-family:var(--font-mono);font-size:10px;color:var(--cinza-400,#9CA3AF)">${fmtUSD(statusMap[k])}</span></span>
    </div>`).join('');

  // Stacked bars por resultado
  const sbEl = document.getElementById('sb-resultados');
  sbEl.innerHTML = resArr.map(r=>{
    const total = Math.max(r.orc,r.comp);
    const pPago = total>0?r.pago/total*100:0;
    const pComp = total>0?(r.comp-r.pago)/total*100:0;
    const pLivre = Math.max(0,100-pPago-pComp);
    return `<div class="sb-row">
      <div class="sb-lbl">${r.nome}</div>
      <div class="sb-bar">
        ${pPago>0?`<div class="sb-seg" style="width:${pPago}%;background:#059669"><span>${fmtUSD(r.pago)}</span></div>`:''}
        ${pComp>0?`<div class="sb-seg" style="width:${pComp}%;background:#D97706"><span>${fmtUSD(r.comp)}</span></div>`:''}
        ${pLivre>0?`<div class="sb-seg" style="width:${pLivre}%;background:var(--cinza-100)"><span style="color:var(--cinza-500)">${fmtUSD(r.orc-r.comp)}</span></div>`:''}
      </div>
      <div class="sb-total">${fmtUSD(r.orc)}</div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────
// GUIA 2 — GESTÃO OPERACIONAL
// ─────────────────────────────────────────────────────────
function renderOperacional(){
  const { atividades:atv, tdrs, saldos } = D;
  const fases={A_INICIAR:0,ELABORACAO:0,LICITACAO:0,ELABORADO:0,CONTRATADO:0,CONCLUIDO:0};
  atv.forEach(a=>{ if(fases[a.fase]!==undefined) fases[a.fase]++; });
  const extrapoladas = saldos.filter(s=>s.status_saldo==='extrapolado').length;
  const criticas = saldos.filter(s=>s.status_saldo==='critico').length;
  const tdrsRev = tdrs.filter(t=>t.status==='revisao_interna').length;
  const orcTotal = atv.reduce((s,a)=>s+parseFloat(a.orcamento_usd||0),0);
  const pagoTotal = D.lancamentos.filter(l=>l.situacao==='pago').reduce((s,l)=>s+parseFloat(l.valor_usd||0),0);
  const compTotal = saldos.reduce((s,a)=>s+parseFloat(a.comprometido_usd||0),0);

  document.getElementById('dash-operacional').innerHTML = `
    <div class="gauge-row">
      <div class="gauge-card" style="border-top:3px solid var(--sucesso)">
        <div class="gauge-num" style="color:var(--sucesso)">${(pagoTotal/orcTotal*100).toFixed(1)}%</div>
        <div class="gauge-lbl">Execução paga</div>
        <div style="font-size:10px;color:var(--cinza-400,#9CA3AF);margin-top:2px">${fmtUSD(pagoTotal)}</div>
      </div>
      <div class="gauge-card" style="border-top:3px solid var(--ouro)">
        <div class="gauge-num" style="color:var(--ouro)">${(compTotal/orcTotal*100).toFixed(1)}%</div>
        <div class="gauge-lbl">Comprometido</div>
        <div style="font-size:10px;color:var(--cinza-400,#9CA3AF);margin-top:2px">${fmtUSD(compTotal)}</div>
      </div>
      <div class="gauge-card" style="border-top:3px solid var(--azul-medio)">
        <div class="gauge-num" style="color:var(--azul-medio)">${Math.round(D.tdrs.filter(t=>t.status==='aprovado').length/D.tdrs.length*100)}%</div>
        <div class="gauge-lbl">TDRs aprovados</div>
        <div style="font-size:10px;color:var(--cinza-400,#9CA3AF);margin-top:2px">${D.tdrs.filter(t=>t.status==='aprovado').length} de ${D.tdrs.length}</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-titulo">Pipeline de contratação — atividades por fase</div>
        ${Object.entries({A_INICIAR:'A Iniciar',ELABORACAO:'Elaboração',LICITACAO:'Licitação',ELABORADO:'Elaborado',CONTRATADO:'Contratado',CONCLUIDO:'Concluído'})
          .map(([k,l])=>{
            const n=fases[k]||0;
            const max=Math.max(...Object.values(fases),1);
            const cor={A_INICIAR:'#D1D5DB',ELABORACAO:'#93C5FD',LICITACAO:'#FCD34D',ELABORADO:'#6EE7B7',CONTRATADO:'#34D399',CONCLUIDO:'#059669'}[k];
            return `<div class="bh-row">
              <div class="bh-lbl">${l}</div>
              <div class="bh-track"><div class="bh-fill" style="width:${n/max*100}%;background:${cor}"></div></div>
              <div class="bh-val">${n} ativ.</div>
            </div>`;
          }).join('')}
      </div>
      <div class="chart-card">
        <div class="chart-titulo">TDRs por status</div>
        <div style="position:relative;height:200px"><canvas id="ch-tdr-op"></canvas></div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-titulo">Top 10 atividades — comprometimento do orçamento</div>
      <div id="top-atividades"></div>
    </div>
  `;

  // Donut TDRs operacional
  const stMap={rascunho:0,revisao_interna:0,ajustes:0,aprovado:0,enviado_unesco:0};
  D.tdrs.forEach(t=>{ if(t.status&&stMap[t.status]!==undefined) stMap[t.status]++; });
  doughnutChart(document.getElementById('ch-tdr-op'),
    ['Rascunho','Revisão','Ajustes','Aprovado','UNESCO'],
    [stMap.rascunho,stMap.revisao_interna,stMap.ajustes,stMap.aprovado,stMap.enviado_unesco],
    ['#D1D5DB','#93C5FD','#FCD34D','#34D399','#6EE7B7']
  );

  // Top atividades
  const topAtv = [...D.saldos].filter(s=>parseFloat(s.comprometido_usd||0)>0)
    .sort((a,b)=>parseFloat(b.comprometido_usd)-parseFloat(a.comprometido_usd)).slice(0,10);
  const maxComp = Math.max(...topAtv.map(s=>parseFloat(s.comprometido_usd||0)),1);
  document.getElementById('top-atividades').innerHTML = topAtv.map(s=>{
    const pct = parseFloat(s.comprometido_usd||0)/maxComp*100;
    const pctOrc = parseFloat(s.pct_comprometido||0);
    const cor = pctOrc>100?'var(--erro)':pctOrc>95?'var(--aviso)':'var(--azul-medio)';
    return `<div class="bh-row">
      <div class="bh-lbl" style="width:70px">${s.codigo}</div>
      <div class="bh-track"><div class="bh-fill" style="width:${pct}%;background:${cor}"></div></div>
      <div class="bh-val">${fmtUSD(s.comprometido_usd)} <span style="color:${cor}">(${Math.round(pctOrc)}%)</span></div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────
// GUIA 3 — RESULTADOS × FINANCEIRO
// ─────────────────────────────────────────────────────────
function renderResultados(){
  const { indicadores, saldos, atividades, resultados } = D;
  const pagoTotal = D.lancamentos.filter(l=>l.situacao==='pago').reduce((s,l)=>s+parseFloat(l.valor_usd||0),0);
  const orcTotal = atividades.reduce((s,a)=>s+parseFloat(a.orcamento_usd||0),0);
  const metasComProg = indicadores.filter(i=>parseFloat(i.valor_atingido||0)>0).length;

  // Agrupar saldos por resultado
  const resMap={};
  saldos.forEach(s=>{
    const a=atividades.find(x=>x.codigo===s.codigo);
    if(!a)return;
    const res=resultados.find(r=>r.id===a.resultado_id);
    const key=res?.codigo||'Sem resultado';
    if(!resMap[key])resMap[key]={orc:0,comp:0,pago:0,nome:res?.nome_pt||key,ind:[]};
    resMap[key].orc+=parseFloat(s.orcamento_usd||0);
    resMap[key].comp+=parseFloat(s.comprometido_usd||0);
    resMap[key].pago+=parseFloat(s.pago_usd||0);
  });
  indicadores.forEach(i=>{
    const key=i.resultados?.codigo||'Sem resultado';
    if(resMap[key])resMap[key].ind.push(i);
  });

  document.getElementById('dash-resultados').innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card verde">
        <div class="kpi-label">Metas com progresso</div>
        <div class="kpi-valor" style="color:var(--sucesso)">${metasComProg} / ${indicadores.length}</div>
        <div class="kpi-sub">indicadores com valor atingido > 0</div>
        <div class="kpi-prog"><div class="kpi-fill" style="width:${pct(metasComProg,indicadores.length)}%;background:var(--sucesso)"></div></div>
      </div>
      <div class="kpi-card ouro">
        <div class="kpi-label">Recursos × metas</div>
        <div class="kpi-valor" style="color:var(--ouro)">${(pagoTotal/orcTotal*100).toFixed(1)}%</div>
        <div class="kpi-sub">pago vs. orçamento total</div>
        <div class="kpi-prog"><div class="kpi-fill" style="width:${Math.min(pagoTotal/orcTotal*100,100)}%;background:var(--ouro)"></div></div>
      </div>
      <div class="kpi-card vermelho">
        <div class="kpi-label">Indicadores em risco</div>
        <div class="kpi-valor" style="color:var(--erro)">${indicadores.length-metasComProg}</div>
        <div class="kpi-sub">sem nenhum avanço registrado</div>
        <div class="kpi-prog"><div class="kpi-fill" style="width:${pct(indicadores.length-metasComProg,indicadores.length)}%;background:var(--erro)"></div></div>
      </div>
      <div class="kpi-card azul">
        <div class="kpi-label">Resultados ativos</div>
        <div class="kpi-valor" style="color:var(--azul-medio)">${Object.keys(resMap).length}</div>
        <div class="kpi-sub">com atividades e orçamento</div>
      </div>
    </div>

    ${Object.entries(resMap).map(([cod,r])=>`
      <div class="chart-card" style="margin-bottom:14px">
        <div class="chart-titulo">
          <span>${cod} — ${r.nome.substring(0,60)}</span>
          <div style="display:flex;gap:8px;font-size:10px">
            <span style="color:var(--sucesso)">${fmtUSD(r.pago)} pago</span>
            <span style="color:var(--ouro)">${fmtUSD(r.comp)} comprometido</span>
            <span style="color:var(--cinza-500)">${fmtUSD(r.orc)} orçamento</span>
          </div>
        </div>
        <div class="sb-row" style="margin-bottom:12px">
          <div class="sb-lbl" style="font-size:10px">Financeiro</div>
          <div class="sb-bar" style="height:14px">
            ${r.pago>0?`<div class="sb-seg" style="width:${Math.min(r.pago/r.orc*100,100)}%;background:#059669"><span>${fmtPct(r.pago/r.orc*100)}</span></div>`:''}
            ${(r.comp-r.pago)>0?`<div class="sb-seg" style="width:${Math.min((r.comp-r.pago)/r.orc*100,100)}%;background:#D97706"><span>${fmtUSD(r.comp-r.pago)}</span></div>`:''}
            <div class="sb-seg" style="flex:1;background:var(--cinza-100)"></div>
          </div>
        </div>
        ${r.ind.slice(0,5).map(i=>{
          const meta=parseFloat(i.meta_numerica||0);
          const atual=parseFloat(i.valor_atingido||0);
          const p=meta>0?Math.min(atual/meta*100,100):0;
          const cor=p>=75?'var(--sucesso)':p>=30?'var(--ouro)':'var(--erro)';
          return `<div class="ind-item">
            <div class="ind-dot" style="background:${cor}"></div>
            <div class="ind-nome">${i.nome_pt}</div>
            <div class="ind-meta">meta ${meta} ${i.unidade_pt||''}</div>
            <div class="ind-atual" style="color:${cor}">${atual}</div>
            <div class="ind-prog">
              <div class="ind-bar"><div class="ind-fill" style="width:${p}%;background:${cor}"></div></div>
              <div class="ind-pct">${Math.round(p)}%</div>
            </div>
          </div>`;
        }).join('')}
        ${r.ind.length>5?`<div style="font-size:10px;color:var(--cinza-500);text-align:center;margin-top:6px">+ ${r.ind.length-5} indicadores — veja a Matriz de Resultados</div>`:''}
      </div>
    `).join('')}
  `;
}

// ─────────────────────────────────────────────────────────
// GUIA 4 — EXECUÇÃO FINANCEIRA DETALHADA
// ─────────────────────────────────────────────────────────
function renderExecucao(){
  const { lancamentos, saldos, atividades } = D;
  const pagoTotal = lancamentos.filter(l=>l.situacao==='pago').reduce((s,l)=>s+parseFloat(l.valor_usd||0),0);
  const pagoBRL = lancamentos.filter(l=>l.situacao==='pago').reduce((s,l)=>s+parseFloat(l.valor_brl||0),0);
  const orcTotal = atividades.reduce((s,a)=>s+parseFloat(a.orcamento_usd||0),0);
  const compTotal = saldos.reduce((s,a)=>s+parseFloat(a.comprometido_usd||0),0);
  const saldoLivre = orcTotal - compTotal;
  const extrapoladas = saldos.filter(s=>parseFloat(s.saldo_livre_usd||0)<0);

  document.getElementById('dash-execucao').innerHTML = `
    <div class="exec-grid">
      <div class="exec-card" style="border-top:3px solid var(--verde-medio)">
        <div class="exec-val">${fmtBRL(pagoBRL)}</div>
        <div class="exec-lbl">Total pago (BRL)</div>
      </div>
      <div class="exec-card" style="border-top:3px solid var(--verde-claro)">
        <div class="exec-val">${fmtUSD(pagoTotal)}</div>
        <div class="exec-lbl">Total pago (USD)</div>
      </div>
      <div class="exec-card" style="border-top:3px solid var(--ouro)">
        <div class="exec-val">${fmtUSD(compTotal)}</div>
        <div class="exec-lbl">Comprometido (TDRs)</div>
      </div>
      <div class="exec-card" style="border-top:3px solid var(--azul-medio)">
        <div class="exec-val">${fmtUSD(saldoLivre)}</div>
        <div class="exec-lbl">Saldo livre total</div>
      </div>
      <div class="exec-card" style="border-top:3px solid var(--erro)">
        <div class="exec-val" style="color:var(--erro)">${extrapoladas.length}</div>
        <div class="exec-lbl">Atividades extrapoladas</div>
      </div>
    </div>

    <div class="charts-grid" style="margin-bottom:16px">
      <div class="chart-card">
        <div class="chart-titulo">Saldo por status — atividades</div>
        <div style="position:relative;height:180px"><canvas id="ch-status-saldo"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-titulo">Distribuição do orçamento (U$)</div>
        <div style="display:flex;align-items:center;gap:14px;height:180px">
          <div style="position:relative;flex:1;height:100%"><canvas id="ch-dist-orc"></canvas></div>
          <div style="font-size:11px;color:var(--cinza-600,#4B5563)">
            <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px"><div style="width:10px;height:10px;border-radius:2px;background:#059669"></div>Pago ${fmtUSD(pagoTotal)}</div>
            <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px"><div style="width:10px;height:10px;border-radius:2px;background:#D97706"></div>Comprometido ${fmtUSD(compTotal-pagoTotal)}</div>
            <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:#E5E7EB"></div>Livre ${fmtUSD(saldoLivre)}</div>
          </div>
        </div>
      </div>
    </div>

    ${extrapoladas.length>0?`
    <div class="chart-card" style="margin-bottom:16px;border-color:var(--erro)">
      <div class="chart-titulo" style="color:var(--erro)">⚠ Atividades com saldo extrapolado</div>
      ${extrapoladas.map(s=>`
        <div class="bh-row">
          <div class="bh-lbl" style="width:70px">${s.codigo}</div>
          <div class="bh-track">
            <div class="bh-fill" style="width:100%;background:var(--erro-bg)"></div>
            <div class="bh-fill" style="width:${Math.min(parseFloat(s.comprometido_usd)/Math.max(parseFloat(s.comprometido_usd),1)*100,100)}%;background:var(--erro);position:absolute;top:0;left:0;height:100%;border-radius:2px"></div>
          </div>
          <div class="bh-val" style="color:var(--erro)">${fmtUSD(Math.abs(parseFloat(s.saldo_livre_usd)))} extra</div>
        </div>`).join('')}
    </div>`:''}

    <div class="chart-card">
      <div class="chart-titulo">Lançamentos financeiros — detalhamento completo</div>
      <div style="overflow-x:auto">
        <table class="fin-table">
          <thead>
            <tr>
              <th>Atividade</th>
              <th>Descrição</th>
              <th>Fornecedor</th>
              <th>NF</th>
              <th>Elemento</th>
              <th>Valor BRL</th>
              <th>Valor USD</th>
              <th>Vencimento</th>
              <th>Pagamento</th>
              <th>Situação</th>
            </tr>
          </thead>
          <tbody>
            ${lancamentos.map(l=>{
              const sitClass={pago:'sit-pago',pendente:'sit-pendente',vencido:'sit-vencido',comprometido:'sit-comprometido'}[l.situacao]||'sit-pendente';
              const sitLabel={pago:'Pago',pendente:'Pendente',vencido:'Vencido',comprometido:'Comprometido'}[l.situacao]||l.situacao;
              const venc = l.dt_vencimento && !l.dt_pagamento && new Date(l.dt_vencimento)<new Date();
              return `<tr>
                <td><span style="font-family:var(--font-mono);font-size:11px;font-weight:500">${l.atividades?.codigo||'—'}</span></td>
                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.descricao||'—'}</td>
                <td>${l.fornecedores?.nome||'—'}</td>
                <td style="font-family:var(--font-mono);font-size:11px">${l.numero_nf||'—'}</td>
                <td>${l.elemento_despesa||'—'}</td>
                <td style="font-family:var(--font-mono);text-align:right">${fmtBRL(l.valor_brl)}</td>
                <td style="font-family:var(--font-mono);text-align:right;font-weight:500">${fmtUSD(l.valor_usd)}</td>
                <td style="white-space:nowrap;color:${venc?'var(--erro)':'inherit'}">${fmtData(l.dt_vencimento)}</td>
                <td style="white-space:nowrap">${fmtData(l.dt_pagamento)}</td>
                <td><span class="situacao-badge ${sitClass}">${sitLabel}</span></td>
              </tr>`;
            }).join('')}
            ${lancamentos.length===0?`<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--cinza-500)">Nenhum lançamento financeiro registrado</td></tr>`:''}
          </tbody>
        </table>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--borda);display:flex;justify-content:space-between;font-size:12px">
        <span style="color:var(--cinza-500)">${lancamentos.length} lançamento(s) • Fonte: módulo Financeiro</span>
        <span style="font-weight:500">Total: ${fmtBRL(lancamentos.reduce((s,l)=>s+parseFloat(l.valor_brl||0),0))} / ${fmtUSD(lancamentos.reduce((s,l)=>s+parseFloat(l.valor_usd||0),0))}</span>
      </div>
    </div>

    <div class="chart-card" style="margin-top:14px">
      <div class="chart-titulo">Top atividades — comprometimento vs. orçamento</div>
      <div style="position:relative;height:${Math.max(D.saldos.filter(s=>parseFloat(s.comprometido_usd||0)>0).length*36+60,200)}px">
        <canvas id="ch-top-comp"></canvas>
      </div>
    </div>
  `;

  // Gráfico status saldo
  const statusCount={ok:0,atencao:0,critico:0,extrapolado:0,sem_orcamento:0};
  D.saldos.forEach(s=>{ if(statusCount[s.status_saldo]!==undefined)statusCount[s.status_saldo]++; });
  barChart(document.getElementById('ch-status-saldo'),
    ['OK','Atenção','Crítico','Extrapolado','Sem orçamento'],
    [{data:[statusCount.ok,statusCount.atencao,statusCount.critico,statusCount.extrapolado,statusCount.sem_orcamento],
      backgroundColor:['#34D399','#FCD34D','#FB923C','#EF4444','#D1D5DB'],borderRadius:4}],
    {extra:{plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{stepSize:1}}}}}
  );

  // Donut distribuição
  doughnutChart(document.getElementById('ch-dist-orc'),
    ['Pago','Comprometido','Livre'],
    [pagoTotal, Math.max(0,compTotal-pagoTotal), Math.max(0,saldoLivre)],
    ['#059669','#D97706','#E5E7EB']
  );

  // Chart horizontal top atividades
  const topComp = D.saldos.filter(s=>parseFloat(s.comprometido_usd||0)>0)
    .sort((a,b)=>parseFloat(b.comprometido_usd)-parseFloat(a.comprometido_usd));
  if(document.getElementById('ch-top-comp') && topComp.length>0){
    new Chart(document.getElementById('ch-top-comp'),{
      type:'bar',
      data:{
        labels: topComp.map(s=>s.codigo),
        datasets:[
          {label:'Pago',data:topComp.map(s=>parseFloat(s.pago_usd||0)),backgroundColor:'#059669',borderRadius:3,stack:'s'},
          {label:'Comprometido',data:topComp.map(s=>Math.max(0,parseFloat(s.comprometido_usd||0)-parseFloat(s.pago_usd||0))),backgroundColor:'#D97706',borderRadius:3,stack:'s'},
          {label:'Saldo',data:topComp.map(s=>Math.max(0,parseFloat(s.saldo_livre_usd||0))),backgroundColor:'#BFDBFE',borderRadius:3,stack:'s'},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:12,padding:12}}},
        scales:{x:{stacked:true,ticks:{font:{size:10},color:'#9CA3AF'},grid:{color:'rgba(0,0,0,.05)'}},
                y:{stacked:true,ticks:{font:{size:10},color:'#9CA3AF'},grid:{display:false}}}
      }
    });
  }
}

// ─────────────────────────────────────────────────────────
// GUIA 5 — ALERTAS
// ─────────────────────────────────────────────────────────
function renderAlertas(){
  const { atividades:atv, tdrs, saldos } = D;
  const alertas = [];

  // Extrapoladas
  saldos.filter(s=>s.status_saldo==='extrapolado').forEach(s=>{
    alertas.push({nivel:'alto',icon:'⚠',bg:'#FEE2E2',titulo:`Atividade ${s.codigo} — saldo extrapolado`,
      desc:`TDRs somam ${fmtUSD(s.comprometido_usd)} vs orçamento ${fmtUSD(s.orcamento_usd)} (${Math.round(parseFloat(s.pct_comprometido||0))}%)`});
  });

  // Críticas (>95%)
  saldos.filter(s=>s.status_saldo==='critico').forEach(s=>{
    alertas.push({nivel:'medio',icon:'!',bg:'#FEF9C3',titulo:`Atividade ${s.codigo} — saldo crítico`,
      desc:`${Math.round(parseFloat(s.pct_comprometido||0))}% comprometido — saldo livre: ${fmtUSD(s.saldo_livre_usd)}`});
  });

  // TDRs em revisão há mais de 7 dias
  tdrs.filter(t=>t.status==='revisao_interna').forEach(t=>{
    alertas.push({nivel:'info',icon:'i',bg:'#EFF6FF',titulo:`TDR ${t.numero} aguardando revisão`,
      desc:`Status: Revisão Interna — objeto: ${(t.objeto_pt||'').substring(0,60)}...`});
  });

  // Sem TDRs
  const semTdr = atv.filter(a=>!tdrs.some(t=>t.atividade_id===a.id&&t.status!=='cancelado'));
  if(semTdr.length>0) alertas.push({nivel:'info',icon:'i',bg:'#EFF6FF',titulo:`${semTdr.length} atividade(s) sem TDR cadastrado`,
    desc:`Atividades sem TDRs não têm comprometimento financeiro registrado`});

  document.getElementById('dash-alertas').innerHTML = `
    <div class="kpi-row" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi-card vermelho">
        <div class="kpi-label">Alertas críticos</div>
        <div class="kpi-valor" style="color:var(--erro)">${alertas.filter(a=>a.nivel==='alto').length}</div>
        <div class="kpi-sub">Requerem ação imediata</div>
      </div>
      <div class="kpi-card ouro">
        <div class="kpi-label">Atenção</div>
        <div class="kpi-valor" style="color:var(--ouro)">${alertas.filter(a=>a.nivel==='medio').length}</div>
        <div class="kpi-sub">Monitorar de perto</div>
      </div>
      <div class="kpi-card azul">
        <div class="kpi-label">Informativos</div>
        <div class="kpi-valor" style="color:var(--azul-medio)">${alertas.filter(a=>a.nivel==='info').length}</div>
        <div class="kpi-sub">Pendências e avisos</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-titulo">Todos os alertas (${alertas.length})</div>
      ${alertas.length===0
        ? '<div style="text-align:center;padding:24px;color:var(--cinza-500)">Nenhum alerta ativo.</div>'
        : alertas.map(a=>`
          <div class="alert-item">
            <div class="alert-icon" style="background:${a.bg};color:${a.nivel==='alto'?'var(--erro)':a.nivel==='medio'?'var(--ouro)':'var(--azul-medio)'}">${a.icon}</div>
            <div class="alert-corpo">
              <div class="alert-titulo">${a.titulo}</div>
              <div class="alert-desc">${a.desc}</div>
            </div>
            <span class="alert-badge" style="background:${a.bg};color:${a.nivel==='alto'?'var(--erro)':a.nivel==='medio'?'var(--ouro)':'var(--azul-medio)'}">
              ${a.nivel==='alto'?'CRÍTICO':a.nivel==='medio'?'ATENÇÃO':'INFO'}
            </span>
          </div>`).join('')}
    </div>
