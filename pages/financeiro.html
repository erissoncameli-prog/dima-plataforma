<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<style>
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc-g::after{background:var(--verde-claro)}.sc-b::after{background:var(--azul-medio)}
.sc-a::after{background:var(--aviso)}.sc-r::after{background:var(--erro)}.sc-t::after{background:#0D9488}
.stat-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:600;color:var(--cinza-900);letter-spacing:-.01em;}
.stat-sub{font-size:10px;color:var(--cinza-500);margin-top:3px;}

/* Abas de visão */
.visao-tabs{display:flex;gap:0;background:var(--cinza-50);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:4px;margin-bottom:16px;width:fit-content;}
.visao-tab{padding:7px 18px;border-radius:var(--raio);font-size:12px;font-weight:500;color:var(--cinza-500);cursor:pointer;transition:all .15s;border:none;background:none;font-family:var(--font-sans);}
.visao-tab.ativo{background:var(--branco);color:var(--verde-medio);box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:600;}

/* Visão por resultado */
.resultado-bloco{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);overflow:hidden;margin-bottom:12px;}
.resultado-header{padding:14px 18px;border-bottom:1px solid var(--borda);display:flex;align-items:center;gap:12px;background:var(--cinza-50);}
.resultado-codigo{font-family:var(--font-mono);font-size:12px;font-weight:700;background:var(--verde-medio);color:#fff;padding:2px 10px;border-radius:4px;}
.resultado-nome{font-size:13px;font-weight:600;color:var(--cinza-900);flex:1;}
.resultado-body{padding:14px 18px;}

/* Visão por atividade */
.ativ-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--borda);}
.ativ-row:last-child{border-bottom:none;}
.ativ-cod{font-family:var(--font-mono);font-size:11px;font-weight:500;background:var(--cinza-100);padding:2px 7px;border-radius:3px;color:var(--cinza-700);min-width:70px;}
.ativ-nome{font-size:12px;color:var(--cinza-700);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ativ-barra{flex:1;max-width:160px;}
.ativ-barra-bg{height:5px;background:var(--cinza-100);border-radius:3px;overflow:hidden;}
.ativ-barra-fill{height:100%;border-radius:3px;background:var(--verde-claro);transition:width .4s;}
.ativ-barra-fill.warn{background:var(--aviso);}
.ativ-barra-fill.crit{background:var(--erro);}
.ativ-valor{font-family:var(--font-mono);font-size:11px;color:var(--cinza-700);text-align:right;min-width:90px;}
.ativ-pct{font-family:var(--font-mono);font-size:11px;font-weight:600;min-width:36px;text-align:right;}

/* Tabela de lançamentos */
.nf-num{font-family:var(--font-mono);font-size:11px;background:var(--cinza-100);padding:1px 6px;border-radius:3px;}
.sit-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;}
.sit-pago{background:#ECFDF5;color:#065F46}
.sit-a_pagar{background:#FFFBEB;color:#92400E}
.sit-cancelado{background:#F3F4F6;color:#6B7280}

/* Upload comprovante */
.upload-mini{border:1px dashed var(--borda-forte);border-radius:var(--raio);padding:10px;text-align:center;cursor:pointer;font-size:11px;color:var(--cinza-500);transition:all .15s;}
.upload-mini:hover{border-color:var(--verde-claro);color:var(--verde-medio);}
.upload-mini.tem{border-color:var(--verde-claro);background:var(--sucesso-bg);color:var(--sucesso);}

.cotacao-card{display:inline-flex;align-items:center;gap:14px;background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:10px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.cotacao-valor{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--cinza-900);letter-spacing:-.02em;}
.cotacao-label{font-size:10px;font-weight:600;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.cotacao-var{font-size:12px;font-weight:700;padding:2px 7px;border-radius:99px;}
.cotacao-var.up{background:#FEF2F2;color:#DC2626;}
.cotacao-var.down{background:#ECFDF5;color:#059669;}
.cotacao-var.flat{background:var(--cinza-100);color:var(--cinza-500);}
.cotacao-sep{width:1px;height:36px;background:var(--borda);}

/* Modal pagamento */
.pgto-resumo{background:var(--cinza-50);border:1px solid var(--borda);border-radius:var(--raio);padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px 24px;}
.pgto-resumo-item{display:flex;flex-direction:column;gap:2px;}
.pgto-resumo-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--cinza-500);font-weight:600;}
.pgto-resumo-val{font-size:13px;font-weight:600;color:var(--cinza-900);}
/* Timeline histórico */
.timeline{padding:4px 0;margin-bottom:16px;}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:14px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:24px;bottom:0;width:2px;background:var(--borda);}
.tl-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--borda);}
.tl-dot.ok{background:#ECFDF5;border-color:#6EE7B7;}
.tl-dot.warn{background:#FEF9C3;border-color:#FDE047;}
.tl-dot.pend{background:var(--cinza-50);border-color:var(--cinza-200);}
.tl-body{flex:1;padding-top:2px;}
.tl-titulo{font-size:12px;font-weight:600;color:var(--cinza-800);}
.tl-data{font-size:11px;color:var(--cinza-400);margin-top:1px;}
.tl-parecer{font-size:11px;color:var(--cinza-600);margin-top:4px;font-style:italic;background:var(--cinza-50);border-radius:var(--raio);padding:6px 10px;border-left:3px solid var(--verde-claro);}
/* Cotação travada chip */
.cotacao-trava{display:inline-flex;align-items:center;gap:6px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--raio);padding:8px 14px;font-size:12px;color:#1E40AF;font-weight:500;}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#6B7280">
    <div style="text-align:center">
      <div style="width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2D6A4F;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      Carregando financeiro...

</div>

<!-- MODAL EFETIVAR PAGAMENTO -->
<div class="modal-overlay" id="modal-pgto">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <div>
        <div class="modal-title">💳 Efetivar Pagamento</div>
        <div style="font-size:11px;color:var(--cinza-500);margin-top:2px" id="pgto-subtitulo"></div>
      </div>
      <button class="modal-close" onclick="fecharModalPgto()">✕</button>

    <div class="modal-body" id="pgto-body" style="padding:20px 24px;max-height:72vh;overflow-y:auto"></div>
    <div class="modal-footer" id="pgto-footer"></div>

<!-- MODAL LANÇAMENTO -->
<div class="modal-overlay" id="modal-lanc">
  <div class="modal" style="max-width:660px">
    <div class="modal-header">
      <span class="modal-title" id="ml-titulo">Novo Lançamento</span>
      <button class="modal-close" onclick="fecharModal()">✕</button>

    <div class="modal-body" id="ml-body"></div>
    <div class="modal-footer" id="ml-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
let todosLanc = [];
let atividades = [], contratos = [], fornecedores = [], resultados = [];
let lancEditando = null, arquivoComp = null;
let taxaAtual = 5.87;
let taxaAnterior = null;
let taxaVariacaoPct = null;
let taxaDataRef = null;
let taxaEHoje = false;
let visaoAtual = 'lancamentos';

(async () => {
  const usuario = await carregarUsuario();
  if (!usuario) { window.location.href = '../index.html'; return; }
  if (!PODE.verFinanceiro()) {
    document.getElementById('app').innerHTML =
      gerarLayout('Financeiro','financeiro') +
      `<div class="alert alert-danger" style="max-width:500px">🔒 Acesso restrito ao perfil financeiro.</div>` +
      `</div></div></div>`;
    return;
  }

  document.getElementById('app').innerHTML =
    gerarLayout('Execução Financeira','financeiro') + `
    <div class="fade-in">
      <!-- KPIs -->
      <div class="stat-row" id="stats"></div>

      <!-- Cotação + Controles -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <div id="cotacao-chip"></div>
        <div class="visao-tabs">
          <button class="visao-tab ativo" onclick="mudarVisao('lancamentos',this)">📋 Lançamentos</button>
          <button class="visao-tab" onclick="mudarVisao('atividades',this)">◈ Por Atividade</button>
          <button class="visao-tab" onclick="mudarVisao('resultados',this)">◎ Por Resultado</button>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="exportarCSV()">⬇ Exportar CSV</button>
          <button class="btn btn-primary btn-sm" onclick="abrirNovo()">+ Novo lançamento</button>
        </div>
      </div>

      <!-- Filtros (visão lançamentos) -->
      <div id="filtros-lanc" class="filter-bar" style="margin-bottom:14px">
        <input class="form-control" type="text" id="busca" style="width:200px"
          placeholder="Buscar descrição ou NF..." oninput="renderLancamentos()">
        <select class="form-control" id="fil-sit" onchange="renderLancamentos()" style="width:130px">
          <option value="">Todas situações</option>
          <option value="pago">Pago</option>
          <option value="a_pagar">A Pagar</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <select class="form-control" id="fil-ativ" onchange="renderLancamentos()" style="width:170px">
          <option value="">Todas as atividades</option>
        </select>
        <select class="form-control" id="fil-forn" onchange="renderLancamentos()" style="width:170px">
          <option value="">Todos os fornecedores</option>
        </select>
        <select class="form-control" id="fil-mes" onchange="renderLancamentos()" style="width:130px">
          <option value="">Todos os meses</option>
        </select>
        <span id="cont-lanc" style="font-size:12px;color:var(--cinza-500);margin-left:auto"></span>
      </div>

      <!-- Conteúdo dinâmico -->
      <div id="conteudo-financeiro"></div>
    </div>` + `</div></div></div>`;

  await carregar();
})();

// ── Cotação USD — busca e persiste diariamente ────────────────
async function sincronizarCotacao() {
  const hoje = new Date().toISOString().split('T')[0];

  // Busca os dois últimos registros (hoje + anterior para variação)
  const { data: ultimas } = await db.from('cotacoes_usd')
    .select('id,cotacao,cotacao_anterior,variacao_pct,data_ref,fonte')
    .order('data_ref', { ascending: false })
    .limit(2);

  const ultima   = ultimas?.[0];
  const anterior = ultimas?.[1];

  // Já tem cotação de hoje → retorna direto
  if (ultima?.data_ref === hoje) {
    return {
      cotacao:          parseFloat(ultima.cotacao),
      cotacao_anterior: anterior ? parseFloat(anterior.cotacao) : null,
      variacao_pct:     ultima.variacao_pct ? parseFloat(ultima.variacao_pct) : null,
      data_ref:         ultima.data_ref
    };
  }

  // Buscar cotação atual na AwesomeAPI (gratuita, sem chave)
  try {
    const res  = await fetch('https://economia.awesomeapi.com.br/json/last/USD-BRL');
    const json = await res.json();
    const nova = parseFloat(json.USDBRL.bid);

    const cotAnt = ultima ? parseFloat(ultima.cotacao) : null;
    const varPct = cotAnt ? parseFloat(((nova - cotAnt) / cotAnt * 100).toFixed(4)) : null;

    await db.from('cotacoes_usd').insert({
      cotacao:          nova,
      cotacao_anterior: cotAnt,
      variacao_pct:     varPct,
      data_ref:         hoje,
      fonte:            'AwesomeAPI'
    });

    return { cotacao: nova, cotacao_anterior: cotAnt, variacao_pct: varPct, data_ref: hoje };

  } catch (e) {
    // Fallback: usa o último registro disponível
    console.warn('AwesomeAPI indisponível, usando última cotação salva.', e);
    if (ultima) {
      return {
        cotacao:          parseFloat(ultima.cotacao),
        cotacao_anterior: anterior ? parseFloat(anterior.cotacao) : null,
        variacao_pct:     ultima.variacao_pct ? parseFloat(ultima.variacao_pct) : null,
        data_ref:         ultima.data_ref
      };
    }
    return { cotacao: 5.87, cotacao_anterior: null, variacao_pct: null, data_ref: null };
  }
}

async function carregar() {
  try {
    const [
      {data:lancs}, {data:ativs}, {data:conts},
      {data:forns}, {data:ress}, cotacao
    ] = await Promise.all([
      db.from('execucao_financeira').select(`
        *,cotacao_unesco,valor_usd_unesco,impacto_usd,
        atividades(id,codigo,nome_pt,resultado_id),
        contratos(id,numero,objeto_pt),
        fornecedores(id,nome,tipo)
      `).order('dt_vencimento',{ascending:false}),
      db.from('atividades').select('id,codigo,nome_pt,orcamento_usd,resultado_id').order('codigo'),
      db.from('contratos').select('id,numero,objeto_pt,fornecedor_id,atividade_id,valor_total_brl,valor_utilizado_brl,saldo_brl').order('numero'),
      db.from('fornecedores').select('id,nome,tipo').order('nome'),
      db.from('resultados').select('*').order('codigo'),
      sincronizarCotacao()
    ]);

    todosLanc = lancs || [];
    atividades = ativs || [];
    contratos = conts || [];
    fornecedores = forns || [];
    resultados = ress || [];

    // Pré-carregar última cotação UNESCO utilizada nos pagamentos
    const ultimoComUNESCO = (lancs||[]).find(l => l.cotacao_unesco && l.situacao === 'pago');
    if (ultimoComUNESCO) taxaUnescoUltima = parseFloat(ultimoComUNESCO.cotacao_unesco);

    taxaAtual        = cotacao?.cotacao       || 5.87;
    taxaAnterior     = cotacao?.cotacao_anterior || null;
    taxaVariacaoPct  = cotacao?.variacao_pct  || null;
    taxaDataRef      = cotacao?.data_ref      || null;
    taxaEHoje        = cotacao?.data_ref === new Date().toISOString().split('T')[0];

    // Preencher filtro de atividades — só as que têm pelo menos um contrato
    const filAtiv = document.getElementById('fil-ativ');
    if (filAtiv) {
      const atvsComContrato = new Set((conts||[]).map(c => c.atividade_id).filter(Boolean));
      atividades
        .filter(a => atvsComContrato.has(a.id))
        .forEach(a => {
          const opt = document.createElement('option');
          opt.value = a.id;
          opt.textContent = `${a.codigo} — ${a.nome_pt?.substring(0,38)}`;
          filAtiv.appendChild(opt);
        });
    }

    // Preencher filtro de fornecedores — só os que aparecem nos lançamentos
    const filForn = document.getElementById('fil-forn');
    if (filForn) {
      const fornsVistos = new Map();
      (lancs||[]).forEach(l => {
        if (l.fornecedor_id && l.fornecedores?.nome && !fornsVistos.has(l.fornecedor_id)) {
          fornsVistos.set(l.fornecedor_id, l.fornecedores.nome);
        }
      });
      [...fornsVistos.entries()]
        .sort((a,b) => a[1].localeCompare(b[1]))
        .forEach(([id, nome]) => {
          const opt = document.createElement('option');
          opt.value = id;
          opt.textContent = nome.substring(0, 45);
          filForn.appendChild(opt);
        });
    }

    // Preencher filtro de meses
    const meses = [...new Set(todosLanc.map(l => l.dt_vencimento?.substring(0,7)).filter(Boolean))].sort().reverse();
    const filMes = document.getElementById('fil-mes');
    if (filMes) {
      meses.forEach(m => {
        const opt = document.createElement('option');
        const [ano,mes] = m.split('-');
        const nomes = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        opt.value = m; opt.textContent = `${nomes[parseInt(mes)]}/${ano}`;
        filMes.appendChild(opt);
      });
    }

    // Cotação chip
    // Card de cotação
    renderCotacaoCard();

    renderStats();
    renderConteudo();
  } catch(e) {
    console.error(e);
    toast('Erro ao carregar dados financeiros.','error');
  }
}

function renderCotacaoCard() {
  const el = document.getElementById('cotacao-chip');
  if (!el) return;

  // Usa variacao_pct do banco; recalcula só como fallback
  const varPct = taxaVariacaoPct !== null
    ? taxaVariacaoPct
    : (taxaAnterior && taxaAnterior > 0
        ? parseFloat(((taxaAtual - taxaAnterior) / taxaAnterior * 100).toFixed(4))
        : null);

  const varDir  = varPct === null ? 'flat' : varPct > 0.005 ? 'up' : varPct < -0.005 ? 'down' : 'flat';
  const varSeta = varDir === 'up' ? '↑' : varDir === 'down' ? '↓' : '→';
  const varTxt  = varPct !== null ? `${varSeta} ${Math.abs(varPct).toFixed(2)}%` : '—';
  const varLbl  = varDir === 'up' ? 'Alta' : varDir === 'down' ? 'Baixa' : 'Estável';

  const dataFmt = taxaDataRef
    ? new Date(taxaDataRef + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit',month:'short'})
    : '—';

  // Badge: verde "Hoje" se for do dia, laranja com data se for fallback
  const statusBadge = taxaEHoje
    ? `<span style="font-size:9px;background:#D1FAE5;color:#065F46;border-radius:99px;padding:1px 7px;font-weight:700">● Hoje</span>`
    : `<span style="font-size:9px;background:#FEF3C7;color:#92400E;border-radius:99px;padding:1px 7px;font-weight:700" title="Cotação mais recente disponível">⚠ ${dataFmt}</span>`;

  el.innerHTML = `
    <div class="cotacao-card">
      <div>
        <div class="cotacao-label" style="display:flex;align-items:center;gap:6px">
          Dólar Comercial ${statusBadge}
        </div>
        <div class="cotacao-valor">R$ ${taxaAtual.toFixed(4)}</div>
      </div>
      <div class="cotacao-sep"></div>
      <div style="text-align:center">
        <div class="cotacao-label">Variação vs ontem</div>
        <span class="cotacao-var ${varDir}">${varTxt}</span>
        <div style="font-size:9px;color:var(--cinza-400);margin-top:2px">${varLbl}</div>
      </div>
      <div class="cotacao-sep"></div>
      <div style="text-align:center">
        <div class="cotacao-label">Fonte</div>
        <div style="font-size:11px;font-weight:600;color:var(--cinza-700)">AwesomeAPI</div>
        <div style="font-size:9px;color:var(--cinza-400);margin-top:2px">USD · Comercial</div>
      </div>
    </div>`;
}

function renderStats() {
  const ativos = todosLanc.filter(l=>l.situacao!=='cancelado');
  const pagos = ativos.filter(l=>l.situacao==='pago');
  const aPagar = ativos.filter(l=>l.situacao==='a_pagar');
  const totalPago = pagos.reduce((s,l)=>s+parseFloat(l.valor_brl||0),0);
  const totalAPagar = aPagar.reduce((s,l)=>s+parseFloat(l.valor_brl||0),0);
  const totalGeral = ativos.reduce((s,l)=>s+parseFloat(l.valor_brl||0),0);
  const vencidos = aPagar.filter(l=>l.dt_vencimento&&new Date(l.dt_vencimento)<new Date()).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card sc-g">
      <div class="stat-lbl">Total Executado</div>
      <div class="stat-val">${fmtBRL(totalPago)}</div>
      <div class="stat-sub">${pagos.length} pagamentos</div>
    </div>
    <div class="stat-card sc-a">
      <div class="stat-lbl">A Pagar</div>
      <div class="stat-val">${fmtBRL(totalAPagar)}</div>
      <div class="stat-sub">${aPagar.length} lançamentos</div>
    </div>
    <div class="stat-card sc-b">
      <div class="stat-lbl">Total Comprometido</div>
      <div class="stat-val">${fmtBRL(totalGeral)}</div>
      <div class="stat-sub">pago + a pagar</div>
    </div>
    <div class="stat-card sc-t">
      <div class="stat-lbl">Em USD (cotação atual)</div>
      <div class="stat-val" style="font-size:14px">${fmtUSD(totalGeral/taxaAtual)}</div>
      <div class="stat-sub">R$ ${taxaAtual.toFixed(2)}/USD</div>
    </div>
    <div class="stat-card ${vencidos>0?'sc-r':'sc-g'}">
      <div class="stat-lbl">Vencidos</div>
      <div class="stat-val" style="color:${vencidos>0?'var(--erro)':'var(--sucesso)'}">${vencidos}</div>
      <div class="stat-sub">aguardando pagamento</div>
    </div>`;
}

function mudarVisao(v, btn) {
  visaoAtual = v;
  document.querySelectorAll('.visao-tab').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  const filtros = document.getElementById('filtros-lanc');
  if (filtros) filtros.style.display = v==='lancamentos'?'flex':'none';
  renderConteudo();
}

function renderConteudo() {
  if (visaoAtual==='lancamentos') renderLancamentos();
  else if (visaoAtual==='atividades') renderPorAtividade();
  else if (visaoAtual==='resultados') renderPorResultado();
}

// ── VISÃO LANÇAMENTOS ─────────────────────────────────────────
function renderLancamentos() {
  const busca  = document.getElementById('busca')?.value.toLowerCase()||'';
  const sit    = document.getElementById('fil-sit')?.value||'';
  const ativId = document.getElementById('fil-ativ')?.value||'';
  const fornId = document.getElementById('fil-forn')?.value||'';
  const mes    = document.getElementById('fil-mes')?.value||'';

  const fil = todosLanc.filter(l => {
    const desc = (l.descricao||'').toLowerCase();
    const nf   = (l.numero_nf||'').toLowerCase();
    if (busca  && !desc.includes(busca) && !nf.includes(busca)) return false;
    if (sit    && l.situacao    !== sit)    return false;
    if (ativId && l.atividade_id !== ativId) return false;
    if (fornId && l.fornecedor_id !== fornId) return false;
    if (mes    && !(l.dt_vencimento||'').startsWith(mes)) return false;
    return true;
  });

  document.getElementById('cont-lanc').textContent = `${fil.length} de ${todosLanc.length} lançamentos`;

  if (!fil.length) {
    document.getElementById('conteudo-financeiro').innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">◉</div><div class="empty-state-msg">Nenhum lançamento encontrado.</div></div>`;
    return;
  }

  document.getElementById('conteudo-financeiro').innerHTML = `
    <div class="card">
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead><tr>
              <th>Descrição</th>
              <th style="width:80px">NF</th>
              <th style="width:90px">Atividade</th>
              <th style="width:150px">Fornecedor</th>
              <th style="width:90px">Vencimento</th>
              <th style="width:90px">Pagamento</th>
              <th style="width:110px;text-align:right">Valor R$</th>
              <th style="width:90px;text-align:right">Valor U$</th>
              <th style="width:90px">Situação</th>
              <th style="width:60px">Comp.</th>
              <th style="width:60px"></th>
            </tr></thead>
            <tbody>
              ${fil.map(l => {
                const vencido = l.situacao==='a_pagar'&&l.dt_vencimento&&new Date(l.dt_vencimento)<new Date();
                const taxaLanc = parseFloat(l.cotacao_uso || taxaAtual);
                const usd = parseFloat(l.valor_brl||0) / taxaLanc;
                return `<tr style="${vencido?'background:var(--erro-bg)':''}">
                  <td>
                    <div style="font-size:12px;font-weight:500;color:var(--cinza-900);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.descricao||'—'}</div>
                    ${l.elemento_despesa?`<div style="font-size:10px;color:var(--cinza-500)">${l.elemento_despesa}</div>`:''}
                    ${vencido?`<div style="font-size:10px;color:var(--erro);font-weight:600">⚠ Vencido</div>`:''}
                  </td>
                  <td><span class="nf-num">${l.numero_nf||'—'}</span></td>
                  <td><span style="font-family:var(--font-mono);font-size:11px">${l.atividades?.codigo||'—'}</span></td>
                  <td style="font-size:12px">${l.fornecedores?.nome?.substring(0,22)||l.contratos?.numero||'—'}</td>
                  <td style="font-size:12px">${fmtData(l.dt_vencimento)}</td>
                  <td style="font-size:12px;color:${l.dt_pagamento?'var(--sucesso)':'var(--cinza-400,#9CA3AF)'}">${l.dt_pagamento?fmtData(l.dt_pagamento):'—'}</td>
                  <td style="text-align:right;font-family:var(--font-mono);font-size:12px;font-weight:500">${fmtBRL(l.valor_brl)}</td>
                  <td style="text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--cinza-500)">${fmtUSD(usd)}</td>
                  <td><span class="sit-badge sit-${l.situacao}">${t('situacao',l.situacao)}</span></td>
                  <td style="text-align:center">
                    ${l.comprovante_url
                      ?`<button class="btn btn-sm btn-secondary" style="padding:3px 6px;font-size:10px" onclick="abrirComp('${l.id}','${l.comprovante_url}')">📎</button>`
                      :`<span style="font-size:11px;color:var(--cinza-300)">—</span>`}
                  </td>
                  <td style="white-space:nowrap;display:flex;gap:4px">
                    ${l.situacao==='a_pagar'
                      ? `<button class="btn btn-sm" style="background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;font-size:11px;padding:3px 9px;font-weight:600" onclick="abrirPagamento('${l.id}')" title="Efetivar pagamento">💳 Pagar</button>`
                      : ''}
                    <button class="btn btn-sm btn-secondary btn-icon" onclick="abrirEditar('${l.id}')" title="Editar">✏️</button>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="card-footer" style="display:flex;justify-content:flex-end;gap:16px;font-size:12px">
        <span>Total filtrado: <strong>${fmtBRL(fil.filter(l=>l.situacao!=='cancelado').reduce((s,l)=>s+parseFloat(l.valor_brl||0),0))}</strong></span>
        <span style="color:var(--sucesso)">Pago: <strong>${fmtBRL(fil.filter(l=>l.situacao==='pago').reduce((s,l)=>s+parseFloat(l.valor_brl||0),0))}</strong></span>
        <span style="color:var(--aviso)">A pagar: <strong>${fmtBRL(fil.filter(l=>l.situacao==='a_pagar').reduce((s,l)=>s+parseFloat(l.valor_brl||0),0))}</strong></span>
      </div>
    </div>`;
}

// ── VISÃO POR ATIVIDADE ───────────────────────────────────────
function renderPorAtividade() {
  // Agrupar lançamentos por atividade
  const porAtiv = {};
  todosLanc.filter(l=>l.situacao!=='cancelado').forEach(l => {
    const id = l.atividade_id || '__sem__';
    if (!porAtiv[id]) porAtiv[id] = { lancs:[], total:0, pago:0 };
    porAtiv[id].lancs.push(l);
    porAtiv[id].total += parseFloat(l.valor_brl||0);
    if (l.situacao==='pago') porAtiv[id].pago += parseFloat(l.valor_brl||0);
  });

  const linhas = atividades.map(a => {
    const dados = porAtiv[a.id] || { total:0, pago:0, lancs:[] };
    const orc = parseFloat(a.orcamento_usd||0) * taxaAtual;
    const pct = orc > 0 ? Math.min(dados.total/orc*100,100) : 0;
    const corBarra = pct>90?'crit':pct>70?'warn':'';
    return { a, dados, orc, pct, corBarra };
  }).filter(x => x.dados.total > 0 || x.orc > 0);

  document.getElementById('conteudo-financeiro').innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">Execução por Atividade</span>
        <span style="font-size:11px;color:var(--cinza-500)">Cotação: R$ ${taxaAtual.toFixed(2)}/USD</span>
      </div>
      <div class="card-body" style="padding:8px 16px">
        ${linhas.length ? linhas.map(({a,dados,orc,pct,corBarra}) => `
          <div class="ativ-row">
            <span class="ativ-cod">${a.codigo}</span>
            <span class="ativ-nome" title="${a.nome_pt||''}">${(a.nome_pt||'').substring(0,50)}</span>
            <div class="ativ-barra">
              <div class="ativ-barra-bg">
                <div class="ativ-barra-fill ${corBarra}" style="width:${pct}%"></div>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--cinza-500);margin-top:2px">
                <span>Orç: ${fmtBRL(orc)}</span>
                <span>${Math.round(pct)}%</span>
              </div>
            </div>
            <div class="ativ-valor">${fmtBRL(dados.total)}</div>
            <div class="ativ-pct" style="color:${pct>90?'var(--erro)':pct>70?'var(--aviso)':'var(--cinza-700)'}">
              ${Math.round(pct)}%
            </div>
            <button class="btn btn-sm btn-secondary" style="font-size:10px;padding:3px 8px"
              onclick="filtrarPorAtiv('${a.id}')">Ver</button>
          </div>`).join('') :
          `<div class="empty-state"><div class="empty-state-msg">Nenhum lançamento registrado.</div></div>`}
      </div>
    </div>`;
}

// ── VISÃO POR RESULTADO ───────────────────────────────────────
function renderPorResultado() {
  const resMap = {};
  resultados.forEach(r => { resMap[r.id] = { res:r, total:0, pago:0, aPagar:0 }; });

  todosLanc.filter(l=>l.situacao!=='cancelado').forEach(l => {
    const ativ = atividades.find(a=>a.id===l.atividade_id);
    const rId = ativ?.resultado_id;
    if (rId && resMap[rId]) {
      resMap[rId].total += parseFloat(l.valor_brl||0);
      if (l.situacao==='pago') resMap[rId].pago += parseFloat(l.valor_brl||0);
      else resMap[rId].aPagar += parseFloat(l.valor_brl||0);
    }
  });

  const cores = ['#1D9E75','#2563EB','#7F77DD','#BA7517'];

  document.getElementById('conteudo-financeiro').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      ${resultados.map((r,i) => {
        const d = resMap[r.id] || {total:0,pago:0,aPagar:0};
        const orc = parseFloat(r.orcamento_usd||0)*taxaAtual;
        const pct = orc>0?Math.min(d.total/orc*100,100):0;
        const nome = campo(r,'nome');
        return `
        <div class="resultado-bloco">
          <div class="resultado-header" style="border-left:4px solid ${cores[i%4]}">
            <span class="resultado-codigo">${r.codigo}</span>
            <span class="resultado-nome">${nome.substring(0,55)}${nome.length>55?'…':''}</span>
          </div>
          <div class="resultado-body">
            <div style="margin-bottom:10px">
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--cinza-500);margin-bottom:4px">
                <span>Executado: ${fmtBRL(d.total)}</span>
                <span>Orçamento: ${fmtBRL(orc)}</span>
              </div>
              <div style="height:8px;background:var(--cinza-100);border-radius:4px;overflow:hidden">
                <div style="height:100%;background:${cores[i%4]};width:${pct}%;border-radius:4px;transition:width .4s"></div>
              </div>
              <div style="text-align:right;font-size:10px;color:var(--cinza-500);margin-top:2px">${Math.round(pct)}% executado</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
              ${[
                ['Pago',fmtBRL(d.pago),'var(--sucesso)'],
                ['A Pagar',fmtBRL(d.aPagar),'var(--aviso)'],
                ['Em USD',fmtUSD(d.total/taxaAtual),'var(--cinza-700)'],
              ].map(([l,v,c])=>`
                <div style="text-align:center;background:var(--cinza-50);border-radius:var(--raio);padding:8px">
                  <div style="font-size:9px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">${l}</div>
                  <div style="font-size:12px;font-weight:600;font-family:var(--font-mono);color:${c}">${v}</div>
                </div>`).join('')}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function filtrarPorAtiv(id) {
  mudarVisao('lancamentos', document.querySelector('.visao-tab'));
  document.getElementById('fil-ativ').value = id;
  renderLancamentos();
}

// ── NOVO / EDITAR LANÇAMENTO ──────────────────────────────────
function abrirNovo() {
  lancEditando = null; arquivoComp = null;
  document.getElementById('ml-titulo').textContent = 'Novo Lançamento';
  renderFormLanc(null);
  document.getElementById('ml-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarLanc()">Registrar lançamento</button>`;
  document.getElementById('modal-lanc').classList.add('aberto');
}

function abrirEditar(id) {
  lancEditando = todosLanc.find(l=>l.id===id);
  if (!lancEditando) return;
  arquivoComp = null;
  document.getElementById('ml-titulo').textContent = 'Editar Lançamento';
  renderFormLanc(lancEditando);
  document.getElementById('ml-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-danger btn-sm" onclick="cancelarLanc('${id}')">Cancelar lançamento</button>
    <button class="btn btn-primary" onclick="salvarLanc()">Salvar alterações</button>`;
  document.getElementById('modal-lanc').classList.add('aberto');
}

function _optsContratos(atividadeId, contratoSelId) {
  const lista = atividadeId
    ? contratos.filter(c => c.atividade_id === atividadeId)
    : contratos;
  return `<option value="">— Sem contrato —</option>` +
    lista.map(c => {
      const obj = c.objeto_pt ? ` — ${c.objeto_pt.substring(0,38)}` : '';
      return `<option value="${c.id}" ${c.id===contratoSelId?'selected':''}>${c.numero}${obj}</option>`;
    }).join('');
}

function _renderPainelSaldo(contrato) {
  if (!contrato) return '';
  const total    = parseFloat(contrato.valor_total_brl || 0);
  const utilizado= parseFloat(contrato.valor_utilizado_brl || 0);
  const saldo    = parseFloat(contrato.saldo_brl ?? (total - utilizado));
  const pct      = total > 0 ? Math.min(utilizado / total * 100, 100) : 0;
  const corBarra = pct >= 90 ? '#DC2626' : pct >= 70 ? '#D97706' : '#059669';
  const corSaldo = saldo < 0 ? 'var(--erro)' : saldo === 0 ? 'var(--cinza-500)' : 'var(--sucesso)';
  return `
    <div id="painel-saldo" style="background:var(--cinza-50);border:1px solid var(--borda);
      border-radius:var(--raio);padding:12px 14px;margin-bottom:14px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
        color:var(--cinza-500);margin-bottom:10px;">📋 Saldo do Contrato: ${contrato.numero}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;">
        <div style="text-align:center;background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio);padding:8px 4px">
          <div style="font-size:9px;color:var(--cinza-500);text-transform:uppercase;margin-bottom:3px">Valor Total</div>
          <div style="font-size:12px;font-weight:700;font-family:var(--font-mono);color:var(--cinza-800)">${fmtBRL(total)}</div>
        </div>
        <div style="text-align:center;background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio);padding:8px 4px">
          <div style="font-size:9px;color:var(--cinza-500);text-transform:uppercase;margin-bottom:3px">Utilizado</div>
          <div style="font-size:12px;font-weight:700;font-family:var(--font-mono);color:var(--aviso)">${fmtBRL(utilizado)}</div>
        </div>
        <div style="text-align:center;background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio);padding:8px 4px">
          <div style="font-size:9px;color:var(--cinza-500);text-transform:uppercase;margin-bottom:3px">Saldo</div>
          <div style="font-size:12px;font-weight:700;font-family:var(--font-mono);color:${corSaldo}">${fmtBRL(saldo)}</div>
        </div>
      </div>
      <div style="height:6px;background:var(--cinza-200);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${corBarra};border-radius:3px;transition:width .4s"></div>
      </div>
      <div style="font-size:10px;color:var(--cinza-500);margin-top:4px;text-align:right">${Math.round(pct)}% utilizado</div>
    </div>`;
}

function renderFormLanc(l) {
  const atividadeId  = l?.atividade_id  || '';
  const contratoId   = l?.contrato_id   || '';
  const fornecedorId = l?.fornecedor_id || '';
  const contratoSel  = contratos.find(c => c.id === contratoId);
  const fornAutoId   = contratoSel?.fornecedor_id || '';
  const fornAtivo    = fornecedorId || fornAutoId;
  const contsFiltrados = atividadeId ? contratos.filter(c=>c.atividade_id===atividadeId) : contratos;
  const qtdConts = contsFiltrados.length;

  document.getElementById('ml-body').innerHTML = `
    <div class="form-group">
      <label class="form-label">Descrição <span class="obrig">*</span></label>
      <input class="form-control" id="f-desc" type="text" value="${l?.descricao||''}"
        placeholder="Ex: Pagamento consultoria — Produto 1">
    </div>

    <div class="grid-2">
      <!-- 1. ATIVIDADE -->
      <div class="form-group">
        <label class="form-label">Atividade <span class="obrig">*</span></label>
        <select class="form-control" id="f-ativ" onchange="cascataAtividade(this.value)">
          <option value="">Selecione a atividade...</option>
          ${atividades.map(a=>`<option value="${a.id}" ${atividadeId===a.id?'selected':''}>${a.codigo} — ${(a.nome_pt||'').substring(0,38)}</option>`).join('')}
        </select>
      </div>
      <!-- 2. CONTRATO filtrado -->
      <div class="form-group">
        <label class="form-label">Contrato</label>
        <select class="form-control" id="f-cont" onchange="cascataContrato(this.value)">
          ${_optsContratos(atividadeId, contratoId)}
        </select>
        <div id="hint-cont" class="form-hint" style="color:${atividadeId?(qtdConts?'var(--verde-600)':'var(--aviso)'):'var(--cinza-400)'};margin-top:3px">
          ${atividadeId
            ? (qtdConts ? `✓ ${qtdConts} contrato(s) vinculado(s) à atividade` : '⚠ Nenhum contrato vinculado a esta atividade')
            : 'Selecione uma atividade para filtrar os contratos'}
        </div>
      </div>
    </div>

    <!-- 3. PAINEL DE SALDO (visível apenas se contrato selecionado) -->
    <div id="wrap-saldo">${contratoSel ? _renderPainelSaldo(contratoSel) : ''}</div>

    <!-- 3b. PRODUTOS PENDENTES DO CONTRATO -->
    <div id="wrap-prod-pendentes">${contratoId ? '<div style="font-size:11px;color:var(--cinza-400);padding:4px 0">Carregando produtos...</div>' : ''}</div>

    <!-- 4. FORNECEDOR automático -->
    <div class="form-group">
      <label class="form-label">Fornecedor</label>
      <select class="form-control" id="f-forn"
        style="${fornAutoId?'background:var(--sucesso-bg);border-color:#6EE7B7':''}">
        <option value="">— Sem fornecedor —</option>
        ${fornecedores.map(f=>`<option value="${f.id}" ${f.id===fornAtivo?'selected':''}>${f.nome} (${f.tipo})</option>`).join('')}
      </select>
      <div id="hint-forn" class="form-hint" style="color:var(--verde-600);margin-top:3px;${fornAutoId?'':'display:none'}">
        ✓ Fornecedor preenchido automaticamente pelo contrato selecionado
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Valor R$ <span class="obrig">*</span></label>
        <input class="form-control" id="f-brl" type="number" step="0.01"
          value="${l?.valor_brl||''}" placeholder="0,00"
          oninput="calcUSD(this.value)">
        <div style="font-size:11px;color:var(--cinza-500);margin-top:4px">
          ≈ <span id="usd-preview" style="font-family:var(--font-mono);font-weight:600">${l?.valor_brl?fmtUSD(parseFloat(l.valor_brl)/(l?.cotacao_uso||taxaAtual)):'—'}</span>
          ${l?.cotacao_travada_em
            ? `<span style="margin-left:6px;font-size:10px;background:#ECFDF5;color:#065F46;padding:1px 7px;border-radius:99px;font-weight:700">
                🔒 cotação travada R$ ${parseFloat(l.cotacao_uso).toFixed(4)} · ${new Date(l.cotacao_travada_em).toLocaleDateString('pt-BR')}
               </span>`
            : `<span style="color:var(--cinza-400)">(cotação estimada R$ ${taxaAtual.toFixed(4)}/USD · trava ao pagar)</span>`
          }
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Número da Nota Fiscal</label>
        <input class="form-control" id="f-nf" type="text"
          value="${l?.numero_nf||''}" placeholder="Ex: NF-12345"
          style="font-family:var(--font-mono)">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Data de vencimento</label>
        <input class="form-control" id="f-venc" type="date" value="${l?.dt_vencimento||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Data de pagamento</label>
        <input class="form-control" id="f-pgto" type="date" value="${l?.dt_pagamento||''}">
        <div class="form-hint">Preencha apenas quando efetivamente pago.</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Situação</label>
        ${(() => {
          const sit = l?.situacao || 'a_pagar';
          if (!l) {
            // Novo lançamento: sempre A Pagar, sem seleção
            return `<div style="display:flex;align-items:center;gap:8px;height:36px">
              <span class="sit-badge sit-a_pagar">A Pagar</span>
              <span style="font-size:11px;color:var(--cinza-400)">Novo lançamento sempre inicia como A Pagar</span>
            </div>
            <input type="hidden" id="f-sit" value="a_pagar">`;
          }

        <button class="btn btn-sm btn-secondary" style="margin-left:8px" onclick="abrirComp('${l.id}','${l.comprovante_url}')">Abrir</button>
      </div>`:''}
      <div class="upload-mini ${l?.comprovante_url?'tem':''}" id="upload-comp"
        onclick="document.getElementById('inp-comp').click()">
        ${l?.comprovante_url?'✓ Substituir comprovante':'📎 Clique para anexar comprovante (.pdf, .jpg, .png)'}

          onchange="selecionarComp(this.files[0])">

  // Se já tem contrato (edição), carregar produtos pendentes
  if (contratoId) {
    setTimeout(() => carregarProdutosPendentes(contratoId), 60);
  }
}

// ── CASCATA INTELIGENTE ───────────────────────────────────────
function cascataAtividade(atividadeId) {
  // Refiltrar contratos
  const contsFiltrados = atividadeId
    ? contratos.filter(c => c.atividade_id === atividadeId)
    : contratos;

  const selCont = document.getElementById('f-cont');
  if (selCont) selCont.innerHTML = _optsContratos(atividadeId, '');

  const hintCont = document.getElementById('hint-cont');
  if (hintCont) {
    if (!atividadeId) {
      hintCont.style.color = 'var(--cinza-400)';
      hintCont.textContent = 'Selecione uma atividade para filtrar os contratos';
    } else if (contsFiltrados.length === 0) {
      hintCont.style.color = 'var(--aviso)';
      hintCont.textContent = '⚠ Nenhum contrato vinculado a esta atividade';
    } else {
      hintCont.style.color = 'var(--verde-600,#059669)';
      hintCont.textContent = `✓ ${contsFiltrados.length} contrato(s) vinculado(s) à atividade`;
    }
  }

  // Limpar saldo e fornecedor ao mudar atividade
  cascataContrato('');
}

function cascataContrato(contratoId) {
  const contrato = contratos.find(c => c.id === contratoId);

  // Painel de saldo
  const wrapSaldo = document.getElementById('wrap-saldo');
  if (wrapSaldo) {
    wrapSaldo.innerHTML = contrato ? _renderPainelSaldo(contrato) : '';
  }

  // Fornecedor automático
  const selForn = document.getElementById('f-forn');
  const hintForn = document.getElementById('hint-forn');
  if (selForn) {
    if (contrato?.fornecedor_id) {
      selForn.value = contrato.fornecedor_id;
      selForn.style.background = 'var(--sucesso-bg)';
      selForn.style.borderColor = '#6EE7B7';
      if (hintForn) hintForn.style.display = '';
    } else {
      selForn.value = '';
      selForn.style.background = '';
      selForn.style.borderColor = '';
      if (hintForn) hintForn.style.display = 'none';
    }
  }

  // Painel de produtos pendentes
  const wrapProd = document.getElementById('wrap-prod-pendentes');
  if (wrapProd) {
    if (contratoId) {
      wrapProd.innerHTML = '<div style="font-size:11px;color:var(--cinza-400);padding:6px 0">Buscando produtos pendentes...</div>';
      carregarProdutosPendentes(contratoId);
    } else {
      wrapProd.innerHTML = '';
    }
  }
}

async function carregarProdutosPendentes(contratoId) {
  const wrap = document.getElementById('wrap-prod-pendentes');
  if (!wrap) return;
  try {
    const { data } = await db.from('contratos_produtos')
      .select('id,numero_produto,descricao,valor_brl,dt_vencimento,situacao')
      .eq('contrato_id', contratoId)
      .in('situacao', ['pendente','em_analise'])
      .order('numero_produto', {ascending: true});

    if (!data || !data.length) {
      wrap.innerHTML = '<div style="font-size:11px;color:var(--cinza-400);padding:4px 0">Nenhum produto pendente neste contrato.</div>';
      return;
    }

    wrap.innerHTML = `
      <div style="margin-top:4px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--cinza-500);margin-bottom:6px">
          Produtos pendentes — clique para preencher automaticamente
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${data.map(p => {
            const vencido = p.dt_vencimento && new Date(p.dt_vencimento) < new Date();
            const corBorda = vencido ? '#FCA5A5' : '#9FE1CB';
            const corFundo = vencido ? '#FEF2F2' : 'var(--sucesso-bg)';
            const corNum   = vencido ? 'var(--erro)' : 'var(--verde-medio)';
            return `<button type="button"
              onclick="preencherDeProduto('${p.id}',${p.numero_produto},'${(p.descricao||'').replace(/'/g,"\\'")}',${parseFloat(p.valor_brl||0)},'${p.dt_vencimento||''}')"
              style="border:1px solid ${corBorda};background:${corFundo};border-radius:var(--raio);
                padding:6px 10px;cursor:pointer;text-align:left;font-family:var(--font-sans)">
              <div style="font-size:9px;font-weight:700;color:${corNum};text-transform:uppercase;letter-spacing:.05em">
                Produto ${p.numero_produto}${vencido?' ⚠ Vencido':''}
              </div>
              <div style="font-size:11px;font-weight:500;color:var(--cinza-800);max-width:200px;
                overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.descricao}</div>
              <div style="font-size:11px;font-family:var(--font-mono);color:var(--verde-medio);font-weight:700">
                ${fmtBRL(parseFloat(p.valor_brl||0))}
              </div>
            </button>`;
          }).join('')}
        </div>
      </div>`;
  } catch(e) {
    wrap.innerHTML = '';
  }
}

function preencherDeProduto(prodId, numProd, desc, valor, dtVenc) {
  const fDesc = document.getElementById('f-desc');
  const fBrl  = document.getElementById('f-brl');
  const fVenc = document.getElementById('f-venc');
  if (fDesc && !fDesc.value) fDesc.value = desc;
  if (fBrl  && !fBrl.value)  { fBrl.value = valor; calcUSD(valor); }
  if (fVenc && !fVenc.value && dtVenc) fVenc.value = dtVenc;

  // Guardar referência oculta do produto selecionado para o salvarLanc usar
  let hidden = document.getElementById('f-num-produto');
  if (!hidden) {
    hidden = document.createElement('input');
    hidden.type = 'hidden'; hidden.id = 'f-num-produto';
    document.getElementById('ml-body').appendChild(hidden);
  }
  hidden.value = numProd;

  // Guardar também o id do produto para vincular lancamento_id depois
  let hiddenProdId = document.getElementById('f-prod-id');
  if (!hiddenProdId) {
    hiddenProdId = document.createElement('input');
    hiddenProdId.type = 'hidden'; hiddenProdId.id = 'f-prod-id';
    document.getElementById('ml-body').appendChild(hiddenProdId);
  }
  hiddenProdId.value = prodId;

  // Marcar produto selecionado visualmente
  document.querySelectorAll('#wrap-prod-pendentes button').forEach(b => {
    const match = b.getAttribute('onclick')?.includes(`'${prodId}'`);
    b.style.opacity = match ? '1' : '0.4';
    b.style.outline = match ? '2px solid var(--verde-medio)' : 'none';
  });
  toast('Campos preenchidos com os dados do Produto '+numProd+'. Confira e salve.','info');
}

function calcUSD(val) {
  const brl  = parseFloat(val) || 0;
  const taxa = (lancEditando?.cotacao_travada_em && lancEditando?.situacao === 'pago')
    ? parseFloat(lancEditando.cotacao_uso)
    : taxaAtual;
  const el = document.getElementById('usd-preview');
  if (el) el.textContent = brl > 0 ? fmtUSD(brl / taxa) : '—';
}

function selecionarComp(file) {
  if (!file) return;
  arquivoComp = file;
  const el = document.getElementById('upload-comp');
  if (el) { el.classList.add('tem'); el.querySelector('input').style.display='none';
    el.textContent = `✓ ${file.name} selecionado`; }
}

async function salvarLanc() {
  const desc = document.getElementById('f-desc').value.trim();
  const ativId = document.getElementById('f-ativ').value;
  const brl = parseFloat(document.getElementById('f-brl').value)||0;

  if (!desc || !ativId || !brl) {
    toast('Preencha descrição, atividade e valor.','error'); return;
  }

  const jaTravo = lancEditando?.cotacao_travada_em && lancEditando?.situacao === 'pago';

  const numProduto = parseInt(document.getElementById('f-num-produto')?.value) || null;
  const produtoId  = document.getElementById('f-prod-id')?.value || null;

  const dados = {
    descricao: desc,
    atividade_id: ativId,
    contrato_id: document.getElementById('f-cont').value||null,
    fornecedor_id: document.getElementById('f-forn').value||null,
    valor_brl: brl,
    valor_usd: jaTravo
      ? lancEditando.valor_usd
      : parseFloat((brl / taxaAtual).toFixed(2)),
    cotacao_uso: jaTravo
      ? lancEditando.cotacao_uso
      : taxaAtual,
    numero_nf: document.getElementById('f-nf').value.trim()||null,
    numero_produto: numProduto,
    dt_vencimento: document.getElementById('f-venc').value||null,
    dt_pagamento: document.getElementById('f-pgto').value||null,
    situacao: document.getElementById('f-sit').value,
    elemento_despesa: document.getElementById('f-elem').value.trim()||null,
    observacoes: document.getElementById('f-obs').value.trim()||null,
  };

  try {
    let id = lancEditando?.id;
    if (!lancEditando) {
      const {data,error} = await db.from('execucao_financeira')
        .insert({...dados, criado_por:appState.usuario.id})
        .select(`*,atividades(id,codigo,nome_pt,resultado_id),contratos(id,numero),fornecedores(id,nome,tipo)`)
        .single();
      if (error) throw error;
      id = data.id;
      todosLanc.unshift(data);
      toast('Lançamento registrado!','success');
    } else {
      const {error} = await db.from('execucao_financeira').update(dados).eq('id',lancEditando.id);
      if (error) throw error;
      Object.assign(lancEditando, dados);
      toast('Lançamento atualizado!','success');
    }

    // Vincular lancamento_id no produto se veio de um produto pendente
    if (produtoId && id) {
      await db.from('contratos_produtos')
        .update({ lancamento_id: id })
        .eq('id', produtoId);
    }
    if (arquivoComp && id) {
      const ext = arquivoComp.name.split('.').pop();
      const path = `comprovante-${id}.${ext}`;
      const {error:upErr} = await db.storage.from('tdrs-arquivos').upload(path,arquivoComp,{upsert:true});
      if (!upErr) {
        const {data:urlData} = db.storage.from('tdrs-arquivos').getPublicUrl(path);
        await db.from('execucao_financeira').update({
          comprovante_url: urlData.publicUrl, comprovante_nome: arquivoComp.name
        }).eq('id',id);
        const lanc = todosLanc.find(l=>l.id===id);
        if (lanc) { lanc.comprovante_url=urlData.publicUrl; lanc.comprovante_nome=arquivoComp.name; }
      }
    }

    fecharModal();
    renderStats();
    renderConteudo();
  } catch(e) {
    toast('Erro ao salvar: '+(e.message||''),'error');
  }
}

async function cancelarLanc(id) {
  if (!confirm('Cancelar este lançamento?')) return;
  await db.from('execucao_financeira').update({situacao:'cancelado'}).eq('id',id);
  const l = todosLanc.find(x=>x.id===id);
  if (l) l.situacao = 'cancelado';
  fecharModal();
  renderStats(); renderConteudo();
  toast('Lançamento cancelado.','info');
}

async function abrirComp(lancId, url) {
  try {
    const urlObj = new URL(url);
    const match = urlObj.pathname.match(/\/object\/public\/tdrs-arquivos\/(.+)/);
    if (match) {
      const {data,error} = await db.storage.from('tdrs-arquivos').createSignedUrl(match[1],3600);
      if (!error && data?.signedUrl) { window.open(data.signedUrl,'_blank'); return; }
    }
    window.open(url,'_blank');
  } catch(e) { window.open(url,'_blank'); }
}

// ── EXPORTAR CSV ──────────────────────────────────────────────
function exportarCSV() {
  const headers = ['Descrição','NF','Atividade','Fornecedor','Contrato','Vencimento','Pagamento','Valor R$','Valor U$','Situação','Elemento Despesa'];
  const rows = todosLanc.map(l => [
    `"${(l.descricao||'').replace(/"/g,'""')}"`,
    l.numero_nf||'',
    l.atividades?.codigo||'',
    `"${(l.fornecedores?.nome||l.contratos?.numero||'').replace(/"/g,'""')}"`,
    l.contratos?.numero||'',
    l.dt_vencimento||'',
    l.dt_pagamento||'',
    (l.valor_brl||0).toString().replace('.',','),
    ((parseFloat(l.valor_brl||0)/taxaAtual).toFixed(2)).replace('.',','),
    l.situacao||'',
    l.elemento_despesa||''
  ]);

  const csv = [headers.join(';'), ...rows.map(r=>r.join(';'))].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `financeiro-dima-${new Date().toISOString().split('T')[0]}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('CSV exportado com sucesso!','success');
}

    <!-- Cotação UNESCO + comparativo -->
    <div style="background:#F0F9FF;border:1px solid #BAE6FD;border-radius:var(--raio);padding:14px 16px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#0369A1;margin-bottom:12px">
        💱 Câmbio do Pagamento
      </div>
      <div class="grid-2" style="margin-bottom:10px">
        <div class="form-group" style="margin:0">
          <label class="form-label">Cotação UNESCO (UNORE) <span class="obrig">*</span></label>
          <input class="form-control" type="number" id="pgto-cotacao-unesco" step="0.0001" min="0.01"
            placeholder="Ex: 5.6500"
            value="${taxaUnescoUltima ? taxaUnescoUltima.toFixed(4) : ''}"
            oninput="atualizarComparativoCotacao()"
            style="font-family:var(--font-mono)">
          <div class="form-hint">Taxa operacional do período (UNORE)</div>
        </div>
        <div style="font-size:11px;color:#0369A1;line-height:1.7;padding-top:22px">
          <div>📊 Cotação mercado (hoje): <strong style="font-family:var(--font-mono)">R$ ${taxaLanc.toFixed(4)}</strong></div>
          <div id="pgto-usd-unesco" style="margin-top:4px">Informe a cotação UNESCO</div>
        </div>
      </div>
      <div id="pgto-comparativo" style="display:none;margin-top:8px;padding-top:10px;border-top:1px solid #BAE6FD"></div>
    </div>`;

  document.getElementById('pgto-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="fecharModalPgto()">Cancelar</button>
    <button class="btn btn-primary" style="background:#059669;border-color:#059669" onclick="confirmarPagamento()">
      ✓ Confirmar Pagamento
    </button>`;
}

function atualizarComparativoCotacao() {
  const l = lancPagando;
  if (!l) return;
  const cotUNESCO = parseFloat(document.getElementById('pgto-cotacao-unesco')?.value) || 0;
  const valorBRL  = parseFloat(l.valor_brl || 0);
  const elUSD     = document.getElementById('pgto-usd-unesco');
  const elComp    = document.getElementById('pgto-comparativo');
  if (!cotUNESCO || cotUNESCO <= 0) {
    if (elUSD)  elUSD.textContent  = 'Informe a cotação UNESCO';
    if (elComp) elComp.style.display = 'none';
    return;
  }
  const usdUnesco  = valorBRL / cotUNESCO;
  const usdMercado = valorBRL / taxaAtual;
  const difUSD     = usdUnesco - usdMercado;
  const difPct     = (difUSD / usdMercado) * 100;
  const positivo   = difUSD >= 0;

  if (elUSD) elUSD.innerHTML =
    `Valor oficial UNESCO: <strong style="font-family:var(--font-mono);color:#0369A1">USD ${usdUnesco.toFixed(2)}</strong>`;

  if (elComp) {
    elComp.style.display = 'block';
    elComp.innerHTML = `
      <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:12px">
        <div>
          <div style="font-size:10px;color:#0369A1;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Valor pelo câmbio UNESCO</div>
          <div style="font-family:var(--font-mono);font-weight:700;font-size:14px;color:#0369A1">USD ${usdUnesco.toFixed(2)}</div>
          <div style="font-size:10px;color:#6B7280">R$ ${valorBRL.toLocaleString('pt-BR',{minimumFractionDigits:2})} ÷ ${cotUNESCO.toFixed(4)}</div>
        </div>
        <div style="color:var(--cinza-300);display:flex;align-items:center;font-size:20px">vs</div>
        <div>
          <div style="font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Valor pelo câmbio de mercado</div>
          <div style="font-family:var(--font-mono);font-weight:700;font-size:14px;color:var(--cinza-700)">USD ${usdMercado.toFixed(2)}</div>
          <div style="font-size:10px;color:#6B7280">R$ ${valorBRL.toLocaleString('pt-BR',{minimumFractionDigits:2})} ÷ ${taxaAtual.toFixed(4)}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;color:var(--cinza-500)">Impacto financeiro</div>
          <div style="font-family:var(--font-mono);font-weight:700;font-size:14px;color:${positivo?'#059669':'#DC2626'}">
            ${positivo?'+':''}USD ${difUSD.toFixed(2)}
          </div>
          <div style="font-size:10px;color:${positivo?'#059669':'#DC2626'}">
            ${positivo?'▲':'▼'} ${Math.abs(difPct).toFixed(2)}% ${positivo?'a mais pelo câmbio UNESCO':'a menos pelo câmbio UNESCO'}
          </div>
        </div>
      </div>`;
  }
}

async function confirmarPagamento() {
  const dtPgto      = document.getElementById('pgto-data')?.value;
  const cotUNESCO   = parseFloat(document.getElementById('pgto-cotacao-unesco')?.value) || 0;
  if (!dtPgto)     { toast('Informe a data do pagamento.','error');    return; }
  if (!cotUNESCO)  { toast('Informe a cotação UNESCO (UNORE).','error'); return; }

  const l          = lancPagando;
  const valorBRL   = parseFloat(l.valor_brl || 0);
  const nf         = document.getElementById('pgto-nf')?.value.trim() || l.numero_nf || null;
  const obs        = document.getElementById('pgto-obs')?.value.trim() || null;
  const usdUnesco  = parseFloat((valorBRL / cotUNESCO).toFixed(2));
  const usdMercado = parseFloat((valorBRL / taxaAtual).toFixed(2));
  const impactoUSD = parseFloat((usdUnesco - usdMercado).toFixed(2));

  // Lembra para próximo pagamento
  taxaUnescoUltima = cotUNESCO;

  try {
    const dados = {
      situacao:           'pago',
      dt_pagamento:       dtPgto,
      numero_nf:          nf,
      observacoes:        obs,
      cotacao_uso:        taxaAtual,         // câmbio de mercado (AwesomeAPI)
      cotacao_unesco:     cotUNESCO,         // câmbio operacional UNESCO
      cotacao_travada_em: new Date().toISOString(),
      valor_usd:          usdUnesco,         // valor oficial = câmbio UNESCO
      valor_usd_unesco:   usdUnesco,
      impacto_usd:        impactoUSD,        // diferença vs mercado
      atualizado_em:      new Date().toISOString()
    };

    const { error } = await db.from('execucao_financeira').update(dados).eq('id', l.id);
    if (error) throw error;

    // Upload comprovante se selecionado
    if (arquivoPgto) {
      const ext  = arquivoPgto.name.split('.').pop();
      const path = `comprovante-${l.id}.${ext}`;
      const { error: upErr } = await db.storage.from('tdrs-arquivos')
        .upload(path, arquivoPgto, { upsert: true, contentType: arquivoPgto.type });
      if (!upErr) {
        const { data: urlData } = db.storage.from('tdrs-arquivos').getPublicUrl(path);
        await db.from('execucao_financeira').update({
          comprovante_url:  urlData.publicUrl,
          comprovante_nome: arquivoPgto.name
        }).eq('id', l.id);
        dados.comprovante_url  = urlData.publicUrl;
        dados.comprovante_nome = arquivoPgto.name;
      }
    }

    // Atualiza local
    Object.assign(l, dados);
    fecharModalPgto();
    renderStats();
    renderConteudo();
    toast('Pagamento registrado com sucesso!', 'success');

  } catch(e) {
    toast('Erro ao registrar pagamento: ' + e.message, 'error');
  }
}

function selecionarArquivoPgto(file) {
  if (!file) return;
  arquivoPgto = file;
  const wrap = document.getElementById('pgto-upload-wrap');
  if (wrap) { wrap.classList.add('tem'); wrap.innerHTML = `✓ ${file.name} selecionado`; }
}

function fecharModalPgto() {
  document.getElementById('modal-pgto').classList.remove('aberto');
  lancPagando = null; arquivoPgto = null;
}

function fecharModal() {
  document.getElementById('modal-lanc').classList.remove('aberto');
  lancEditando = null; arquivoComp = null;
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal-pgto').classList.contains('aberto')) fecharModalPgto();
    else fecharModal();
  }
});
</script>
</body>
</html>
