<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Matriz de Resultados</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<style>
/* ── Stats ── */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc-g::after{background:var(--verde-claro)}.sc-b::after{background:#2563EB}
.sc-a::after{background:var(--aviso)}.sc-r::after{background:var(--erro)}.sc-t::after{background:#0D9488}
.stat-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:600;color:var(--cinza-900);}
.stat-sub{font-size:10px;color:var(--cinza-500);margin-top:3px;}

/* ── Main tabs ── */
.main-tabs{display:flex;gap:0;border-bottom:2px solid var(--borda);margin-bottom:18px;}
.main-tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--cinza-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);white-space:nowrap;}
.main-tab.ativo{color:var(--verde-medio);border-bottom-color:var(--verde-medio);font-weight:600;}
.main-tab-content{display:none;}
.main-tab-content.ativo{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Resultado accordion ── */
.resultado-bloco{margin-bottom:12px;border:1px solid var(--borda);border-radius:var(--raio-lg);overflow:hidden;}
.resultado-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--cinza-50);cursor:pointer;user-select:none;}
.resultado-header:hover{background:var(--cinza-100);}
.resultado-codigo{font-family:var(--font-mono);font-size:12px;font-weight:700;padding:3px 10px;border-radius:4px;color:#fff;flex-shrink:0;}
.rc-1{background:#1D9E75}.rc-2{background:#2563EB}.rc-3{background:#7F77DD}
.resultado-nome-txt{font-size:13px;font-weight:600;color:var(--cinza-900);flex:1;line-height:1.3;}

/* ── Produto group ── */
.produto-group{border-top:1px solid var(--borda);background:var(--branco);}
.produto-label{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#F8FAFF;border-top:1px solid var(--borda);cursor:pointer;}
.produto-label:hover{background:#F0F4FF;}
.produto-cod{font-family:var(--font-mono);font-size:11px;font-weight:700;color:#2563EB;background:#EFF6FF;padding:2px 8px;border-radius:3px;}
.produto-titulo-txt{font-size:12px;font-weight:500;color:var(--cinza-700);flex:1;}

/* ── Indicador card ── */
.ind-card{padding:12px 16px;border-top:1px solid var(--borda);border-left:4px solid transparent;cursor:pointer;transition:background .1s;}
.ind-card:hover{background:var(--cinza-50);}
.ind-card.risco-ok{border-left-color:#059669;}
.ind-card.risco-med{border-left-color:#D97706;}
.ind-card.risco-alto{border-left-color:#DC2626;}
.ind-card.risco-sem{border-left-color:var(--cinza-300);}
.ind-header{display:flex;align-items:flex-start;gap:10px;}
.ind-num{font-family:var(--font-mono);font-size:10px;font-weight:700;background:var(--cinza-100);padding:2px 7px;border-radius:3px;color:var(--cinza-600);flex-shrink:0;margin-top:2px;}
.ind-nome{font-size:12px;font-weight:500;color:var(--cinza-900);flex:1;line-height:1.4;}
.ind-badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;align-items:flex-start;}

.ind-prog{margin-top:8px;display:flex;align-items:center;gap:10px;}
.prog-bar-wrap{flex:1;height:6px;background:var(--cinza-100);border-radius:3px;overflow:hidden;position:relative;}
.prog-fill-conf{height:100%;background:#059669;border-radius:3px;transition:width .5s;position:absolute;left:0;}
.prog-fill-pend{height:100%;background:#FCD34D;border-radius:3px;transition:width .5s;position:absolute;}
.ind-prog-nums{font-size:10px;color:var(--cinza-500);white-space:nowrap;text-align:right;min-width:90px;}
.ind-pct{font-family:var(--font-mono);font-size:13px;font-weight:700;min-width:38px;text-align:right;}

/* ── Chips ── */
.ods-chip{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#EFF6FF;color:#1D4ED8;}
.km-chip{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#EDE9FE;color:#5B21B6;}
.pend-chip{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#FEF3C7;color:#92400E;}
.conf-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;}
.cb-ok{background:#D1FAE5;color:#065F46}
.cb-med{background:#FEF3C7;color:#92400E}
.cb-alto{background:#FEE2E2;color:#991B1B}
.cb-sem{background:#F3F4F6;color:#6B7280}

/* ── ODS grid ── */
.ods-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.ods-card{border:1px solid var(--borda);border-radius:var(--raio-lg);padding:12px;text-align:center;cursor:pointer;transition:all .15s;opacity:.45;filter:grayscale(.6);}
.ods-card.ativo{opacity:1;filter:none;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.ods-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12);}
.ods-emoji{font-size:30px;margin-bottom:6px;}
.ods-num{font-family:var(--font-mono);font-size:11px;font-weight:700;margin-bottom:3px;}
.ods-titulo{font-size:10px;color:var(--cinza-700);line-height:1.3;}
.ods-badge-cnt{font-size:9px;font-weight:700;margin-top:5px;padding:1px 7px;border-radius:99px;display:inline-block;}

/* ── KM list ── */
.km-item{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border:1px solid var(--borda);border-radius:var(--raio);margin-bottom:6px;cursor:pointer;transition:all .15s;opacity:.5;}
.km-item.ativo{opacity:1;background:var(--branco);box-shadow:0 1px 6px rgba(0,0,0,.07);}
.km-item.ativo:hover{background:var(--cinza-50);}
.km-num{font-family:var(--font-mono);font-size:14px;font-weight:700;min-width:32px;text-align:center;padding:4px 0;}
.km-body{flex:1;}
.km-titulo{font-size:12px;font-weight:600;color:var(--cinza-900);margin-bottom:3px;}
.km-resumo{font-size:11px;color:var(--cinza-600);line-height:1.4;}
.km-inds{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}

/* ── Tabs dentro do modal ── */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--borda);margin-bottom:14px;overflow-x:auto;}
.tab-btn{padding:7px 14px;font-size:12px;font-weight:500;color:var(--cinza-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);white-space:nowrap;}
.tab-btn.ativo{color:var(--verde-medio);border-bottom-color:var(--verde-medio);}
.tab-content{display:none;}
.tab-content.ativo{display:block;}

/* ── Contribuição item ── */
.contrib-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--borda);border-radius:var(--raio);margin-bottom:6px;background:var(--branco);}
.contrib-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;}
.cs-pend{background:#FEF3C7;color:#92400E}
.cs-conf{background:#D1FAE5;color:#065F46}
.cs-rej{background:#FEE2E2;color:#991B1B}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#6B7280">
    <div style="text-align:center">
      <div style="width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2D6A4F;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      Carregando Matriz de Resultados…
    </div>
  </div>
</div>

<!-- MODAL INDICADOR -->
<div class="modal-overlay" id="modal-ind" style="display:none">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="mi-titulo">Indicador</div>
        <div style="font-size:11px;color:var(--cinza-500);margin-top:2px" id="mi-sub"></div>
      </div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body" id="mi-body" style="padding:16px 24px;max-height:70vh;overflow-y:auto"></div>
    <div class="modal-footer" id="mi-footer"></div>
  </div>
</div>

<!-- MODAL ODS/KM detalhes -->
<div class="modal-overlay" id="modal-ref" style="display:none">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title" id="mr-titulo">Referência</div>
      <button class="modal-close" onclick="document.getElementById('modal-ref').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="mr-body" style="padding:16px 24px"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
// ── Dados globais ─────────────────────────────────────────────
let matrizItens=[], progresso=[], odsRefs=[], kmRefs=[];
let indAtual=null;

(async()=>{
  const usuario=await carregarUsuario();
  if(!usuario){window.location.href='../index.html';return;}

  document.getElementById('app').innerHTML=
    gerarLayout('Matriz de Resultados','matriz')+`
    <div class="fade-in">
      <!-- Stats row -->
      <div class="stat-row" id="stats-row"></div>

      <!-- Toolbar -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <input class="form-control" type="text" id="busca-ind" style="width:230px;height:34px"
          placeholder="🔍 Buscar indicador..." oninput="renderTabAtual()">
        <div style="margin-left:auto;display:flex;gap:8px">
          ${PODE.editarAtividade()||PODE.aprovarProduto()?`<button class="btn btn-secondary btn-sm" onclick="abrirModalNovoInd()">＋ Indicador</button>`:''}
          <button class="btn btn-secondary btn-sm" onclick="exportarCSV()">⬇ CSV</button>
        </div>
      </div>

      <!-- Main tabs -->
      <div class="main-tabs">
        <button class="main-tab ativo" id="tab-btn-matriz" onclick="mudarAba('matriz',this)">◎ Matriz de Resultados</button>
        <button class="main-tab" id="tab-btn-ods" onclick="mudarAba('ods',this)">🌐 ODS</button>
        <button class="main-tab" id="tab-btn-km" onclick="mudarAba('km',this)">🌿 Kunming-Montreal</button>
      </div>

      <!-- Tab Matriz -->
      <div class="main-tab-content ativo" id="tc-matriz">
        <div id="conteudo-matriz">
          <div style="text-align:center;padding:40px;color:var(--cinza-400)">Carregando…</div>
        </div>
      </div>

      <!-- Tab ODS -->
      <div class="main-tab-content" id="tc-ods">
        <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--raio-lg);padding:10px 14px;margin-bottom:14px;font-size:12px;color:#1E40AF">
          <strong>9 ODS</strong> estão vinculados a este projeto. Os demais são exibidos de forma desbotada para referência.
        </div>
        <div class="ods-grid" id="ods-grid"></div>
      </div>

      <!-- Tab KM -->
      <div class="main-tab-content" id="tc-km">
        <div style="background:#EDE9FE;border:1px solid #C4B5FD;border-radius:var(--raio-lg);padding:10px 14px;margin-bottom:14px;font-size:12px;color:#4C1D95">
          <strong>7 Metas de Kunming-Montreal</strong> aparecem neste projeto (metas 2, 4, 10, 11, 21, 22 e 23). Destaques em roxo.
        </div>
        <div id="km-lista"></div>
      </div>
    </div>`+`</div></div></div>`;

  await carregar();
})();

// ── Carregar dados ────────────────────────────────────────────
async function carregar(){
  try{
    const [
      {data:itens},
      {data:prog},
      {data:ods},
      {data:km}
    ] = await Promise.all([
      db.from('matriz_itens').select('*').eq('ativo',true).order('ordem'),
      db.from('vw_matriz_progresso').select('*'),
      db.from('ods_refs').select('*').order('numero'),
      db.from('metas_km_refs').select('*').order('numero')
    ]);

    matrizItens = itens||[];
    progresso   = prog||[];
    odsRefs     = ods||[];
    kmRefs      = km||[];

    renderStats();
    renderMatriz();
    renderODS();
    renderKM();
  }catch(e){
    console.error(e);
    document.getElementById('conteudo-matriz').innerHTML=
      `<div class="empty-state"><div class="empty-state-msg">Erro ao carregar dados. Verifique se o SQL de migração foi executado no Supabase.</div></div>`;
  }
}

// ── Helpers ───────────────────────────────────────────────────
function getProgresso(id){
  return progresso.find(p=>p.matriz_item_id===id)||{realizado_confirmado:0,realizado_pendente:0,realizado_total:0,pct_confirmado:0};
}

function calcPct(item){
  const p=getProgresso(item.id);
  const meta=parseFloat(item.meta_numerica||0);
  if(!meta)return{conf:0,pend:0,total:0};
  const conf=Math.min(parseFloat(p.realizado_confirmado||0)/meta*100,100);
  const pend=Math.min(parseFloat(p.realizado_pendente||0)/meta*100,100);
  return{conf:Math.round(conf),pend:Math.round(Math.min(conf+pend,100)-conf),total:Math.round(Math.min(conf+pend,100))};
}

function classeRisco(item){
  const meta=parseFloat(item.meta_numerica||0);
  if(!meta)return'risco-sem';
  const{conf}=calcPct(item);
  if(conf>=100)return'risco-ok';
  if(conf>=40)return'risco-med';
  return'risco-alto';
}

function badgeConf(item){
  const meta=parseFloat(item.meta_numerica||0);
  if(!meta)return`<span class="conf-badge cb-sem">Sem meta</span>`;
  const{conf}=calcPct(item);
  if(conf>=100)return`<span class="conf-badge cb-ok">✓ Atingida</span>`;
  if(conf>=70)return`<span class="conf-badge cb-ok">Em dia</span>`;
  if(conf>=40)return`<span class="conf-badge cb-med">⚠ Atenção</span>`;
  return`<span class="conf-badge cb-alto">🔴 Risco</span>`;
}

function corPct(pct){
  if(pct>=100)return'#059669';
  if(pct>=70)return'#059669';
  if(pct>=40)return'#D97706';
  return'#DC2626';
}

// ── Stats ─────────────────────────────────────────────────────
function renderStats(){
  const total=matrizItens.length;
  const comMeta=matrizItens.filter(i=>parseFloat(i.meta_numerica||0)>0);
  const atingidos=comMeta.filter(i=>calcPct(i).conf>=100).length;
  const emRisco=comMeta.filter(i=>calcPct(i).conf<40).length;
  const pendConf=progresso.reduce((s,p)=>s+parseFloat(p.realizado_pendente||0),0);
  const media=comMeta.length
    ?Math.round(comMeta.reduce((s,i)=>s+calcPct(i).conf,0)/comMeta.length):0;

  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card sc-b">
      <div class="stat-lbl">Indicadores</div>
      <div class="stat-val">${total}</div>
      <div class="stat-sub">em 3 Resultados</div>
    </div>
    <div class="stat-card sc-g">
      <div class="stat-lbl">Metas Atingidas</div>
      <div class="stat-val">${atingidos}</div>
      <div class="stat-sub">100% confirmado</div>
    </div>
    <div class="stat-card sc-t">
      <div class="stat-lbl">Progresso Médio</div>
      <div class="stat-val">${media}%</div>
      <div class="stat-sub">confirmado</div>
    </div>
    <div class="stat-card sc-a">
      <div class="stat-lbl">Em Risco</div>
      <div class="stat-val" style="color:${emRisco>0?'var(--aviso)':'#059669'}">${emRisco}</div>
      <div class="stat-sub">abaixo de 40%</div>
    </div>
    <div class="stat-card sc-r">
      <div class="stat-lbl">Aguardam Conf.</div>
      <div class="stat-val" style="color:${pendConf>0?'var(--aviso)':'var(--cinza-400)'}">
        ${pendConf>0?Math.round(pendConf):0}
      </div>
      <div class="stat-sub">unidades pendentes</div>
    </div>`;
}

// ── Tab switcher ──────────────────────────────────────────────
let abaAtual='matriz';
function mudarAba(aba,btn){
  abaAtual=aba;
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  document.querySelectorAll('.main-tab-content').forEach(c=>c.classList.remove('ativo'));
  document.getElementById('tc-'+aba).classList.add('ativo');
  if(aba==='matriz')renderMatriz();
}
function renderTabAtual(){if(abaAtual==='matriz')renderMatriz();}

// ── MATRIZ ────────────────────────────────────────────────────
function renderMatriz(){
  const busca=(document.getElementById('busca-ind')?.value||'').toLowerCase();
  const el=document.getElementById('conteudo-matriz');
  if(!matrizItens.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-state-msg">Nenhum indicador cadastrado. Execute o SQL de migração 04 no Supabase.</div></div>`;
    return;
  }

  const res=[1,2,3];
  const nomes={
    1:'Fortalecimento do uso sustentável dos recursos naturais e da sociobiodiversidade',
    2:'Mitigação da vulnerabilidade ambiental e aumento da resiliência das APAs',
    3:'Fortalecimento da governança e equidade de gênero'
  };
  const coresRes={1:'#1D9E75',2:'#2563EB',3:'#7F77DD'};

  el.innerHTML=res.map(r=>{
    let itensR=matrizItens.filter(i=>i.resultado===r);
    if(busca) itensR=itensR.filter(i=>(i.indicador||'').toLowerCase().includes(busca)||(i.produto_titulo||'').toLowerCase().includes(busca)||(i.produto_codigo||'').toLowerCase().includes(busca));
    if(!itensR.length&&busca)return'';

    // Agrupar por produto_codigo
    const produtos=[...new Set(itensR.map(i=>i.produto_codigo))].sort();

    // Progresso geral do resultado
    const comMeta=itensR.filter(i=>parseFloat(i.meta_numerica||0)>0);
    const mediaR=comMeta.length?Math.round(comMeta.reduce((s,i)=>s+calcPct(i).conf,0)/comMeta.length):0;

    const corR=coresRes[r];

    return`<div class="resultado-bloco">
      <div class="resultado-header" onclick="toggleResultado('rb-${r}','icon-${r}')">
        <span class="resultado-codigo rc-${r}">R${r}</span>
        <span class="resultado-nome-txt">${nomes[r]}</span>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <div style="width:80px;height:5px;background:var(--cinza-200);border-radius:3px;overflow:hidden">
            <div style="height:100%;background:${corR};width:${mediaR}%;border-radius:3px;transition:width .5s"></div>
          </div>
          <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:${corR}">${mediaR}%</span>
          <span style="font-size:11px;color:var(--cinza-400)">${itensR.length} ind.</span>
          <span id="icon-${r}" style="font-size:12px;color:var(--cinza-400);transition:transform .2s">▾</span>
        </div>
      </div>
      <div id="rb-${r}">
        ${produtos.map(cod=>{
          const itensP=itensR.filter(i=>i.produto_codigo===cod);
          const titulo=itensP[0]?.produto_titulo||cod;
          const comMetaP=itensP.filter(i=>parseFloat(i.meta_numerica||0)>0);
          const mediaP=comMetaP.length?Math.round(comMetaP.reduce((s,i)=>s+calcPct(i).conf,0)/comMetaP.length):0;
          const hasPend=itensP.some(i=>parseFloat(getProgresso(i.id).realizado_pendente||0)>0);

          return`<div class="produto-group">
            <div class="produto-label" onclick="toggleProduto('pg-${r}-${cod.replace('.','-')}','pig-${r}-${cod.replace('.','-')}')">
              <span class="produto-cod">${cod}</span>
              <span class="produto-titulo-txt">${titulo}</span>
              ${hasPend?`<span class="pend-chip">Aguarda confirmação</span>`:''}
              <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                <div style="width:60px;height:4px;background:var(--cinza-200);border-radius:2px;overflow:hidden">
                  <div style="height:100%;background:#2563EB;width:${mediaP}%;border-radius:2px"></div>
                </div>
                <span style="font-size:10px;color:var(--cinza-500);font-family:var(--font-mono)">${mediaP}%</span>
                <span id="pig-${r}-${cod.replace('.','-')}" style="font-size:10px;color:var(--cinza-400);transition:transform .2s">▾</span>
              </div>
            </div>
            <div id="pg-${r}-${cod.replace('.','-')}">
              ${itensP.map(i=>renderIndCard(i)).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleResultado(id,iconId){
  const el=document.getElementById(id);
  const ic=document.getElementById(iconId);
  if(!el)return;
  const hidden=el.style.display==='none';
  el.style.display=hidden?'':'none';
  if(ic)ic.style.transform=hidden?'':'rotate(-90deg)';
}
function toggleProduto(id,iconId){
  const el=document.getElementById(id);
  const ic=document.getElementById(iconId);
  if(!el)return;
  const hidden=el.style.display==='none';
  el.style.display=hidden?'':'none';
  if(ic)ic.style.transform=hidden?'':'rotate(-90deg)';
}

function renderIndCard(i){
  const meta=parseFloat(i.meta_numerica||0);

  const p=getProgresso(i.id);
  const risco=classeRisco(i);

  const ods=(i.ods||[]).slice(0,4).map(o=>`<span class="ods-chip">ODS${o}</span>`).join('');
  const km=(i.metas_km||[]).slice(0,3).map(k=>`<span class="km-chip">KM${k}</span>`).join('');
  const hasPend=parseFloat(p.realizado_pendente||0)>0;

  return`<div class="ind-card ${risco}" onclick="abrirIndicador('${i.id}')">
    <div class="ind-header">
      <span class="ind-num">${i.produto_codigo}.${(i.ods||[''])[0]||'?'}</span>
      <div style="flex:1;min-width:0">
        <div class="ind-nome">${(i.indicador||'').substring(0,110)}${(i.indicador||'').length>110?'…':''}</div>
        <div style="font-size:10px;color:var(--cinza-400);margin-top:2px">Meta: ${i.meta_descricao||'—'}</div>
      </div>
      <div class="ind-badges" style="flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        ${badgeConf(i)}
        ${hasPend?`<span class="pend-chip">⏳ Pend.</span>`:''}
        <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end">${ods}${km}</div>
      </div>
    </div>
    ${temMeta?`<div class="ind-prog">
      <div class="prog-bar-wrap">
        <div class="prog-fill-conf" style="width:${conf}%"></div>
        <div class="prog-fill-pend" style="width:${pend}%;left:${conf}%"></div>

// ── KM ────────────────────────────────────────────────────────
function renderKM(){
  const el=document.getElementById('km-lista');
  if(!kmRefs.length){el.innerHTML='<div style="color:var(--cinza-400);font-size:12px">Execute o SQL de migração.</div>';return;}

  el.innerHTML=kmRefs.map(k=>{
    const inds=matrizItens.filter(i=>(i.metas_km||[]).includes(k.numero));
    const{conf}=inds.reduce((acc,i)=>{const p=calcPct(i);return{conf:acc.conf+p.conf};},{conf:0});
    const mediaKM=inds.filter(i=>parseFloat(i.meta_numerica||0)>0).length
      ?Math.round(conf/(inds.filter(i=>parseFloat(i.meta_numerica||0)>0).length)):0;

    return`<div class="km-item${k.no_projeto?' ativo':''}" onclick="abrirRefKM('${k.numero}')">
      <div class="km-num" style="color:${k.no_projeto?'#5B21B6':'var(--cinza-300)'}">
        <div style="font-size:16px;font-weight:700">${k.numero}</div>
        ${k.no_projeto?`<div style="font-size:8px;font-weight:700;background:#EDE9FE;color:#5B21B6;padding:1px 5px;border-radius:3px;margin-top:2px;text-align:center">✓</div>`:''}
      </div>
      <div class="km-body">
        <div class="km-titulo">${k.titulo}</div>
        <div class="km-resumo">${(k.resumo||'').substring(0,120)}${(k.resumo||'').length>120?'…':''}</div>
        ${k.no_projeto&&inds.length?`<div class="km-inds">
          ${inds.slice(0,4).map(i=>`<span style="font-size:9px;background:var(--cinza-100);color:var(--cinza-600);padding:1px 6px;border-radius:3px">${i.produto_codigo}</span>`).join('')}
          ${inds.length>4?`<span style="font-size:9px;color:var(--cinza-400)">+${inds.length-4}</span>`:''}
          ${parseFloat(mediaKM)>0?`<span style="margin-left:auto;font-size:9px;font-weight:700;color:${corPct(mediaKM)}">${mediaKM}%</span>`:''}
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

      </div>`:`<div style="font-size:11px;color:var(--cinza-500);background:#FFF;border:1px solid var(--borda);border-radius:var(--raio);padding:8px 12px">Indicador qualitativo — progresso acompanhado por registros</div>`}
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">

function fecharModal(){
  document.getElementById('modal-ind').style.display='none';
}

function abaModal(id,btn){
  document.querySelectorAll('#mi-body .tab-btn').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  document.querySelectorAll('#mi-body .tab-content').forEach(c=>c.classList.remove('ativo'));
  const el=document.getElementById('mtab-'+id);
  if(el)el.classList.add('ativo');
}

// ── Confirmar contribuição ────────────────────────────────────
async function confirmarContrib(contribId, novoStatus){
  const{error}=await db.from('produto_matriz_contribuicao')
    .update({
      status:novoStatus,
      confirmado_por:appState.usuario.id,
      confirmado_em:new Date().toISOString()
    })
    .eq('id',contribId);

  if(error){toast('Erro ao atualizar contribuição.','error');return;}
  toast(novoStatus==='confirmado'?'Contribuição confirmada!':'Contribuição rejeitada.', novoStatus==='confirmado'?'success':'info');

  // Recarregar progresso e reabrir modal
  const{data:prog}=await db.from('vw_matriz_progresso').select('*');
  progresso=prog||[];
  renderStats();
  renderMatriz();
  if(indAtual)await abrirIndicador(indAtual.id);
}

      <input class="form-control" id="fi-produto-titulo" placeholder="ex: Desenvolvimento de Produtos Sustentáveis" value="${i?.produto_titulo||''}">
    </div>
    <div class="form-group">
      <label class="form-label">Indicador *</label>
      <textarea class="form-control" id="fi-indicador" rows="2" placeholder="Descreva o indicador...">${i?.indicador||''}</textarea>
    </div>
    <div class="grid-2" style="gap:12px">
      <div class="form-group">
        <label class="form-label">Meta (descrição)</label>
        <input class="form-control" id="fi-meta-desc" placeholder="ex: 200 unidades produtivas" value="${i?.meta_descricao||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Meta numérica</label>
        <input class="form-control" type="number" id="fi-meta-num" step="0.01" placeholder="200" value="${i?.meta_numerica||''}">
      </div>
    </div>
    <div class="grid-2" style="gap:12px">
      <div class="form-group">
        <label class="form-label">Unidade de medida</label>
        <input class="form-control" id="fi-unidade" placeholder="ex: pessoas, hectares" value="${i?.unidade||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Ordem</label>
        <input class="form-control" type="number" id="fi-ordem" value="${i?.ordem||0}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ODS vinculados (números separados por vírgula)</label>
      <input class="form-control" id="fi-ods" placeholder="ex: 2, 12, 13" value="${(i?.ods||[]).join(', ')}">
    </div>
    <div class="form-group">
      <label class="form-label">Metas Kunming-Montreal (números separados por vírgula)</label>
      <input class="form-control" id="fi-km" placeholder="ex: 2, 10, 22" value="${(i?.metas_km||[]).join(', ')}">
    </div>
    <div class="form-group">
      <label class="form-label">Meios de Verificação</label>
      <textarea class="form-control" id="fi-meios" rows="2" placeholder="Como será medido...">${i?.meios_verificacao||''}</textarea>
    </div>
  `;
  document.getElementById('mi-footer').innerHTML=`
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarIndicador('${i?.id||''}')">💾 Salvar</button>
    </div>`;
  document.getElementById('modal-ind').style.display='flex';
}

async function salvarIndicador(id){
  const parseArr=v=>v.split(',').map(x=>x.trim()).filter(Boolean);
  const payload={
    resultado:parseInt(document.getElementById('fi-resultado').value)||1,
    produto_codigo:(document.getElementById('fi-produto-cod').value||'').trim(),
    produto_titulo:(document.getElementById('fi-produto-titulo').value||'').trim(),
    indicador:(document.getElementById('fi-indicador').value||'').trim(),
    meta_descricao:(document.getElementById('fi-meta-desc').value||'').trim(),
    meta_numerica:parseFloat(document.getElementById('fi-meta-num').value)||null,
    unidade:(document.getElementById('fi-unidade').value||'').trim()||null,
    ordem:parseInt(document.getElementById('fi-ordem').value)||0,
    ods:parseArr(document.getElementById('fi-ods').value),
    metas_km:parseArr(document.getElementById('fi-km').value),
    meios_verificacao:(document.getElementById('fi-meios').value||'').trim()||null,
    atualizado_em:new Date().toISOString()
  };

  if(!payload.indicador||!payload.produto_codigo||!payload.produto_titulo){
    toast('Preencha os campos obrigatórios.','warning');return;
  }

  let error;
  if(id){
    ({error}=await db.from('matriz_itens').update(payload).eq('id',id));
  }else{
    ({error}=await db.from('matriz_itens').insert(payload));
  }
  if(error){toast('Erro ao salvar: '+error.message,'error');return;}
  toast(id?'Indicador atualizado!':'Indicador criado!','success');
  fecharModal();
  await carregar();
}

// ── Exportar CSV ──────────────────────────────────────────────
function exportarCSV(){
  const rows=[['Resultado','Produto','Indicador','Meta','Meta Numérica','Unidade','Confirmado','% Confirmado','ODS','KM','Meios de Verificação']];
  matrizItens.forEach(i=>{
    const p=getProgresso(i.id);
    const meta=parseFloat(i.meta_numerica||0);
    const conf=parseFloat(p.realizado_confirmado||0);
    const pct=meta>0?Math.round(conf/meta*100):0;
    rows.push([
      `R${i.resultado}`,i.produto_codigo,i.indicador,
      i.meta_descricao,i.meta_numerica||'',i.unidade||'',
      conf,pct+'%',
      (i.ods||[]).join(';'),(i.metas_km||[]).join(';'),
      (i.meios_verificacao||'').replace(/[\n\r,]/g,' ')
    ]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='matriz_resultados_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// Fechar modais clicando fora
document.getElementById('modal-ind').addEventListener('click',e=>{if(e.target===document.getElementById('modal-ind'))fecharModal();});
document.getElementById('modal-ref').addEventListener('click',e=>{if(e.target===document.getElementById('modal-ref'))document.getElementById('modal-ref').style.display='none';});
</script>
