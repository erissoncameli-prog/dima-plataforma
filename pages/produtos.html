<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Produtos Entregues</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<link href="../css/sidebar.css" rel="stylesheet">
<style>
/* ── Status badges ─────────────────────────────────────── */
.st-sub{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE;}
.st-rev{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;}
.st-tec{background:#E0F2FE;color:#0C4A6E;border:1px solid #BAE6FD;}
.st-coo{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;}
.st-dir{background:#EDE9FE;color:#4C1D95;border:1px solid #DDD6FE;}
.st-apr{background:#D1FAE5;color:#064E3B;border:1px solid #6EE7B7;}
.st-rec{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;}
.status-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;white-space:nowrap;}

/* ── Tipo produto ───────────────────────────────────────── */
.tipo-rel{background:#EFF6FF;color:#1E40AF;}
.tipo-fis{background:#FEF3C7;color:#92400E;}
.tipo-evt{background:#ECFDF5;color:#065F46;}
.tipo-svc{background:#EDE9FE;color:#4C1D95;}
.tipo-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}

/* ── Cards de produto ───────────────────────────────────── */
.prod-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);margin-bottom:12px;overflow:hidden;transition:box-shadow .15s;}
.prod-card:hover{box-shadow:var(--sombra-md);}
.prod-card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.prod-card-header:hover{background:var(--cinza-50);}
.prod-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.prod-info{flex:1;min-width:0;}
.prod-nome{font-size:13px;font-weight:500;color:var(--cinza-900);margin-bottom:3px;}
.prod-meta{font-size:11px;color:var(--cinza-500);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.prod-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}

/* ── Fluxo de aprovação ─────────────────────────────────── */
.flow-steps{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.flow-step{display:flex;align-items:center;gap:4px;}
.flow-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.flow-dot-ok{background:#059669;color:#fff;}
.flow-dot-pend{background:#FCD34D;color:#78350F;}
.flow-dot-wait{background:var(--cinza-100);color:var(--cinza-400,#9CA3AF);border:1px solid var(--borda);}
.flow-dot-rec{background:#EF4444;color:#fff;}
.flow-label{font-size:10px;color:var(--cinza-500);}
.flow-arrow{color:var(--cinza-300);font-size:12px;}

/* ── Painel expandido ───────────────────────────────────── */
.prod-painel{display:none;border-top:1px solid var(--borda);padding:16px;}
.prod-painel.aberto{display:block;}
.evid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:8px;}
.evid-thumb{border:1px solid var(--borda);border-radius:var(--raio);overflow:hidden;position:relative;background:var(--cinza-50);}
.evid-img{width:100%;height:80px;object-fit:cover;display:block;}
.evid-doc{width:100%;height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:var(--cinza-500);text-align:center;padding:6px;}
.evid-doc-icon{font-size:24px;margin-bottom:4px;}
.evid-add{border:1.5px dashed var(--borda-forte);border-radius:var(--raio);height:80px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--cinza-400,#9CA3AF);font-size:11px;flex-direction:column;gap:3px;transition:all .15s;}
.evid-add:hover{border-color:var(--verde-medio);color:var(--verde-medio);background:var(--verde-bg);}

/* ── Filtros ────────────────────────────────────────────── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}

/* ── Stats row ──────────────────────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc-b::after{background:var(--azul-medio);}
.sc-v::after{background:var(--sucesso);}
.sc-o::after{background:var(--ouro);}
.sc-r::after{background:var(--erro);}
.sc-p::after{background:#7C3AED;}
.stat-val{font-size:22px;font-weight:600;color:var(--cinza-900);}
.stat-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}

/* ── Modal ──────────────────────────────────────────────── */
.modal-lg{max-width:700px;}
.upload-zone{border:1.5px dashed var(--borda-forte);border-radius:var(--raio);padding:20px;text-align:center;cursor:pointer;transition:all .15s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--verde-medio);background:var(--verde-bg);}
.upload-zone input{display:none;}
.upload-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:10px;}
.up-thumb{border:1px solid var(--borda);border-radius:6px;overflow:hidden;position:relative;}
.up-thumb img{width:100%;height:60px;object-fit:cover;display:block;}
.up-thumb-doc{width:100%;height:60px;background:var(--cinza-50);display:flex;align-items:center;justify-content:center;font-size:20px;}
.up-thumb-rm{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:var(--erro);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;}
.secao-titulo{font-size:11px;font-weight:600;color:var(--cinza-700);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;margin-top:16px;}

/* ── Senha overlay ──────────────────────────────────────── */
.senha-ov{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);align-items:center;justify-content:center;}
.senha-ov.aberto{display:flex;}
.senha-box{background:var(--branco);border-radius:var(--raio-xl);box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:380px;margin:20px;}

/* ── Motivo recusa ──────────────────────────────────────── */
.motivo-box{background:var(--erro-bg);border:1px solid #FECACA;border-radius:var(--raio);padding:10px 12px;margin-top:8px;}
.motivo-box p{font-size:12px;color:#991B1B;margin-top:4px;}
</style>
</head>
<body>
<div id="app"></div>

<!-- MODAL CADASTRAR PRODUTO -->
<div class="modal-overlay" id="modal-produto">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="modal-prod-titulo">Registrar entrega de produto</span>
      <button class="modal-close" onclick="fecharModalProduto()">✕</button>
    </div>
    <div class="modal-body" id="modal-prod-body">
    </div>
    <div class="modal-footer" id="modal-prod-footer"></div>
  </div>
</div>

<!-- MODAL VISUALIZAR PRODUTO -->
<div class="modal-overlay" id="modal-ver-produto">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="modal-ver-titulo">Produto entregue</span>
      <button class="modal-close" onclick="fecharModal('modal-ver-produto')">✕</button>
    </div>
    <div class="modal-body" id="modal-ver-body"></div>
    <div class="modal-footer" id="modal-ver-footer"></div>
  </div>
</div>

<!-- MODAL DEVOLVER -->
<div class="modal-overlay" id="modal-devolver-prod">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span class="modal-title">Devolver para correção</span>
      <button class="modal-close" onclick="fecharModal('modal-devolver-prod')">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-warning" style="font-size:12px;margin-bottom:12px">
        O fornecedor será notificado com o motivo para reenviar o produto corrigido.
      </div>
      <div class="form-group">
        <label class="form-label">Motivo da devolução <span class="obrig">*</span></label>
        <textarea class="form-control" id="motivo-dev" rows="4" placeholder="Descreva o que precisa ser corrigido..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="fecharModal('modal-devolver-prod')">Cancelar</button>
      <button class="btn btn-danger" onclick="executarDevolucaoProd()">↩ Confirmar devolução</button>
    </div>
  </div>
</div>

<!-- MODAL SENHA -->
<div class="senha-ov" id="modal-senha-prod">
  <div class="senha-box">
    <div style="padding:16px 20px 12px;border-bottom:1px solid var(--borda)">
      <div style="font-size:14px;font-weight:600;color:var(--cinza-900)" id="senha-prod-titulo">Confirmar ação</div>
      <div style="font-size:12px;color:var(--cinza-500);margin-top:2px" id="senha-prod-sub">Confirme com sua senha</div>
    </div>
    <div style="padding:16px 20px">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Sua senha <span class="obrig">*</span></label>
        <input class="form-control" id="senha-prod-input" type="password" placeholder="Digite sua senha"
          onkeydown="if(event.key==='Enter')confirmarSenhaProd()">
      </div>
      <div id="senha-prod-erro" style="font-size:12px;color:var(--erro);display:none;margin-top:6px">✗ Senha incorreta.</div>
    </div>
    <div style="padding:12px 20px;border-top:1px solid var(--borda);display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="fecharSenhaProd()">Cancelar</button>
      <button class="btn btn-primary" id="senha-prod-btn" onclick="confirmarSenhaProd()">Confirmar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
(function(){

var todosProds = [], tdrMap = {}, usuariosMap = {};
var editandoId = null, senhaCb = null;
var filesDocumento = [], filesEvidencias = [];

// ── PODE ──────────────────────────────────────────────────
var PODE = {
  registrar: function(){ return ['super_admin','coordenacao','tecnico'].includes(appState.perfil); },
  aprovarTecnico: function(){ return ['super_admin','coordenacao','tecnico'].includes(appState.perfil); },
  aprovarCoord: function(){ return ['super_admin','coordenacao'].includes(appState.perfil); },
  aprovarDir: function(){ return ['super_admin'].includes(appState.perfil); },
};

// ── LABELS ────────────────────────────────────────────────
var ST_LABEL = {submetido:'Submetido',em_revisao:'Em revisão',aprovado_tecnico:'Aprovado técnico',aprovado_coordenacao:'Aprovado coord.',aprovado_diretoria:'Aprovado diretoria',recusado:'Devolvido'};
var ST_CLASS = {submetido:'st-sub',em_revisao:'st-rev',aprovado_tecnico:'st-tec',aprovado_coordenacao:'st-coo',aprovado_diretoria:'st-dir',recusado:'st-rec'};
var TIPO_LABEL = {relatorio_tecnico:'Relatório técnico',produto_fisico:'Bem físico',evento_capacitacao:'Evento/capacitação',servico_executado:'Serviço executado'};
var TIPO_CLASS = {relatorio_tecnico:'tipo-rel',produto_fisico:'tipo-fis',evento_capacitacao:'tipo-evt',servico_executado:'tipo-svc'};
var TIPO_ICON = {relatorio_tecnico:'📄',produto_fisico:'📦',evento_capacitacao:'👥',servico_executado:'⚙️'};

// ── INIT ──────────────────────────────────────────────────
(async function(){
  var u = await carregarUsuario();
  if(!u){ window.location.href='../index.html'; return; }

  document.getElementById('app').innerHTML = gerarLayout('Produtos Entregues','produtos') + `
    <div class="page-body" id="page-body" style="overflow-x:hidden;min-width:0;width:100%">
      <div class="fade-in">
        <div id="stats-row" class="stat-row"></div>
        <div class="filter-row">
          <input class="form-control search-input" id="busca" type="text" placeholder="Buscar por TDR, produto, fornecedor..." oninput="filtrar()">
          <select class="form-control" id="fil-status" onchange="filtrar()" style="width:180px">
            <option value="">Todos os status</option>
            <option value="submetido">Submetido</option>
            <option value="em_revisao">Em revisão</option>
            <option value="aprovado_tecnico">Aprovado técnico</option>
            <option value="aprovado_coordenacao">Aprovado coordenação</option>
            <option value="aprovado_diretoria">Aprovado diretoria</option>
            <option value="recusado">Devolvido</option>
          </select>
          <select class="form-control" id="fil-tipo" onchange="filtrar()" style="width:170px">
            <option value="">Todos os tipos</option>
            <option value="relatorio_tecnico">Relatório técnico</option>
            <option value="produto_fisico">Bem físico</option>
            <option value="evento_capacitacao">Evento/capacitação</option>
            <option value="servico_executado">Serviço executado</option>
          </select>
          <select class="form-control" id="fil-tdr" onchange="filtrar()" style="width:180px">
            <option value="">Todos os TDRs</option>
          </select>
          ${PODE.registrar()?'<button class="btn btn-primary" style="margin-left:auto" onclick="abrirModalCadastro()">+ Registrar entrega</button>':''}
        </div>
        <div id="lista-produtos"></div>
      </div>
    </div>
  ` + fecharLayout();

  await carregar();
})();

// ── CARREGAR ──────────────────────────────────────────────
async function carregar(){
  var [p1,p2,p3] = await Promise.all([
    db.from('vw_produtos_entregues').select('*').order('submetido_em',{ascending:false}),
    db.from('tdrs').select('id,numero,objeto_pt,atividade_id,fornecedor_id,atividades(codigo,nome_pt),fornecedores(id,nome)').neq('status','cancelado').order('numero'),
    db.from('usuarios').select('id,nome_completo,perfil').eq('ativo',true),
  ]);
  todosProds = p1.data||[];
  tdrMap = {};
  (p2.data||[]).forEach(function(t){ tdrMap[t.id]=t; });
  usuariosMap = {};
  (p3.data||[]).forEach(function(u){ usuariosMap[u.id]=u; });

  // Preencher select TDRs
  var tdrSel = document.getElementById('fil-tdr');
  if(tdrSel){
    Object.values(tdrMap).forEach(function(t){
      var opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.numero+' — '+(t.objeto_pt||'').substring(0,40);
      tdrSel.appendChild(opt);
    });
  }

  renderStats();
  filtrar();
}

// ── STATS ─────────────────────────────────────────────────
function renderStats(){
  var total=todosProds.length;
  var aprov=todosProds.filter(function(p){return p.status==='aprovado_diretoria';}).length;
  var pend=todosProds.filter(function(p){return ['submetido','em_revisao','aprovado_tecnico','aprovado_coordenacao'].includes(p.status);}).length;
  var dev=todosProds.filter(function(p){return p.status==='recusado';}).length;
  var tdrsCom=new Set(todosProds.map(function(p){return p.tdr_id;})).size;
  document.getElementById('stats-row').innerHTML=
    '<div class="stat-card sc-b"><div class="stat-val">'+total+'</div><div class="stat-lbl">Total entregues</div></div>'+
    '<div class="stat-card sc-v"><div class="stat-val">'+aprov+'</div><div class="stat-lbl">Aprovados</div></div>'+
    '<div class="stat-card sc-o"><div class="stat-val">'+pend+'</div><div class="stat-lbl">Em aprovação</div></div>'+
    '<div class="stat-card sc-r"><div class="stat-val">'+dev+'</div><div class="stat-lbl">Devolvidos</div></div>'+
    '<div class="stat-card sc-p"><div class="stat-val">'+tdrsCom+'</div><div class="stat-lbl">TDRs com entrega</div></div>';
}

// ── FILTRAR ───────────────────────────────────────────────
function filtrar(){
  var q=(document.getElementById('busca').value||'').toLowerCase();
  var st=document.getElementById('fil-status').value;
  var tp=document.getElementById('fil-tipo').value;
  var td=document.getElementById('fil-tdr').value;
  var lista=todosProds.filter(function(p){
    if(st&&p.status!==st)return false;
    if(tp&&p.tipo_produto!==tp)return false;
    if(td&&p.tdr_id!==td)return false;
    if(q){
      var txt=(p.tdr_numero+' '+(p.descricao_pt||'')+' '+(p.fornecedor_nome||'')+' '+(p.atividade_codigo||'')).toLowerCase();
      if(!txt.includes(q))return false;
    }
    return true;
  });
  renderLista(lista);
}
window.filtrar=filtrar;

// ── RENDER LISTA ──────────────────────────────────────────
function renderLista(lista){
  var el=document.getElementById('lista-produtos');
  if(!lista.length){
    el.innerHTML='<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-msg">Nenhum produto encontrado.</div></div>';
    return;
  }
  // Agrupar por TDR
  var grupos={};
  lista.forEach(function(p){
    var k=p.tdr_id||'sem-tdr';
    if(!grupos[k])grupos[k]=[];
    grupos[k].push(p);
  });
  var html='';
  Object.keys(grupos).forEach(function(tid){
    var prods=grupos[tid];
    var tdr=tdrMap[tid];
    html+='<div style="margin-bottom:6px;font-size:12px;font-weight:600;color:var(--cinza-700);padding:6px 0 4px;border-bottom:1px solid var(--borda);display:flex;align-items:center;gap:8px">';
    html+='<span style="font-family:var(--font-mono)">'+( tdr?tdr.numero:'Sem TDR')+'</span>';
    if(tdr)html+='<span style="font-weight:400;color:var(--cinza-500)">'+( tdr.atividades?tdr.atividades.codigo+' · ':'' )+(tdr.objeto_pt||'').substring(0,60)+'...</span>';
    html+='<span class="badge" style="background:var(--cinza-100);color:var(--cinza-700);margin-left:auto">'+prods.length+' produto(s)</span>';
    html+='</div>';
    prods.forEach(function(p){ html+=renderProdCard(p); });
  });
  el.innerHTML=html;
}

// ── CARD DO PRODUTO ───────────────────────────────────────
function renderProdCard(p){
  var stCls=ST_CLASS[p.status]||'st-sub';
  var stLbl=ST_LABEL[p.status]||p.status;
  var tipoCls=TIPO_CLASS[p.tipo_produto]||'tipo-rel';
  var tipoLbl=TIPO_LABEL[p.tipo_produto]||p.tipo_produto;
  var tipoIcon=TIPO_ICON[p.tipo_produto]||'📄';
  var numCor={relatorio_tecnico:'#2563EB',produto_fisico:'#D97706',evento_capacitacao:'#059669',servico_executado:'#7C3AED'}[p.tipo_produto]||'#6B7280';

  // Fluxo de aprovação
  var steps=[
    {k:'submetido',lbl:'Enviado',ok:true},
    {k:'aprovado_tecnico',lbl:'Técnico',ok:['aprovado_tecnico','aprovado_coordenacao','aprovado_diretoria'].includes(p.status)},
    {k:'aprovado_coordenacao',lbl:'Coord.',ok:['aprovado_coordenacao','aprovado_diretoria'].includes(p.status)},
    {k:'aprovado_diretoria',lbl:'Diretoria',ok:p.status==='aprovado_diretoria'},
  ];
  var flowHtml='<div class="flow-steps">';
  steps.forEach(function(s,i){
    var dc = p.status==='recusado'&&i>0?'flow-dot-rec':s.ok?'flow-dot-ok':p.status==='recusado'?'flow-dot-wait':'flow-dot-wait';
    if(p.status==='recusado'&&i===1)dc='flow-dot-rec';
    flowHtml+='<div class="flow-step"><div class="flow-dot '+dc+'">'+( s.ok?'✓':( p.status==='recusado'&&i===1?'✗':(i+1) ) )+'</div><span class="flow-label">'+s.lbl+'</span></div>';
    if(i<3)flowHtml+='<span class="flow-arrow">›</span>';
  });
  flowHtml+='</div>';

  var dtStr=p.dt_entrega?new Date(p.dt_entrega+'T12:00:00').toLocaleDateString('pt-BR'):'sem data';
  var evidStr=parseInt(p.total_evidencias||0)>0?'📷 '+p.total_evidencias+' evidência(s)':'';

  var podAcao = PODE.registrar();
  var acoes='';
  if(p.status==='submetido'&&PODE.aprovarTecnico())
    acoes+='<button class="btn btn-sm" style="background:var(--azul-bg);color:var(--azul-medio);border:1px solid var(--azul-medio)" onclick="event.stopPropagation();pedirAcao(\'aprovar_tecnico\',\''+p.id+'\')">✓ Técnico</button>';
  if(p.status==='aprovado_tecnico'&&PODE.aprovarCoord())
    acoes+='<button class="btn btn-sm" style="background:var(--sucesso-bg);color:var(--sucesso);border:1px solid var(--sucesso)" onclick="event.stopPropagation();pedirAcao(\'aprovar_coord\',\''+p.id+'\')">✓ Coord.</button>';
  if(p.status==='aprovado_coordenacao'&&PODE.aprovarDir())
    acoes+='<button class="btn btn-sm" style="background:#EDE9FE;color:#4C1D95;border:1px solid #DDD6FE" onclick="event.stopPropagation();pedirAcao(\'aprovar_dir\',\''+p.id+'\')">✓ Diretoria</button>';
  if(['submetido','aprovado_tecnico'].includes(p.status)&&PODE.aprovarTecnico())

window.togglePainel = async function(id){
  var el=document.getElementById('painel-'+id);
  if(!el)return;
  if(el.classList.contains('aberto')){el.classList.remove('aberto');return;}
  el.classList.add('aberto');
  if(el.innerHTML)return;
  // Carregar evidências
  var {data:evids} = await db.from('produto_evidencias').select('*').eq('produto_id',id);
  var p=todosProds.find(function(x){return x.id===id;});
  if(!p)return;
  var html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  // Coluna 1: documento principal
  html+='<div>';
  html+='<div class="secao-titulo">Documento principal</div>';
  if(p.arquivo_url){
    html+='<div style="border:1px solid var(--borda);border-radius:var(--raio);padding:12px;display:flex;align-items:center;gap:10px">';
    html+='<span style="font-size:24px">📄</span>';
    html+='<div><div style="font-size:12px;font-weight:500">'+( p.arquivo_nome||'Documento')+'</div>';
    html+='<a href="'+p.arquivo_url+'" target="_blank" class="btn btn-sm btn-secondary" style="margin-top:4px;text-decoration:none">⬇ Baixar</a></div></div>';
  } else {
    html+='<div style="color:var(--cinza-400,#9CA3AF);font-size:12px;padding:8px 0">Nenhum documento anexado</div>';
  }
  if(p.observacoes)html+='<div class="secao-titulo" style="margin-top:12px">Observações</div><p style="font-size:12px;color:var(--cinza-700)">'+p.observacoes+'</p>';
  html+='</div>';
  // Coluna 2: evidências
  html+='<div>';
  html+='<div class="secao-titulo">Evidências fotográficas ('+( evids?evids.length:0 )+')</div>';
  html+='<div class="evid-grid">';
  (evids||[]).forEach(function(ev){
    if(ev.tipo==='foto'){
      html+='<div class="evid-thumb"><img class="evid-img" src="'+ev.arquivo_url+'" alt="'+ev.arquivo_nome+'" onerror="this.style.display=\'none\'"></div>';
    } else {
      html+='<a href="'+ev.arquivo_url+'" target="_blank" class="evid-doc"><div class="evid-doc-icon">📄</div><div>'+ev.arquivo_nome.substring(0,20)+'</div></a>';
    }
  });
  if(PODE.registrar()){
    html+='<div class="evid-add" onclick="adicionarEvidencia(\''+id+'\')">'+
      '<span style="font-size:20px">＋</span><span>Adicionar</span></div>';
  }
  html+='</div></div>';
  html+='</div>';
  el.innerHTML=html;
};

// Carregar produtos previstos do TDR
window.carregarProdutosPrevistos = async function(){
  var tdrId=document.getElementById('f-tdr').value;
  var sel=document.getElementById('f-prod-prev');
  var badge=document.getElementById('prod-prev-badge');
  var prazoInfo=document.getElementById('prazo-info');
  var descSug=document.getElementById('desc-sugerida');
  // Reset
  sel.innerHTML='<option value="">Carregando...</option>';
  if(badge)badge.style.display='none';
  if(prazoInfo)prazoInfo.style.display='none';
  if(descSug)descSug.style.display='none';
  if(!tdrId){sel.innerHTML='<option value="">Selecione o TDR primeiro</option>';return;}

  var {data} = await db.from('tdr_produtos_previstos')
    .select('*').eq('tdr_id',tdrId).eq('ativo',true).order('numero_produto');

  if(!data||!data.length){
    sel.innerHTML='<option value="">Nenhum produto previsto cadastrado</option>';
    // Badge de alerta
    if(badge){
      badge.style.display='block';
      badge.style.background='var(--ouro-bg)';
      badge.style.border='1px solid #FAC775';
      badge.style.color='var(--ouro)';
      badge.innerHTML='⚠ Este TDR não tem produtos previstos cadastrados. Use a ferramenta de extração ou adicione manualmente abaixo.';
    }
    return;
  }

  var tipoLabel={relatorio_tecnico:'📄 Relatório técnico',produto_fisico:'📦 Bem físico',evento_capacitacao:'👥 Evento/capacitação',servico_executado:'⚙️ Serviço executado'};

  sel.innerHTML='<option value="">Selecionar produto previsto...</option>'+data.map(function(pp){
    // Guardar todos os dados no dataset para auto-preenchimento
    var desc=encodeURIComponent(pp.descricao_pt||'');
    return '<option value="'+pp.id+'"'
      +' data-tipo="'+(pp.tipo_produto||'relatorio_tecnico')+'"'
      +' data-num="'+pp.numero_produto+'"'
      +' data-prazo="'+(pp.prazo_dias||'')+'"'
      +' data-desc="'+desc+'"'
      +'>P'+pp.numero_produto+' — '+(pp.descricao_pt||'').substring(0,55)+(pp.descricao_pt&&pp.descricao_pt.length>55?'...':'')
      +(pp.prazo_dias?' ('+pp.prazo_dias+' dias)':'')
      +'</option>';
  }).join('');

  if(badge){
    badge.style.display='block';
    badge.style.background='var(--verde-bg)';
    badge.style.border='1px solid #9FE1CB';
    badge.style.color='var(--verde-escuro)';
    badge.innerHTML='✓ '+data.length+' produto(s) previsto(s) encontrado(s). Selecione um para auto-preencher tipo e prazo.';
  }
};

window.preencherTipoProduto = function(){
  var sel=document.getElementById('f-prod-prev');
  var opt=sel.options[sel.selectedIndex];
  var badge=document.getElementById('prod-prev-badge');
  var prazoInfo=document.getElementById('prazo-info');
  var descSug=document.getElementById('desc-sugerida');
  var descSugTxt=document.getElementById('desc-sugerida-txt');

  if(!opt||!opt.value){
    if(prazoInfo)prazoInfo.style.display='none';
    if(descSug)descSug.style.display='none';
    return;
  }

  // Auto-preencher TIPO
  var tipo=opt.dataset.tipo;
  if(tipo){
    var fTipo=document.getElementById('f-tipo');
    if(fTipo)fTipo.value=tipo;
  }

  // Auto-preencher PRAZO — mostrar info
  var prazo=opt.dataset.prazo;
  if(prazoInfo){
    if(prazo){
      // Calcular data limite estimada
      var dtEntrega=document.getElementById('f-dt-entrega');
      prazoInfo.style.display='block';
      prazoInfo.innerHTML='⏱ Prazo previsto no TDR: <strong>'+prazo+' dias</strong> corridos após a assinatura do contrato.';
    } else {
      prazoInfo.style.display='none';
    }
  }

  // Mostrar descrição sugerida do TDR
  var descEnc=opt.dataset.desc;
  if(descSug&&descSugTxt&&descEnc){
    var desc=decodeURIComponent(descEnc);
    if(desc.trim()){
      descSugTxt.textContent=desc;
      descSug.style.display='block';
      // Se o campo de desc estiver vazio, não sugerir automaticamente — usuário decide
    }
  } else if(descSug){
    descSug.style.display='none';
  }

  // Atualizar badge de confirmação
  if(badge){
    var tipoLabel={relatorio_tecnico:'📄 Relatório técnico',produto_fisico:'📦 Bem físico',evento_capacitacao:'👥 Evento/capacitação',servico_executado:'⚙️ Serviço executado'};
    badge.innerHTML='✓ Produto P'+(opt.dataset.num||'')
      +' selecionado · '+(tipoLabel[tipo]||tipo)
      +(prazo?' · '+prazo+' dias':'');
  }
};

// Usar descrição sugerida como base
window.usarDescSugerida = function(){
  var descSugTxt=document.getElementById('desc-sugerida-txt');
  var fDesc=document.getElementById('f-desc');
  if(descSugTxt&&fDesc){
    fDesc.value=descSugTxt.textContent;
    fDesc.focus();
    toast('Descrição copiada — edite conforme necessário.','info');
  }
};

// Upload handlers
window.handleFileDoc = function(files){
  if(!files||!files[0])return;
  filesDocumento=[files[0]];
  var prev=document.getElementById('doc-preview');
  prev.innerHTML='<div style="display:flex;align-items:center;gap:8px;background:var(--verde-bg);padding:8px;border-radius:var(--raio);font-size:12px"><span style="font-size:18px">📄</span><span style="font-weight:500">'+files[0].name+'</span><span style="color:var(--cinza-500)">('+Math.round(files[0].size/1024)+'KB)</span></div>';
};
window.handleDropDoc = function(e){
  handleFileDoc(e.dataTransfer.files);
};
window.handleFilesEvid = function(files){
  if(!files)return;
  for(var i=0;i<files.length;i++){
    if(filesEvidencias.length>=10)break;
    filesEvidencias.push(files[i]);
  }
  renderEvidPreview();
};
window.handleDropEvid = function(e){
  handleFilesEvid(e.dataTransfer.files);
};
function renderEvidPreview(){
  var el=document.getElementById('evid-preview');
  if(!el)return;
  el.innerHTML=filesEvidencias.map(function(f,i){
    if(f.type.startsWith('image/')){
      var url=URL.createObjectURL(f);
      return '<div class="up-thumb"><img src="'+url+'" style="width:100%;height:60px;object-fit:cover;display:block"><div class="up-thumb-rm" onclick="removerEvid('+i+')">✕</div></div>';
    }
    return '<div class="up-thumb"><div class="up-thumb-doc">📄</div><div style="font-size:9px;padding:2px 4px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+f.name.substring(0,15)+'</div><div class="up-thumb-rm" onclick="removerEvid('+i+')">✕</div></div>';
  }).join('');
}
window.removerEvid = function(i){ filesEvidencias.splice(i,1); renderEvidPreview(); };

// ── SALVAR PRODUTO ────────────────────────────────────────
window.salvarProduto = async function(){
  var tdrId=document.getElementById('f-tdr').value;
  var ppId=document.getElementById('f-prod-prev').value;
  var tipo=document.getElementById('f-tipo').value;
  var desc=document.getElementById('f-desc').value.trim();
  var dtEnt=document.getElementById('f-dt-entrega').value;
  var qtd=document.getElementById('f-qtd').value;
  var obs=document.getElementById('f-obs').value.trim();

  if(!tdrId){toast('Selecione o TDR.','error');return;}
  if(!desc){toast('Descreva o produto entregue.','error');return;}

  // Dados do produto previsto selecionado
  var ppSel=document.getElementById('f-prod-prev');
  var ppOpt=ppSel.options[ppSel.selectedIndex];
  var numProd=ppOpt&&ppOpt.dataset.num?parseInt(ppOpt.dataset.num):1;
  var prazoPrevisto=ppOpt&&ppOpt.dataset.prazo?parseInt(ppOpt.dataset.prazo):null;
  var tipoPrevisto=ppOpt&&ppOpt.dataset.tipo||null;
  var conforme=!tipoPrevisto||tipoPrevisto===tipo;
  var alertaConf=conforme?null:'Tipo entregue ('+tipo+') difere do previsto no TDR ('+tipoPrevisto+').';

  // Fornecedor do TDR
  var tdr=tdrMap[tdrId];
  var fornId=tdr&&tdr.fornecedor_id||null;

  var btn=document.getElementById('btn-salvar-prod');
  btn.textContent='Salvando...'; btn.disabled=true;

  try {
    // 1. Upload documento principal
    var arquivoUrl=null, arquivoNome=null;
    if(filesDocumento.length>0){
      var f=filesDocumento[0];
      var path='produtos/'+tdrId+'/doc_'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var {data:upDoc,error:errDoc} = await db.storage.from('produtos-evidencias').upload(path,f,{upsert:true});
      if(errDoc)throw new Error('Erro upload documento: '+errDoc.message);
      var {data:{publicUrl}} = db.storage.from('produtos-evidencias').getPublicUrl(path);
      arquivoUrl=publicUrl; arquivoNome=f.name;
    }

    // 2. Inserir produto
    var payload={
      tdr_id:tdrId, produto_previsto_id:ppId||null,
      fornecedor_id:fornId, numero_produto:numProd,
      tipo_produto:tipo, descricao_pt:desc,
      quantidade_entregue:qtd?parseFloat(qtd):null,
      arquivo_url:arquivoUrl, arquivo_nome:arquivoNome,
      dt_entrega:dtEnt||null, observacoes:obs||null,
      conforme_contrato:conforme, alerta_conformidade:alertaConf||null,
      status:'submetido', submetido_por:appState.usuario.id,
      submetido_em:new Date().toISOString(),
    };
    var {data:prod,error:errProd} = await db.from('produtos_entregues').insert(payload).select().single();
    if(errProd)throw new Error('Erro ao salvar: '+errProd.message);

    // 3. Upload evidências
    for(var i=0;i<filesEvidencias.length;i++){
      var ev=filesEvidencias[i];
      var epth='produtos/'+tdrId+'/evid_'+Date.now()+'_'+i+'_'+ev.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var {error:errEv} = await db.storage.from('produtos-evidencias').upload(epth,ev,{upsert:true});
      if(errEv){console.warn('Erro evidência:',errEv);continue;}
      var {data:{publicUrl:evUrl}} = db.storage.from('produtos-evidencias').getPublicUrl(epth);
      await db.from('produto_evidencias').insert({
        produto_id:prod.id, arquivo_url:evUrl, arquivo_nome:ev.name,
        tipo:ev.type.startsWith('image/')?'foto':'documento',
        criado_por:appState.usuario.id,
      });
    }

    fecharModalProduto();
    await carregar();
    toast('Produto registrado com sucesso!','success');
  } catch(e){
    toast('Erro: '+e.message,'error');
  }
  btn.textContent='Registrar entrega'; btn.disabled=false;
};

// ── AÇÕES DE APROVAÇÃO ────────────────────────────────────
window.pedirAcao = function(acao, id){
  var labels={aprovar_tecnico:'Aprovação técnica',aprovar_coord:'Aprovação coordenação',aprovar_dir:'Aprovação diretoria — final'};
  pedirSenhaProd(labels[acao]||acao,'Confirme com sua senha para registrar a aprovação.',function(){
    executarAcao(acao,id);
  });
};

async function executarAcao(acao,id){
  var updates={};
  var novoStatus;
  var agora=new Date().toISOString();
  var uid=appState.usuario.id;
  if(acao==='aprovar_tecnico'){updates={aprovado_tecnico_por:uid,aprovado_tecnico_em:agora,status:'aprovado_tecnico'};novoStatus='aprovado_tecnico';}
  else if(acao==='aprovar_coord'){updates={aprovado_coord_por:uid,aprovado_coord_em:agora,status:'aprovado_coordenacao'};novoStatus='aprovado_coordenacao';}
  else if(acao==='aprovar_dir'){updates={aprovado_dir_por:uid,aprovado_dir_em:agora,status:'aprovado_diretoria'};novoStatus='aprovado_diretoria';}
  var {error}=await db.from('produtos_entregues').update(updates).eq('id',id);
  if(error){toast('Erro ao aprovar: '+error.message,'error');return;}
  await carregar();
  var lbl=ST_LABEL[novoStatus]||novoStatus;
  toast('Produto aprovado: '+lbl,'success');
}

// ── DEVOLUÇÃO ─────────────────────────────────────────────
var devolvEndoId=null;
window.abrirDevolucao = function(id){
  devolvEndoId=id;
  document.getElementById('motivo-dev').value='';
  document.getElementById('modal-devolver-prod').classList.add('aberto');
};
window.executarDevolucaoProd = async function(){
  var motivo=document.getElementById('motivo-dev').value.trim();
  if(!motivo){toast('O motivo é obrigatório.','error');return;}
  fecharModal('modal-devolver-prod');
  pedirSenhaProd('Confirmar devolução','Devolução com motivo registrado.',async function(){
    var uid=appState.usuario.id;
    var {error}=await db.from('produtos_entregues').update({
      status:'recusado', motivo_recusa:motivo,
      recusado_por:uid, recusado_em:new Date().toISOString(),
    }).eq('id',devolvEndoId);
    if(error){toast('Erro: '+error.message,'error');return;}
    await carregar();
    toast('Produto devolvido para correção.','success');
  });
};

// ── ADICIONAR EVIDÊNCIA ───────────────────────────────────
window.adicionarEvidencia = function(prodId){
  var inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*,.pdf'; inp.multiple=true;
  inp.onchange=async function(){
    var files=Array.from(inp.files).slice(0,10);
    if(!files.length)return;
    toast('Enviando evidências...','info');
    var tdrId=todosProds.find(function(p){return p.id===prodId;})?.tdr_id||'geral';
    for(var f of files){
      var path='produtos/'+tdrId+'/evid_'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var {error:errUp}=await db.storage.from('produtos-evidencias').upload(path,f,{upsert:true});
      if(errUp){console.warn(errUp);continue;}
      var {data:{publicUrl}}=db.storage.from('produtos-evidencias').getPublicUrl(path);
      await db.from('produto_evidencias').insert({produto_id:prodId,arquivo_url:publicUrl,arquivo_nome:f.name,tipo:f.type.startsWith('image/')?'foto':'documento',criado_por:appState.usuario.id});
    }
    // Recarregar painel
    var el=document.getElementById('painel-'+prodId);
    if(el){el.innerHTML='';el.classList.remove('aberto');}
    await carregar();
    toast('Evidências adicionadas!','success');
  };
  inp.click();
};

// ── SENHA ─────────────────────────────────────────────────
function pedirSenhaProd(titulo,sub,cb){
  document.getElementById('senha-prod-titulo').textContent=titulo;
  document.getElementById('senha-prod-sub').textContent=sub;
  document.getElementById('senha-prod-input').value='';
  document.getElementById('senha-prod-erro').style.display='none';
  var btn=document.getElementById('senha-prod-btn');
  btn.textContent='Confirmar'; btn.disabled=false;
  senhaCb=cb;
  document.getElementById('modal-senha-prod').classList.add('aberto');
  setTimeout(function(){document.getElementById('senha-prod-input').focus();},100);
}
window.confirmarSenhaProd = async function(){
  var senha=document.getElementById('senha-prod-input').value;
  if(!senha){toast('Digite sua senha.','error');return;}
  var btn=document.getElementById('senha-prod-btn');
  btn.textContent='Verificando...'; btn.disabled=true;
  try{
    var {error}=await db.auth.signInWithPassword({email:appState.usuario.email,password:senha});
    if(error){
      document.getElementById('senha-prod-erro').style.display='block';
      document.getElementById('senha-prod-input').value='';
      document.getElementById('senha-prod-input').focus();
      btn.textContent='Confirmar'; btn.disabled=false;
      return;
    }
    fecharSenhaProd();
    if(senhaCb)await senhaCb();
  }catch(e){toast('Erro na verificação.','error');btn.textContent='Confirmar';btn.disabled=false;}
};
window.fecharSenhaProd = function(){
  document.getElementById('modal-senha-prod').classList.remove('aberto');
  document.getElementById('senha-prod-input').value='';
  var btn=document.getElementById('senha-prod-btn');
  if(btn){btn.textContent='Confirmar';btn.disabled=false;}
  senhaCb=null;
};

})();
</script>
