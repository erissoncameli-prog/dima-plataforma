<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Avaliação de Produtos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<style>
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc-g::after{background:var(--verde-claro)}.sc-a::after{background:var(--aviso)}
.sc-b::after{background:var(--azul-medio)}.sc-r::after{background:var(--erro)}.sc-p::after{background:#7C3AED}
.stat-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:600;color:var(--cinza-900);}
.stat-sub{font-size:10px;color:var(--cinza-500);margin-top:3px;}
.filtro-box{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px 20px;margin-bottom:16px;}
.filtro-steps{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--verde-medio);color:#fff;border-radius:50%;font-size:10px;font-weight:700;margin-right:6px;flex-shrink:0;}
.step-lbl{font-size:11px;font-weight:600;color:var(--cinza-600);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;}
.produtos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
.prod-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.prod-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:var(--verde-medio);}
.prod-card-top{padding:12px 14px;border-bottom:1px solid var(--borda);display:flex;align-items:center;gap:8px;}
.prod-card-body{padding:12px 14px;}
.prod-card-foot{padding:9px 14px;border-top:1px solid var(--borda);background:var(--cinza-50);display:flex;align-items:center;justify-content:space-between;}
.sit{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;}
.sit-pendente{background:#FFFBEB;color:#92400E}
.sit-em_analise{background:#EFF6FF;color:#1E40AF}
.sit-entrega_parcial{background:#F5F3FF;color:#6D28D9}
.sit-pago{background:#ECFDF5;color:#065F46}
.num-prod{font-family:var(--font-mono);font-size:10px;font-weight:700;background:var(--verde-medio);color:#fff;padding:2px 8px;border-radius:4px;}
.prog-produto{height:5px;background:var(--cinza-100);border-radius:3px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:3px;transition:width .4s;}
.sec-titulo{font-size:11px;font-weight:700;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.07em;padding:8px 0;margin-bottom:8px;border-bottom:2px solid var(--borda);display:flex;align-items:center;gap:8px;}
.sec-cnt{font-size:10px;padding:1px 7px;border-radius:99px;}
.sec-analise .sec-titulo{color:#1E40AF;border-color:#BFDBFE;}.sec-analise .sec-cnt{background:#DBEAFE;color:#1E40AF;}
.sec-parcial .sec-titulo{color:#6D28D9;border-color:#DDD6FE;}.sec-parcial .sec-cnt{background:#EDE9FE;color:#6D28D9;}
.sec-pendente .sec-titulo{color:#92400E;border-color:#FDE68A;}.sec-pendente .sec-cnt{background:#FEF3C7;color:#92400E;}
.modal-prod{max-width:700px;}
.info-box{background:var(--cinza-50);border:1px solid var(--borda);border-radius:var(--raio);padding:12px 14px;margin-bottom:14px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.info-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.info-val{font-size:12px;color:var(--cinza-900);font-weight:500;}
.entrega-item{border:1px solid var(--borda);border-radius:var(--raio);padding:10px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.edot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0;}
.edot.aprovada{background:#059669;}.edot.em_analise{background:#2563EB;}.edot.devolvida{background:#DC2626;}
.upload-zona{border:2px dashed var(--borda-forte);border-radius:var(--raio);padding:16px;text-align:center;cursor:pointer;transition:all .15s;}
.upload-zona:hover,.upload-zona.drag{border-color:var(--verde-medio);background:var(--verde-bg);}
.upload-zona.tem{border-color:#059669;background:#ECFDF5;border-style:solid;}
.despacho-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--raio);padding:14px;}
.decisao-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.decisao-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--borda);border-radius:var(--raio);cursor:pointer;transition:all .15s;}
.decisao-opt:hover{border-color:var(--verde-medio);}
.decisao-opt.sel-total{border-color:#059669;background:#ECFDF5;}
.decisao-opt.sel-parcial{border-color:#7C3AED;background:#F5F3FF;}
.decisao-opt.sel-devol{border-color:#DC2626;background:#FEF2F2;}
.decisao-opt input{margin-top:2px;flex-shrink:0;}
.decisao-tit{font-size:13px;font-weight:600;}
.decisao-sub{font-size:11px;color:var(--cinza-500);margin-top:2px;}
#wrap-parcial{display:none;background:var(--cinza-50);border:1px solid var(--borda);border-radius:var(--raio);padding:12px 14px;margin-top:-4px;margin-bottom:8px;}
.btn-aprovar{background:#059669;color:#fff;border:none;border-radius:var(--raio);padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-aprovar:hover{background:#047857;}
.btn-parcial{background:#7C3AED;color:#fff;border:none;border-radius:var(--raio);padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-parcial:hover{background:#6D28D9;}
.btn-devolver{background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5;border-radius:var(--raio);padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-registrar{background:var(--azul-medio);color:#fff;border:none;border-radius:var(--raio);padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
/* Galeria de fotos */
.fotos-drop{border:2px dashed var(--borda-forte);border-radius:var(--raio);padding:18px;text-align:center;cursor:pointer;transition:all .15s;background:var(--cinza-50);}
.fotos-drop:hover,.fotos-drop.drag{border-color:var(--verde-medio);background:var(--verde-bg);}
.fotos-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px;}
.foto-thumb{position:relative;aspect-ratio:1;border-radius:var(--raio);overflow:hidden;border:1px solid var(--borda);}
.foto-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.foto-thumb-del{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1;}
.foto-thumb-del:hover{background:rgba(220,38,38,.8);}
.fotos-existentes{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;}
.foto-exist{position:relative;aspect-ratio:1;border-radius:var(--raio);overflow:hidden;border:1px solid var(--borda);cursor:pointer;}
.foto-exist img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s;}
.foto-exist:hover img{transform:scale(1.05);}
/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column;}
#lightbox.aberto{display:flex;}
#lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:var(--raio);}
#lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;line-height:1;}
#lightbox-nome{color:rgba(255,255,255,.7);font-size:12px;margin-top:10px;}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh">
    <div style="text-align:center">
      <div style="width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2D6A4F;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      Carregando...
    </div>
  </div>
</div>
<div id="lightbox" onclick="fecharLightbox()">
  <button id="lightbox-close" onclick="fecharLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-nome"></div>
</div>
<div class="modal-overlay" id="modal-prod">
  <div class="modal modal-prod">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="mp-titulo">Produto</div>
        <div style="font-size:11px;color:var(--cinza-500);margin-top:2px" id="mp-sub"></div>
      </div>
      <button class="modal-close" onclick="fecharModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="mp-body" style="max-height:72vh;overflow-y:auto"></div>
    <div class="modal-footer" id="mp-footer"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
let atividades=[],contratos=[],todosProdutos=[];
let produtoAtual=null,entregaAtual=null,entregaArquivo=null;
let filtAtiv='',filtCont='',decisaoSel='';
let fotosNovas=[]; // array de File objects (máx 10)

(async()=>{
  const u=await carregarUsuario();
  if(!u){window.location.href='../index.html';return;}
  document.getElementById('app').innerHTML=
    gerarLayout('Avaliação de Produtos','produtos')+`
    <div class="fade-in">
      <div class="stat-row" id="stats"></div>
      <div class="filtro-box">
        <div class="filtro-steps">
          <div>
            <div class="step-lbl"><span class="step-num">1</span>Atividade</div>
            <select class="form-control" id="sel-ativ" onchange="selecionarAtiv(this.value)">
              <option value="">Selecione a atividade...</option>
            </select>
          </div>
          <div>
            <div class="step-lbl"><span class="step-num">2</span>Contrato</div>
            <select class="form-control" id="sel-cont" onchange="selecionarCont(this.value)" disabled>
              <option value="">Selecione primeiro a atividade</option>
            </select>
          </div>
        </div>
      </div>
      <div id="conteudo"></div>
    </div>`+`</div></div></div>`;
  await carregar();
})();

async function carregar(){
  const [rA,rC]=await Promise.all([
    db.from('atividades').select('id,codigo,nome_pt').order('codigo'),
    db.from('contratos').select('id,numero,objeto_pt,atividade_id,fornecedor_id,elemento_despesa,fornecedores(id,nome)').order('numero')
  ]);
  atividades=rA.data||[];
  contratos=rC.data||[];
  const comCont=new Set(contratos.map(c=>c.atividade_id).filter(Boolean));
  const sel=document.getElementById('sel-ativ');
  atividades.filter(a=>comCont.has(a.id)).forEach(a=>{
    const o=document.createElement('option');
    o.value=a.id;
    o.textContent=`${a.codigo} — ${(a.nome_pt||'').substring(0,55)}`;
    sel.appendChild(o);
  });
  await renderStats();
}

async function renderStats(){
  const {data}=await db.from('contratos_produtos').select('situacao');
  const t=data||[];
  const pend=t.filter(p=>p.situacao==='pendente').length;
  const anal=t.filter(p=>p.situacao==='em_analise').length;
  const parc=t.filter(p=>p.situacao==='entrega_parcial').length;
  const pago=t.filter(p=>p.situacao==='pago').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card sc-b"><div class="stat-lbl">Total</div><div class="stat-val">${t.length}</div><div class="stat-sub">todos os contratos</div></div>
    <div class="stat-card sc-a"><div class="stat-lbl">Pendentes</div><div class="stat-val" style="color:var(--aviso)">${pend}</div><div class="stat-sub">aguardando entrega</div></div>
    <div class="stat-card" style="border-color:#BFDBFE"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:#2563EB"></div>
      <div class="stat-lbl" style="color:#1E40AF">Em avaliação</div><div class="stat-val" style="color:#1E40AF">${anal}</div><div class="stat-sub">aguardando parecer</div></div>
    <div class="stat-card sc-p"><div class="stat-lbl">Parcial</div><div class="stat-val" style="color:#7C3AED">${parc}</div><div class="stat-sub">aprovação incompleta</div></div>
    <div class="stat-card sc-g"><div class="stat-lbl">Concluídos</div><div class="stat-val" style="color:var(--sucesso)">${pago}</div><div class="stat-sub">100% aprovados</div></div>`;
}

function selecionarAtiv(id){
  filtAtiv=id;filtCont='';todosProdutos=[];
  const sel=document.getElementById('sel-cont');
  sel.innerHTML='<option value="">Selecione o contrato...</option>';
  if(!id){sel.disabled=true;renderVazio('Selecione uma atividade para começar.');return;}
  const lista=contratos.filter(c=>c.atividade_id===id);
  lista.forEach(c=>{
    const o=document.createElement('option');
    o.value=c.id;
    o.textContent=`${c.numero}${c.fornecedores?.nome?' · '+c.fornecedores.nome:''}`;
    sel.appendChild(o);
  });
  sel.disabled=!lista.length;
  if(!lista.length){sel.innerHTML='<option>Nenhum contrato nesta atividade</option>';renderVazio('Nenhum contrato vinculado.');}
  else if(lista.length===1){sel.value=lista[0].id;selecionarCont(lista[0].id);}
  else renderVazio(`${lista.length} contratos. Selecione um.`);
}

async function selecionarCont(id){
  filtCont=id;
  if(!id){renderVazio('Selecione um contrato.');return;}
  document.getElementById('conteudo').innerHTML='<div style="text-align:center;padding:30px;color:var(--cinza-400)">Carregando...</div>';
  const {data}=await db.from('contratos_produtos')
    .select('*,contratos(id,numero,objeto_pt,atividade_id,fornecedores(id,nome),atividades(id,codigo,nome_pt))')
    .eq('contrato_id',id)
    .not('situacao','in','("pago","cancelado")')
    .order('numero_produto',{ascending:true});
  todosProdutos=data||[];
  renderLista();
}

function renderLista(){
  const el=document.getElementById('conteudo');
  if(!todosProdutos.length){renderVazio('Todos os produtos deste contrato foram concluídos.');return;}
  const emAnalise=todosProdutos.filter(p=>p.situacao==='em_analise');
  const parcial  =todosProdutos.filter(p=>p.situacao==='entrega_parcial');
  const pendentes=todosProdutos.filter(p=>p.situacao==='pendente');
  let html='';
  if(emAnalise.length) html+=`<div class="sec-analise" style="margin-bottom:20px">
    <div class="sec-titulo">&#x23F3; Em avaliação <span class="sec-cnt">${emAnalise.length}</span></div>
    <div class="produtos-grid">${emAnalise.map(renderCard).join('')}</div></div>`;
  if(parcial.length) html+=`<div class="sec-parcial" style="margin-bottom:20px">
    <div class="sec-titulo">&#x25D1; Entrega parcial <span class="sec-cnt">${parcial.length}</span></div>
    <div class="produtos-grid">${parcial.map(renderCard).join('')}</div></div>`;
  if(pendentes.length) html+=`<div class="sec-pendente">
    <div class="sec-titulo">&#x25CB; Aguardando entrega <span class="sec-cnt">${pendentes.length}</span></div>
    <div class="produtos-grid">${pendentes.map(renderCard).join('')}</div></div>`;
  el.innerHTML=html;
}

function renderCard(p){
  const hoje=new Date();
  const venc=p.dt_vencimento?new Date(p.dt_vencimento+'T12:00:00'):null;
  const dias=venc?Math.ceil((venc-hoje)/86400000):null;
  let vClass='',vTxt='';
  if(venc){
    if(dias<0){vClass='color:#991B1B;background:#FEF2F2';vTxt=`Vencido ${Math.abs(dias)}d`;}
    else if(dias<=7){vClass='color:#92400E;background:#FFFBEB';vTxt=`Vence ${dias}d`;}
    else{vClass='color:var(--cinza-600);background:var(--cinza-100)';vTxt=`Vence ${fmtData(p.dt_vencimento)}`;}
  }
  const pct=parseFloat(p.pct_aprovado||0);
  const corProg=p.situacao==='entrega_parcial'?'#7C3AED':p.situacao==='em_analise'?'#2563EB':'var(--verde-claro)';
  const acaoTxt={pendente:'&#x1F4E5; Registrar entrega &#x2192;',em_analise:'&#x1F50D; Avaliar &#x2192;',entrega_parcial:'&#x1F4E5; Nova entrega &#x2192;'}[p.situacao]||'&#x2192;';
  const topBg=p.situacao==='em_analise'?'background:#EFF6FF;border-bottom-color:#BFDBFE':p.situacao==='entrega_parcial'?'background:#F5F3FF;border-bottom-color:#DDD6FE':'';
  return `<div class="prod-card" onclick="abrirModal('${p.id}')">
    <div class="prod-card-top" style="${topBg}">
      <span class="num-prod">Produto ${p.numero_produto}</span>
      <span class="sit sit-${p.situacao}">${sitLbl(p.situacao)}</span>
      ${vTxt?`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;${vClass};margin-left:auto">${vTxt}</span>`:''}
    </div>
    <div class="prod-card-body">
      <div style="font-size:13px;font-weight:600;color:var(--cinza-900);margin-bottom:6px;line-height:1.3">${p.descricao}</div>
      <div style="font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--verde-medio)">${fmtBRL(parseFloat(p.valor_brl||0))}</div>
      ${pct>0?`<div style="margin-top:8px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--cinza-500);margin-bottom:3px"><span>Aprovado</span><span>${pct}%</span></div>
        <div class="prog-produto"><div class="prog-fill" style="width:${pct}%;background:${corProg}"></div></div>
      </div>`:''}
    </div>
    <div class="prod-card-foot">
      <span style="font-size:11px;color:var(--cinza-500)">${p.dt_entrega?'Última entrega: '+fmtData(p.dt_entrega):'Sem entrega'}</span>
      <span style="font-size:11px;font-weight:600;color:var(--cinza-400)">${acaoTxt}</span>
    </div>
    <!-- Rodapé com contexto do contrato -->
    <div style="padding:8px 14px;background:var(--cinza-50);border-top:1px solid var(--borda);display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      ${p.contratos?.atividades?.codigo?`<span style="font-family:var(--font-mono);font-size:10px;font-weight:600;background:var(--verde-bg);color:var(--verde-medio);padding:2px 6px;border-radius:3px">${p.contratos.atividades.codigo}</span>`:''}
      ${p.contratos?.numero?`<span style="font-size:10px;color:var(--cinza-500)">Contrato ${p.contratos.numero}</span>`:''}
      ${p.contratos?.fornecedores?.nome?`<span style="font-size:10px;color:var(--cinza-600);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px" title="${p.contratos.fornecedores.nome}">· ${p.contratos.fornecedores.nome}</span>`:''}
    </div>
  </div>`;
}

function sitLbl(s){return{pendente:'Pendente',em_analise:'Em avaliação',entrega_parcial:'Parcial',pago:'Pago',cancelado:'Cancelado'}[s]||s;}
function renderVazio(msg){document.getElementById('conteudo').innerHTML=`<div class="empty-state"><div class="empty-state-icon">&#x25A3;</div><div class="empty-state-msg">${msg}</div></div>`;}

async function abrirModal(prodId){
  entregaArquivo=null;decisaoSel='';entregaAtual=null;
  const {data:p}=await db.from('contratos_produtos').select('*').eq('id',prodId).single();
  if(!p)return;
  produtoAtual=p;
  const {data:entregas}=await db.from('contratos_produtos_entregas')
    .select('*').eq('produto_id',prodId).order('numero_entrega',{ascending:true});
  const listaEntregas=entregas||[];
  entregaAtual=listaEntregas.find(e=>e.situacao==='em_analise')||null;
  const cont=contratos.find(c=>c.id===p.contrato_id);
  const pctAprov=parseFloat(p.pct_aprovado||0);
  const pctRest=Math.max(0,100-pctAprov);
  const valorRest=parseFloat(p.valor_brl||0)*pctRest/100;
  const numProxEntrega=listaEntregas.length+1;
  const isPend=p.situacao==='pendente'||p.situacao==='entrega_parcial';
  const isAnalise=p.situacao==='em_analise';

  document.getElementById('mp-titulo').textContent=

function selecionarDecisao(tipo){
  decisaoSel=tipo;
  document.querySelectorAll('.decisao-opt').forEach(el=>el.className='decisao-opt');
  const mapa={aprovacao_total:'opt-total',aprovacao_parcial:'opt-parcial',devolucao:'opt-devol'};
  const cls={aprovacao_total:'sel-total',aprovacao_parcial:'sel-parcial',devolucao:'sel-devol'};
  const el=document.getElementById(mapa[tipo]);
  if(el) el.className='decisao-opt '+cls[tipo];
  const radio=document.querySelector(`input[name="decisao"][value="${tipo}"]`);
  if(radio) radio.checked=true;
  const wp=document.getElementById('wrap-parcial');
  if(wp) wp.style.display=tipo==='aprovacao_parcial'?'block':'none';
}

function calcValorParcial(pct,totalProduto){
  const campo=document.getElementById('f-val-parcial');
  if(campo) campo.value=((parseFloat(pct)||0)*totalProduto/100).toFixed(2);
}

function selArquivo(file){
  if(!file)return;
  entregaArquivo=file;
  const zona=document.getElementById('zona-upload');
  if(zona){zona.classList.add('tem');zona.innerHTML=`<div style="font-size:13px;font-weight:500">&#x1F4CE; ${file.name} (${Math.round(file.size/1024)}KB)</div>`;}
}

// ── FOTOS ─────────────────────────────────────────────────────
function adicionarFotos(files){
  const MAX=10;
  const permitidos=['image/jpeg','image/jpg','image/png'];
  Array.from(files).forEach(f=>{
    if(!permitidos.includes(f.type)){toast(`${f.name}: apenas JPEG/JPG/PNG.`,'error');return;}
    if(fotosNovas.length>=MAX){toast(`Máximo de ${MAX} fotos por entrega.`,'error');return;}
    fotosNovas.push(f);
  });
  renderFotosGrid();
}

function renderFotosGrid(){
  const grid=document.getElementById('fotos-grid');
  const count=document.getElementById('fotos-count');
  if(!grid) return;
  grid.innerHTML=fotosNovas.map((f,i)=>{
    const url=URL.createObjectURL(f);
    return `<div class="foto-thumb">
      <img src="${url}" alt="${f.name}">
      <button class="foto-thumb-del" onclick="removerFoto(${i})" title="Remover">✕</button>
    </div>`;
  }).join('');
  if(count) count.textContent=fotosNovas.length>0?`${fotosNovas.length}/10 foto(s) selecionada(s)`:'';
  // Atualizar área de drop
  const drop=document.getElementById('fotos-drop');
  if(drop){
    drop.style.borderColor=fotosNovas.length>0?'var(--verde-medio)':'';
    drop.style.background=fotosNovas.length>0?'var(--verde-bg)':'var(--cinza-50)';
  }
}

function removerFoto(idx){
  fotosNovas.splice(idx,1);
  renderFotosGrid();
}

function abrirLightbox(url,nome){
  const lb=document.getElementById('lightbox');
  const img=document.getElementById('lightbox-img');
  const nm=document.getElementById('lightbox-nome');
  if(lb){lb.classList.add('aberto');}
  if(img) img.src=url;
  if(nm) nm.textContent=nome||'';
}
function fecharLightbox(){
  const lb=document.getElementById('lightbox');
  if(lb) lb.classList.remove('aberto');
  const img=document.getElementById('lightbox-img');
  if(img) img.src='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('lightbox')?.classList.contains('aberto'))fecharLightbox();});

async function registrarEntrega(numEntrega,pctRest,valorRest){
  const dtEnt=document.getElementById('f-dt-ent')?.value;
  const obs  =document.getElementById('f-obs-ent')?.value?.trim()||'';
  if(!dtEnt){toast('Informe a data de entrega.','error');return;}

  let arquivoUrl=null,arquivoNome=null;
  if(entregaArquivo){
    toast('Enviando documento...','info');
    const path=`produtos/${produtoAtual.id}/entrega-${numEntrega}-${Date.now()}_${entregaArquivo.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const {error:upErr}=await db.storage.from('tdrs-arquivos').upload(path,entregaArquivo,{upsert:true});
    if(upErr){toast('Erro no upload do documento: '+upErr.message,'error');return;}
    const {data:urlD}=db.storage.from('tdrs-arquivos').getPublicUrl(path);
    arquivoUrl=urlD.publicUrl;arquivoNome=entregaArquivo.name;
  }

  // Upload das fotos
  let fotosUrls=[], fotosNomes=[];
  if(fotosNovas.length){
    toast(`Enviando ${fotosNovas.length} foto(s)...`,'info');
    for(let i=0;i<fotosNovas.length;i++){
      const foto=fotosNovas[i];
      const ext=foto.name.split('.').pop().toLowerCase();
      const path=`produtos/${produtoAtual.id}/fotos/entrega-${numEntrega}-foto-${i+1}-${Date.now()}.${ext}`;
      const {error:fErr}=await db.storage.from('tdrs-arquivos').upload(path,foto,{upsert:true});
      if(!fErr){
        const {data:fUrl}=db.storage.from('tdrs-arquivos').getPublicUrl(path);
        fotosUrls.push(fUrl.publicUrl);
        fotosNomes.push(foto.name);
      }
    }
  }

  const {error}=await db.from('contratos_produtos_entregas').insert({
    produto_id:produtoAtual.id,contrato_id:produtoAtual.contrato_id,
    numero_entrega:numEntrega,
    pct_entregue:pctRest,valor_entregue:valorRest,
    dt_entrega:dtEnt,dt_vencimento_orig:produtoAtual.dt_vencimento,
    situacao:'em_analise',
    arquivo_url:arquivoUrl,arquivo_nome:arquivoNome,
    arquivo_data:arquivoUrl?new Date().toISOString():null,
    fotos_urls:fotosUrls,fotos_nomes:fotosNomes,fotos_total:fotosUrls.length,
    criado_por:appState.usuario.id
  });
  if(error){toast('Erro: '+error.message,'error');return;}

  await db.from('contratos_produtos').update({
    dt_entrega:dtEnt,situacao:'em_analise',
    observacoes:obs||produtoAtual.observacoes,
    atualizado_em:new Date().toISOString()
  }).eq('id',produtoAtual.id);

  const msgFotos=fotosUrls.length?` + ${fotosUrls.length} foto(s)`:'';
  toast(`Entrega registrada${msgFotos} e enviada para avaliação!`,'success');
  fecharModal();
  await selecionarCont(filtCont);
  await renderStats();
}

async function emitirDespacho(tipoBtn){
  // Sincronizar decisão com botão clicado (permite clicar direto no botão sem selecionar radio)
  if(tipoBtn) selecionarDecisao(tipoBtn);
  const tipo=tipoBtn||decisaoSel;
  if(!tipo){toast('Selecione uma decisão.','error');return;}
  const despacho=document.getElementById('f-despacho')?.value?.trim();
  const dtDesp  =document.getElementById('f-dt-desp')?.value;
  if(!despacho||despacho.length<20){toast('O texto do despacho deve ter pelo menos 20 caracteres.','error');return;}

  let pctAprov=100,valorAprov=parseFloat(produtoAtual.valor_brl||0)*(100-parseFloat(produtoAtual.pct_aprovado||0))/100;
  if(tipo==='aprovacao_parcial'){
    pctAprov=parseFloat(document.getElementById('f-pct')?.value)||0;
    if(pctAprov<=0){toast('Informe o percentual aprovado.','error');return;}
    valorAprov=parseFloat(produtoAtual.valor_brl||0)*pctAprov/100;
  }

  // Gerar número de despacho
  const {data:numDesp,error:rpcErr}=await db.rpc('gerar_numero_despacho');
  if(rpcErr){toast('Erro ao gerar número de despacho: '+rpcErr.message,'error');return;}

  toast('Emitindo despacho...','info');
  const novaSit=tipo==='devolucao'?'devolvida':'aprovada';

  const {error:updErr}=await db.from('contratos_produtos_entregas').update({
    situacao:        novaSit,
    tipo_decisao:    tipo,
    despacho_numero: numDesp,
    despacho_texto:  despacho,
    despacho_data:   dtDesp||new Date().toISOString().split('T')[0],
    despachado_por:  appState.usuario.id,
    despachado_em:   new Date().toISOString(),
    pct_entregue:    tipo!=='devolucao'?pctAprov:0,
    valor_entregue:  tipo!=='devolucao'?valorAprov:0,
    atualizado_em:   new Date().toISOString()
  }).eq('id',entregaAtual.id);
  if(updErr){toast('Erro: '+updErr.message,'error');return;}

  // Atualizar produto pai
  if(tipo!=='devolucao'){
    const novoPct=Math.min(100,parseFloat(produtoAtual.pct_aprovado||0)+pctAprov);
    const novoVal=parseFloat(produtoAtual.valor_brl||0)*novoPct/100;
    const novaSitProd=novoPct>=100?'pago':'entrega_parcial';
    await db.from('contratos_produtos').update({
      pct_aprovado:  novoPct,
      valor_aprovado:novoVal,
      situacao:      novaSitProd,
      atualizado_em: new Date().toISOString()
    }).eq('id',produtoAtual.id);
  } else {
    await db.from('contratos_produtos').update({
      situacao:'pendente',atualizado_em:new Date().toISOString()
    }).eq('id',produtoAtual.id);
  }

  const msgs={
    aprovacao_total: `&#x2714; Despacho ${numDesp} emitido. Lançamento "a pagar" gerado automaticamente no Financeiro.`,
    aprovacao_parcial:`&#x25D1; Despacho ${numDesp} emitido. Lançamento parcial (${pctAprov}% · ${fmtBRL(valorAprov)}) gerado no Financeiro.`,
    devolucao:`&#x21A9; Despacho ${numDesp} emitido. Produto devolvido ao consultor para correção.`
  };
  toast(msgs[tipo]||'Despacho emitido.','success',7000);
  fecharModal();
  await selecionarCont(filtCont);
  await renderStats();
}

function fecharModal(){
  document.getElementById('modal-prod').classList.remove('aberto');
  produtoAtual=null;entregaAtual=null;entregaArquivo=null;decisaoSel='';
  fotosNovas=[];
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')fecharModal();});
</script>
</body>
</html>
