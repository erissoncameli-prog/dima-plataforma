<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Usuários</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<style>
.perfil-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
.pb-super{background:#EEEDFE;color:#3C3489}
.pb-coord{background:#E1F5EE;color:#085041}
.pb-tecnico{background:#E6F1FB;color:#0C447C}
.pb-financeiro{background:#FAEEDA;color:#633806}
.pb-consultor{background:#F1EFE8;color:#444441}
.pb-visualizador{background:#F3F4F6;color:#374151}

.usuario-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:8px;transition:all .15s;}
.usuario-card:hover{border-color:var(--verde-claro);box-shadow:0 2px 8px rgba(45,106,79,.08);}
.usuario-card.inativo{opacity:.55;}

.u-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.ua-super{background:#EEEDFE;color:#3C3489}
.ua-coord{background:#E1F5EE;color:#085041}
.ua-tecnico{background:#E6F1FB;color:#0C447C}
.ua-financeiro{background:#FAEEDA;color:#633806}
.ua-consultor{background:#F1EFE8;color:#444441}
.ua-visualizador{background:#F3F4F6;color:#374151}

.u-info{flex:1;min-width:0;}
.u-nome{font-size:14px;font-weight:600;color:var(--cinza-900);margin-bottom:2px;}
.u-email{font-size:12px;color:var(--cinza-500);font-family:var(--font-mono);}
.u-meta{font-size:11px;color:var(--cinza-400,#9CA3AF);margin-top:3px;}

.perm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.perm-item{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--raio);border:1px solid var(--borda);font-size:11px;color:var(--cinza-700);}
.perm-item.ativo{background:var(--sucesso-bg);border-color:#A7F3D0;color:#065F46;}
.perm-item.inativo-perm{background:var(--cinza-50);color:var(--cinza-400,#9CA3AF);}
.perm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pd-on{background:var(--sucesso)}.pd-off{background:var(--cinza-300)}

.stat-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:12px 14px;text-align:center;}
.stat-val{font-size:20px;font-weight:600;color:var(--cinza-900);margin-bottom:2px;}
.stat-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;}

.idioma-flag{font-size:14px;}

.senha-info{background:var(--aviso-bg);border:1px solid #FDE68A;border-radius:var(--raio);padding:10px 14px;font-size:12px;color:#92400E;margin-bottom:14px;}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#6B7280">
    <div style="text-align:center">
      <div style="width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2D6A4F;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      Carregando usuários...
    </div>
  </div>
</div>

<!-- MODAL USUÁRIO -->
<div class="modal-overlay" id="modal-usuario">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <span class="modal-title" id="m-titulo">Novo Usuário</span>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-footer" id="m-footer"></div>
  </div>
</div>

<!-- MODAL CONFIRMAR DESATIVAR -->
<div class="modal-overlay" id="modal-confirmar">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <span class="modal-title" id="conf-titulo">Confirmar ação</span>
      <button class="modal-close" onclick="document.getElementById('modal-confirmar').classList.remove('aberto')">✕</button>
    </div>
    <div class="modal-body" id="conf-body"></div>
    <div class="modal-footer" id="conf-footer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
let todosUsuarios = [];
let usuarioEditando = null;

const PERFIS = ['super_admin','coordenacao','tecnico','financeiro','consultor_externo','visualizador'];
const PERFIS_INFO = {
  super_admin:   { label:'Super Admin',       cor:'ua-super',    badge:'pb-super',    desc:'Acesso total — gerencia usuários, todos os módulos e configurações.' },
  coordenacao:   { label:'Coordenação',       cor:'ua-coord',    badge:'pb-coord',    desc:'Aprova TDRs, produtos e acessa todos os módulos exceto gestão de usuários.' },
  tecnico:       { label:'Técnico/Focal',     cor:'ua-tecnico',  badge:'pb-tecnico',  desc:'Cria e edita atividades e TDRs nas fases permitidas. Não acessa financeiro.' },
  financeiro:    { label:'Financeiro',        cor:'ua-financeiro',badge:'pb-financeiro',desc:'Acessa execução financeira, contratos e passagens. Não edita TDRs.' },
  consultor_externo:{ label:'Consultor Externo',cor:'ua-consultor',badge:'pb-consultor',desc:'Submete produtos entregues e visualiza seus próprios TDRs.' },
  visualizador:  { label:'Visualizador',      cor:'ua-visualizador',badge:'pb-visualizador',desc:'Apenas visualização — sem permissão para criar ou editar.' },
};

const PERMISSOES = {
  super_admin:       { atividades:true, tdrs:true, financeiro:true, contratos:true, viagens:true, matriz:true, usuarios:true, aprovar:true },
  coordenacao:       { atividades:true, tdrs:true, financeiro:true, contratos:true, viagens:true, matriz:true, usuarios:false, aprovar:true },
  tecnico:           { atividades:true, tdrs:true, financeiro:false, contratos:false, viagens:false, matriz:true, usuarios:false, aprovar:false },
  financeiro:        { atividades:false, tdrs:false, financeiro:true, contratos:true, viagens:true, matriz:true, usuarios:false, aprovar:false },
  consultor_externo: { atividades:false, tdrs:false, financeiro:false, contratos:false, viagens:false, matriz:false, usuarios:false, aprovar:false },
  visualizador:      { atividades:false, tdrs:false, financeiro:false, contratos:false, viagens:false, matriz:true, usuarios:false, aprovar:false },
};

const MOD_LABELS = {
  atividades:'Atividades', tdrs:'TDRs', financeiro:'Financeiro',
  contratos:'Contratos', viagens:'Viagens', matriz:'Matriz', usuarios:'Usuários', aprovar:'Aprovar'
};

// ── INIT ──────────────────────────────────────────────────────
(async () => {
  const usuario = await carregarUsuario();
  if (!usuario) { window.location.href = '../index.html'; return; }

  // Apenas super_admin pode acessar
  if (appState.perfil !== 'super_admin') {
    document.getElementById('app').innerHTML =
      gerarLayout('Usuários', 'usuarios') +
      `<div class="alert alert-danger" style="max-width:500px">
        🔒 Acesso restrito. Apenas o Super Admin pode gerenciar usuários.
      </div>` + `</div></div></div>`;
    return;
  }

  document.getElementById('app').innerHTML =
    gerarLayout('Usuários — Gestão de Acesso', 'usuarios') + `
    <div class="fade-in">
      <!-- Stats por perfil -->
      <div class="stat-row" id="stats-perfis"></div>

      <!-- Filtros -->
      <div class="filter-bar">
        <input class="form-control" type="text" id="busca-u" style="width:240px"
          placeholder="Buscar nome ou e-mail..." oninput="filtrar()">
        <select class="form-control" id="fil-perfil" onchange="filtrar()" style="width:180px">
          <option value="">Todos os perfis</option>
          ${PERFIS.map(p=>`<option value="${p}">${PERFIS_INFO[p].label}</option>`).join('')}
        </select>
        <select class="form-control" id="fil-ativo" onchange="filtrar()" style="width:140px">
          <option value="">Ativos + Inativos</option>
          <option value="true">Somente ativos</option>
          <option value="false">Somente inativos</option>
        </select>
        <span id="cont-u" style="font-size:12px;color:var(--cinza-500);margin-left:auto"></span>
        <button class="btn btn-primary btn-sm" onclick="abrirNovo()">+ Novo usuário</button>
      </div>

      <!-- Lista -->
      <div id="lista-usuarios"></div>

      <!-- Tabela de permissões -->
      <div class="card" style="margin-top:24px">
        <div class="card-header">
          <span class="card-title">Permissões por perfil</span>
          <span style="font-size:11px;color:var(--cinza-500)">Referência — definidas pelo sistema</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Perfil</th>
                ${Object.keys(MOD_LABELS).map(m=>`<th style="text-align:center">${MOD_LABELS[m]}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${PERFIS.map(p=>`<tr>
                <td><span class="perfil-badge ${PERFIS_INFO[p].badge}">${PERFIS_INFO[p].label}</span></td>
                ${Object.keys(MOD_LABELS).map(m=>`<td style="text-align:center">
                  ${PERMISSOES[p][m]
                    ?`<span style="color:var(--sucesso);font-size:16px">✓</span>`
                    :`<span style="color:var(--cinza-300);font-size:14px">—</span>`}
                </td>`).join('')}
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>` + `</div></div></div>`;

  await carregar();
})();

async function carregar() {
  try {
    const { data } = await db.from('usuarios').select('*').order('nome_completo');
    todosUsuarios = data || [];
    renderStats();
    filtrar();
  } catch(e) { toast('Erro ao carregar usuários.', 'error'); }
}

function renderStats() {
  const counts = {};
  PERFIS.forEach(p => counts[p] = todosUsuarios.filter(u => u.perfil === p && u.ativo).length);
  const total = todosUsuarios.filter(u => u.ativo).length;

  document.getElementById('stats-perfis').innerHTML = `
    <div class="stat-card" style="border-top:3px solid #7F77DD">
      <div class="stat-val">${total}</div>
      <div class="stat-lbl">Total ativos</div>
    </div>
    ${PERFIS.map(p => `
    <div class="stat-card" style="border-top:3px solid ${corPerfil(p)}">
      <div class="stat-val">${counts[p]}</div>
      <div class="stat-lbl">${PERFIS_INFO[p].label}</div>
    </div>`).join('')}`;
}

function corPerfil(p) {
  const cores = { super_admin:'#7F77DD', coordenacao:'#1D9E75', tecnico:'#2563EB',
    financeiro:'#BA7517', consultor_externo:'#888780', visualizador:'#6B7280' };
  return cores[p] || '#6B7280';
}

function filtrar() {
  const b = document.getElementById('busca-u').value.toLowerCase();
  const p = document.getElementById('fil-perfil').value;
  const a = document.getElementById('fil-ativo').value;

  const fil = todosUsuarios.filter(u => {
    if (b && !u.nome_completo.toLowerCase().includes(b) && !u.email.toLowerCase().includes(b)) return false;
    if (p && u.perfil !== p) return false;
    if (a !== '' && String(u.ativo) !== a) return false;
    return true;
  });

  document.getElementById('cont-u').textContent = `${fil.length} de ${todosUsuarios.length} usuários`;

  const el = document.getElementById('lista-usuarios');
  if (!fil.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">◍</div><div class="empty-state-msg">Nenhum usuário encontrado.</div></div>`;
    return;
  }

  el.innerHTML = fil.map(u => {
    const info = PERFIS_INFO[u.perfil] || PERFIS_INFO.visualizador;
    const iniciais = u.nome_completo.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
    const flags = { pt:'🇧🇷', en:'🇺🇸', es:'🇪🇸' };

    return `<div class="usuario-card ${u.ativo?'':'inativo'}">
      <div class="u-avatar ${info.cor}">${iniciais}</div>
      <div class="u-info">
        <div class="u-nome">
          ${u.nome_completo}
          ${!u.ativo?`<span class="badge" style="background:var(--cinza-500);margin-left:6px">Inativo</span>`:''}
        </div>
        <div class="u-email">${u.email}</div>
        <div class="u-meta">
          Criado em ${fmtData(u.criado_em)}
          ${u.idioma_pref?` · ${flags[u.idioma_pref]||''} ${u.idioma_pref.toUpperCase()}`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        <span class="perfil-badge ${info.badge}">${info.label}</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-secondary" onclick="abrirEditar('${u.id}')">✏️ Editar</button>
          ${u.id !== appState.usuario?.id
            ? u.ativo
              ? `<button class="btn btn-sm btn-danger" onclick="confirmarDesativar('${u.id}')">Desativar</button>`
              : `<button class="btn btn-sm btn-secondary" onclick="reativar('${u.id}')">Reativar</button>`
            : `<span style="font-size:11px;color:var(--cinza-400,#9CA3AF)">Você</span>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── ABRIR NOVO ────────────────────────────────────────────────
function abrirNovo() {
  usuarioEditando = null;
  document.getElementById('m-titulo').textContent = 'Novo Usuário';
  renderFormulario(null);
  document.getElementById('m-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvar()">Criar usuário</button>`;
  document.getElementById('modal-usuario').classList.add('aberto');
}

// ── ABRIR EDITAR ──────────────────────────────────────────────
function abrirEditar(id) {
  usuarioEditando = todosUsuarios.find(u => u.id === id);
  if (!usuarioEditando) return;
  document.getElementById('m-titulo').textContent = `Editar — ${usuarioEditando.nome_completo}`;
  renderFormulario(usuarioEditando);
  document.getElementById('m-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvar()">Salvar alterações</button>`;
  document.getElementById('modal-usuario').classList.add('aberto');
}

function renderFormulario(u) {
  const isNovo = !u;
  const perfilSel = u?.perfil || 'tecnico';

  document.getElementById('m-body').innerHTML = `
    ${isNovo ? `<div class="senha-info">
      ⚠ Após criar o usuário aqui, vá em <strong>Supabase → Authentication → Users → Add user</strong>
      e cadastre o e-mail com a senha. O UUID gerado deve ser igual ao ID que será criado.<br><br>
      <strong>Fluxo recomendado:</strong> Crie o usuário no Supabase Auth primeiro, copie o UUID, depois cadastre aqui.
    </div>` : ''}

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Nome completo <span class="obrig">*</span></label>
        <input class="form-control" id="f-nome" type="text" value="${u?.nome_completo||''}"
          placeholder="Nome e Sobrenome">
      </div>
      <div class="form-group">
        <label class="form-label">E-mail <span class="obrig">*</span></label>
        <input class="form-control" id="f-email" type="email" value="${u?.email||''}"
          placeholder="usuario@email.com" ${!isNovo?'readonly style="background:var(--cinza-50)"':''}>
        ${!isNovo?`<div class="form-hint">E-mail não pode ser alterado aqui.</div>`:''}
      </div>
    </div>

    ${isNovo ? `<div class="form-group">
      <label class="form-label">UUID do usuário (Supabase Auth) <span class="obrig">*</span></label>
      <input class="form-control" id="f-uuid" type="text"
        placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
        style="font-family:var(--font-mono);font-size:12px">
      <div class="form-hint">Copie o UID do usuário criado no painel Supabase → Authentication → Users</div>
    </div>` : ''}

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Perfil de acesso <span class="obrig">*</span></label>
        <select class="form-control" id="f-perfil" onchange="atualizarDescPerfil()">
          ${PERFIS.map(p=>`<option value="${p}" ${perfilSel===p?'selected':''}>${PERFIS_INFO[p].label}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Idioma preferido</label>
        <select class="form-control" id="f-idioma">
          <option value="pt" ${u?.idioma_pref==='pt'?'selected':''}>🇧🇷 Português</option>
          <option value="en" ${u?.idioma_pref==='en'?'selected':''}>🇺🇸 English</option>
          <option value="es" ${u?.idioma_pref==='es'?'selected':''}>🇪🇸 Español</option>
        </select>
      </div>
    </div>

    <!-- Descrição e permissões do perfil selecionado -->
    <div id="desc-perfil" style="background:var(--cinza-50);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:14px 16px;margin-bottom:16px">
    </div>

    <!-- Permissões visuais do perfil -->
    <div class="form-label" style="margin-bottom:8px">Permissões do perfil selecionado</div>
    <div class="perm-grid" id="perm-grid"></div>

    ${!isNovo && u?.id !== appState.usuario?.id ? `
    <div class="divider"></div>
    <div class="form-group">
      <label class="form-label">Status da conta</label>
      <div style="display:flex;align-items:center;gap:10px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="radio" name="f-ativo" value="true" ${u.ativo?'checked':''}> Ativo
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="radio" name="f-ativo" value="false" ${!u.ativo?'checked':''}> Inativo
        </label>
      </div>
      <div class="form-hint">Usuários inativos não conseguem fazer login.</div>
    </div>` : ''}
  `;

  atualizarDescPerfil();
}

function atualizarDescPerfil() {
  const perfil = document.getElementById('f-perfil')?.value || 'tecnico';
  const info = PERFIS_INFO[perfil];
  const perms = PERMISSOES[perfil];

  document.getElementById('desc-perfil').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span class="perfil-badge ${info.badge}">${info.label}</span>
    </div>
    <div style="font-size:12px;color:var(--cinza-700);line-height:1.5">${info.desc}</div>`;

  document.getElementById('perm-grid').innerHTML =
    Object.keys(MOD_LABELS).map(m => `
      <div class="perm-item ${perms[m]?'ativo':'inativo-perm'}">
        <div class="perm-dot ${perms[m]?'pd-on':'pd-off'}"></div>
        <span>${MOD_LABELS[m]}</span>
      </div>`).join('');
}

// ── SALVAR ────────────────────────────────────────────────────
async function salvar() {
  const nome = document.getElementById('f-nome').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const perfil = document.getElementById('f-perfil').value;
  const idioma = document.getElementById('f-idioma').value;

  if (!nome || !email || !perfil) {
    toast('Preencha nome, e-mail e perfil.', 'error'); return;
  }

  try {
    if (!usuarioEditando) {
      // NOVO usuário
      const uuid = document.getElementById('f-uuid').value.trim();
      if (!uuid || !uuid.match(/^[0-9a-f-]{36}$/i)) {
        toast('UUID inválido. Copie do Supabase Auth.', 'error'); return;
      }
      const { error } = await db.from('usuarios').insert({
        id: uuid, nome_completo: nome, email, perfil,
        idioma_pref: idioma, ativo: true
      });
      if (error) {
        if (error.code === '23505') toast('Este e-mail ou UUID já está cadastrado.', 'error');
        else throw error;
        return;
      }
      const novoU = { id:uuid, nome_completo:nome, email, perfil, idioma_pref:idioma, ativo:true, criado_em:new Date().toISOString() };
      todosUsuarios.push(novoU);
      toast(`Usuário ${nome} criado com sucesso!`, 'success');
    } else {
      // EDITAR usuário existente
      const ativoEl = document.querySelector('input[name="f-ativo"]:checked');
      const ativo = ativoEl ? ativoEl.value === 'true' : usuarioEditando.ativo;
      const { error } = await db.from('usuarios').update({
        nome_completo: nome, perfil, idioma_pref: idioma, ativo
      }).eq('id', usuarioEditando.id);
      if (error) throw error;
      Object.assign(usuarioEditando, { nome_completo:nome, perfil, idioma_pref:idioma, ativo });
      toast(`Usuário ${nome} atualizado!`, 'success');
    }

    fecharModal();
    renderStats();
    filtrar();
  } catch(e) {
    toast('Erro ao salvar: ' + (e.message || ''), 'error');
  }
}

// ── DESATIVAR / REATIVAR ──────────────────────────────────────
function confirmarDesativar(id) {
  const u = todosUsuarios.find(x => x.id === id);
  if (!u) return;
  document.getElementById('conf-titulo').textContent = 'Desativar usuário';
  document.getElementById('conf-body').innerHTML = `
    <div class="alert alert-warning">
      Tem certeza que deseja desativar <strong>${u.nome_completo}</strong>?<br>
      O usuário não conseguirá mais fazer login. Esta ação pode ser revertida.
    </div>`;
  document.getElementById('conf-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="document.getElementById('modal-confirmar').classList.remove('aberto')">Cancelar</button>
    <button class="btn btn-danger" onclick="desativar('${id}')">Desativar</button>`;
  document.getElementById('modal-confirmar').classList.add('aberto');
}

async function desativar(id) {
  try {
    await db.from('usuarios').update({ ativo: false }).eq('id', id);
    const u = todosUsuarios.find(x => x.id === id);
    if (u) u.ativo = false;
    document.getElementById('modal-confirmar').classList.remove('aberto');
    renderStats(); filtrar();
    toast('Usuário desativado.', 'success');
  } catch(e) { toast('Erro ao desativar.', 'error'); }
}

async function reativar(id) {
  try {
    await db.from('usuarios').update({ ativo: true }).eq('id', id);
    const u = todosUsuarios.find(x => x.id === id);
    if (u) u.ativo = true;
    renderStats(); filtrar();
    toast('Usuário reativado com sucesso!', 'success');
  } catch(e) { toast('Erro ao reativar.', 'error'); }
}

function fecharModal() {
  document.getElementById('modal-usuario').classList.remove('aberto');
  usuarioEditando = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') fecharModal();
});
</script>
</body>
</html>
