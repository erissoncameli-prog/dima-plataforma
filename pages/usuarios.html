<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Usuários</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<style>
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc-g::after{background:var(--verde-claro)}.sc-b::after{background:var(--azul-medio)}
.sc-a::after{background:var(--aviso)}.sc-r::after{background:var(--erro)}
.stat-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:600;color:var(--cinza-900);}
.stat-sub{font-size:10px;color:var(--cinza-500);margin-top:3px;}
/* Tabela */
.usr-table{width:100%;border-collapse:collapse;background:var(--branco);border-radius:var(--raio-lg);overflow:hidden;border:1px solid var(--borda);}
.usr-table th{padding:10px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--cinza-500);background:var(--cinza-50);border-bottom:1px solid var(--borda);text-align:left;white-space:nowrap;}
.usr-table td{padding:11px 14px;font-size:13px;color:var(--cinza-700);border-bottom:1px solid var(--borda);vertical-align:middle;}
.usr-table tr:last-child td{border-bottom:none;}
.usr-table tr:hover td{background:var(--cinza-50);}
.usr-table tr.inativo td{opacity:.55;}
/* Avatar */
.avatar{width:34px;height:34px;border-radius:50%;background:var(--verde-medio);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
/* Upload foto */
.avatar-upload-wrap{position:relative;display:inline-block;cursor:pointer;}
.avatar-upload-wrap:hover .avatar-overlay{opacity:1;}
.avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:16px;color:#fff;}
/* Perfil badge */
.perfil-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;}
.pb-super_admin{background:#FEF3C7;color:#92400E}
.pb-coordenacao{background:#DBEAFE;color:#1E40AF}
.pb-tecnico{background:#D1FAE5;color:#065F46}
.pb-financeiro{background:#F5F3FF;color:#6D28D9}
.pb-consultor_externo{background:#FFE4E6;color:#9F1239}
.pb-visualizador{background:#F3F4F6;color:#6B7280}
/* Status */
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}
.sd-ativo{background:#10B981}
.sd-inativo{background:#D1D5DB}
/* Ações */
.btn-acao{font-size:11px;padding:4px 10px;border-radius:var(--raio);border:1px solid var(--borda);background:var(--branco);cursor:pointer;font-family:var(--font-sans);color:var(--cinza-700);transition:all .12s;}
.btn-acao:hover{background:var(--cinza-50);border-color:var(--cinza-400);}
/* Senha strength */
.senha-bar{height:4px;background:var(--cinza-100);border-radius:2px;margin-top:6px;overflow:hidden;}
.senha-fill{height:100%;border-radius:2px;transition:all .3s;}
/* Perfil pessoal — seções */
.perfil-secao{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);margin-bottom:14px;overflow:hidden;}
.perfil-secao-header{padding:12px 16px;background:var(--cinza-50);border-bottom:1px solid var(--borda);display:flex;align-items:center;gap:10px;}
.perfil-secao-body{padding:16px;}
/* Solicitações pendentes badge */
.sol-badge{background:#FEF3C7;color:#92400E;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;}
/* Modal visualizar foto */
.modal-foto-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-foto-overlay.aberto{opacity:1;pointer-events:all;}
.modal-foto-box{background:var(--branco);border-radius:18px;padding:28px 28px 22px;max-width:360px;width:92%;text-align:center;transform:scale(.93);transition:transform .2s;box-shadow:0 24px 64px rgba(0,0,0,.4);}
.modal-foto-overlay.aberto .modal-foto-box{transform:scale(1);}
.modal-foto-img-wrap{width:160px;height:160px;border-radius:50%;overflow:hidden;margin:0 auto 16px;border:4px solid var(--borda);background:var(--cinza-100);}
.modal-foto-img-wrap img{width:100%;height:100%;object-fit:cover;}
.modal-foto-nome{font-size:15px;font-weight:700;color:var(--cinza-900);margin-bottom:4px;}
.modal-foto-cargo{font-size:12px;color:var(--cinza-500);margin-bottom:20px;}
.modal-foto-acoes{display:flex;gap:10px;justify-content:center;margin-bottom:14px;}
.modal-foto-fechar{font-size:11px;color:var(--cinza-400);cursor:pointer;background:none;border:none;font-family:var(--font-sans);padding:4px 8px;border-radius:var(--raio);transition:color .15s;}
.modal-foto-fechar:hover{color:var(--cinza-700);}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh">
    <div style="text-align:center">
      <div style="width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2D6A4F;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      Carregando...
    </div>
  </div>
</div>

<!-- MODAL VISUALIZAR FOTO -->
<div class="modal-foto-overlay" id="modal-foto" onclick="fecharModalFoto(event)">
  <div class="modal-foto-box">
    <div class="modal-foto-img-wrap">
      <img id="modal-foto-img" src="" alt="foto">
    </div>
    <div class="modal-foto-nome" id="modal-foto-nome"></div>
    <div class="modal-foto-cargo" id="modal-foto-cargo"></div>
    <div class="modal-foto-acoes">
      <button class="btn btn-secondary" style="font-size:12px;padding:7px 16px" onclick="trocarFotoModal()">📷 Trocar foto</button>
      <button class="btn" style="font-size:12px;padding:7px 16px;background:#FEF2F2;color:#991B1B;border:1px solid #FECACA" onclick="removerFotoModal()">🗑 Remover</button>
    </div>
    <button class="modal-foto-fechar" onclick="fecharModalFoto()">Fechar</button>
  </div>
</div>

<!-- MODAL PRINCIPAL -->
<div class="modal-overlay" id="modal-usr">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <div><div class="modal-title" id="mu-titulo">Usuário</div>
      <div style="font-size:11px;color:var(--cinza-500);margin-top:2px" id="mu-sub"></div></div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body" id="mu-body" style="padding:20px 24px;max-height:70vh;overflow-y:auto"></div>
    <div class="modal-footer" id="mu-footer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
const PERFIS={
  super_admin:'Super Admin',coordenacao:'Coordenação',tecnico:'Técnico',
  financeiro:'Financeiro',consultor_externo:'Consultor Externo',visualizador:'Visualizador'
};
const PERFIS_LIST=Object.keys(PERFIS);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDT=d=>d?new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';

// Módulos disponíveis para concessão de acesso extra
const MODULOS_LISTA = [
  { id:'dashboard',    icone:'⊞', label:'Dashboard',            perfis:null },
  { id:'atividades',   icone:'◈', label:'Atividades',           perfis:null },
  { id:'tdrs',         icone:'◧', label:'TDRs',                 perfis:null },
  { id:'matriz',       icone:'◎', label:'Matriz de Resultados', perfis:null },
  { id:'fornecedores', icone:'◫', label:'Fornecedores',         perfis:['super_admin','coordenacao','financeiro','tecnico'] },
  { id:'contratos',    icone:'◪', label:'Contratos',            perfis:['super_admin','coordenacao','financeiro'] },
  { id:'produtos',     icone:'◉', label:'Produtos Entregues',   perfis:['super_admin','coordenacao','tecnico'] },
  { id:'financeiro',   icone:'◈', label:'Financeiro',           perfis:['super_admin','coordenacao','financeiro'] },
  { id:'viagens',      icone:'✈', label:'Viagens',              perfis:['super_admin','coordenacao','financeiro','tecnico'] },
  { id:'repositorio',  icone:'🔗', label:'Repositório',          perfis:null },
  { id:'usuarios',     icone:'◍', label:'Usuários',             perfis:['super_admin'] },
];

let todosUsuarios=[],solicitacoes=[];
let usuarioAtual=null;

// Gera iniciais a partir do nome
function mkIniciais(nome){return(nome||'U').split(' ').map(p=>p[0]).join('').substring(0,2).toUpperCase();}

// Renderiza avatar: foto se disponível, iniciais caso contrário
function mkAvatar(u,size=34,extraStyle=''){
  const ini=mkIniciais(u.nome_completo);
  const bg=u.ativo===false?'var(--cinza-300)':'var(--verde-medio)';
  const s=`width:${size}px;height:${size}px;font-size:${Math.round(size*0.35)}px;${extraStyle}`;
  if(u.avatar_url){
    return`<div class="avatar" style="${s}${u.ativo===false?';background:var(--cinza-300)':''}">
      <img src="${esc(u.avatar_url)}" alt="${esc(ini)}" onerror="this.parentNode.innerHTML='${ini}'">
    </div>`;
  }
  return`<div class="avatar" style="${s};background:${bg}">${ini}</div>`;
}

// ── INIT ──────────────────────────────────────────────────────
(async()=>{
  const u=await carregarUsuario();
  if(!u){window.location.href='../index.html';return;}

  const isAdmin=appState.perfil==='super_admin';

  if(isAdmin){
    // Painel administrativo completo
    document.getElementById('app').innerHTML=gerarLayout('Usuários','usuarios')+`
      <div class="fade-in">
        <div class="stat-row" id="stats"></div>
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
          <input class="form-control" id="f-busca" style="width:240px" placeholder="🔍 Buscar nome ou e-mail..."
            oninput="filtrar()">
          <select class="form-control" id="f-perfil" style="width:150px" onchange="filtrar()">
            <option value="">Todos os perfis</option>
            ${Object.entries(PERFIS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
          </select>
          <select class="form-control" id="f-status" style="width:130px" onchange="filtrar()">
            <option value="">Todos</option>
            <option value="ativo">Ativos</option>
            <option value="inativo">Inativos</option>
            <option value="trocar">Trocar senha</option>
          </select>
          <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="abrirFormNovo()">+ Novo usuário</button>
        </div>
        <table class="usr-table" id="tabela-usuarios">
          <thead><tr>
            <th style="width:36px"></th>
            <th>Nome</th><th>E-mail</th><th>Perfil</th>
            <th>Status</th><th>Último acesso</th><th>Ações</th>
          </tr></thead>
          <tbody id="tbody-usuarios"></tbody>
        </table>
      </div>`+`</div></div></div>`;
    await carregarDados();
  } else {
    // Perfil pessoal para não-admins
    document.getElementById('app').innerHTML=gerarLayout('Meu Perfil','usuarios')+`
      <div class="fade-in" style="max-width:640px">
        <div id="perfil-content"></div>
      </div>`+`</div></div></div>`;
    renderPerfilPessoal();
  }
})();

// ══════════════════════════════════════════════════════════════
// PAINEL ADMIN
// ══════════════════════════════════════════════════════════════
async function carregarDados(){
  const[{data:u},{data:s}]=await Promise.all([
    db.from('usuarios').select('*').order('nome_completo'),
    db.from('solicitacoes_senha').select('*').eq('status','pendente')
  ]);
  todosUsuarios=u||[];solicitacoes=s||[];
  renderStats();filtrar();
}

function renderStats(){
  const t=todosUsuarios;
  const ativos=t.filter(u=>u.ativo).length;
  const trocar=t.filter(u=>u.deve_trocar_senha).length;
  const solPend=solicitacoes.length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card sc-b"><div class="stat-lbl">Total</div><div class="stat-val">${t.length}</div><div class="stat-sub">usuários cadastrados</div></div>
    <div class="stat-card sc-g"><div class="stat-lbl">Ativos</div><div class="stat-val" style="color:var(--sucesso)">${ativos}</div><div class="stat-sub">${t.length-ativos} inativos</div></div>
    <div class="stat-card sc-a"><div class="stat-lbl">Trocar senha</div><div class="stat-val" style="color:var(--aviso)">${trocar}</div><div class="stat-sub">aguardando troca</div></div>
    <div class="stat-card sc-r"><div class="stat-lbl">Solicitações</div><div class="stat-val" style="color:var(--erro)">${solPend}</div><div class="stat-sub">reset pendente</div></div>`;
}

function filtrar(){
  const b=(document.getElementById('f-busca')?.value||'').toLowerCase();
  const p=document.getElementById('f-perfil')?.value||'';
  const s=document.getElementById('f-status')?.value||'';
  const fil=todosUsuarios.filter(u=>{
    if(p&&u.perfil!==p)return false;
    if(s==='ativo'&&!u.ativo)return false;
    if(s==='inativo'&&u.ativo)return false;
    if(s==='trocar'&&!u.deve_trocar_senha)return false;
    if(b){const txt=[(u.nome_completo||''),(u.email||'')].join(' ').toLowerCase();if(!txt.includes(b))return false;}
    return true;
  });
  const tbody=document.getElementById('tbody-usuarios');
  if(!tbody)return;
  tbody.innerHTML=fil.map(u=>{
    const temSol=solicitacoes.some(s=>s.usuario_id===u.id);
    return`<tr class="${u.ativo?'':'inativo'}" style="cursor:pointer" onclick="abrirUsuario('${u.id}')">
      <td>${mkAvatar(u,34)}</td>
      <td>
        <div style="font-weight:600;color:var(--cinza-900)">${esc(u.nome_completo||'—')}</div>
        ${u.deve_trocar_senha?'<span style="font-size:10px;background:#FEF3C7;color:#92400E;padding:1px 6px;border-radius:99px">⚠ Trocar senha</span>':''}
        ${temSol?'<span style="font-size:10px;background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:99px;margin-left:4px">🔑 Solicitou reset</span>':''}
      </td>
      <td style="font-size:12px;color:var(--cinza-600)">${esc(u.email||'—')}</td>
      <td><span class="perfil-badge pb-${u.perfil}">${PERFIS[u.perfil]||u.perfil}</span></td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <span class="status-dot ${u.ativo?'sd-ativo':'sd-inativo'}"></span>
        <span style="font-size:12px">${u.ativo?'Ativo':'Inativo'}</span>
      </div></td>
      <td style="font-size:11px;color:var(--cinza-500)">${fmtDT(u.ultimo_acesso_em)}</td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap">
        <button class="btn-acao" onclick="abrirUsuario('${u.id}')">✎ Editar</button>
        <button class="btn-acao" style="margin-left:4px" onclick="toggleAtivo('${u.id}',${u.ativo})">${u.ativo?'Desativar':'Ativar'}</button>
      </td>
    </tr>`;
  }).join('');
  if(!fil.length)tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--cinza-400)">Nenhum usuário encontrado.</td></tr>`;
}

// ── Abrir usuário (admin) ──────────────────────────────────────
async function abrirUsuario(id){
  const u=todosUsuarios.find(x=>x.id===id);
  if(!u)return;
  usuarioAtual=u;
  const solUser=solicitacoes.filter(s=>s.usuario_id===id);

  // Carregar permissões extras existentes para este usuário
  const {data:permsDB}=await db.from('usuario_permissoes')
    .select('*').eq('usuario_id',id).eq('ativo',true);
  const permsMap={}; // modulo → registro
  (permsDB||[]).forEach(p=>permsMap[p.modulo]=p);

  document.getElementById('mu-titulo').textContent=u.nome_completo||'Usuário';
  document.getElementById('mu-sub').textContent=`${PERFIS[u.perfil]||u.perfil} · ${u.email}`;

  document.getElementById('mu-body').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--borda)">
      <!-- Avatar clicável para visualizar/trocar -->
      <div class="avatar-upload-wrap" onclick="${u.avatar_url ? `abrirModalFoto('admin')` : `document.getElementById('inp-avatar-admin').click()`}" title="${u.avatar_url ? 'Clique para ver ou trocar a foto' : 'Clique para adicionar uma foto'}">
        <input type="file" id="inp-avatar-admin" style="display:none" accept=".jpg,.jpeg,.png,.webp"
          onchange="uploadAvatarAdmin('${u.id}',this.files[0])">
        <div id="avatar-admin-wrap" style="width:60px;height:60px;border-radius:50%;overflow:hidden;flex-shrink:0;${u.ativo?'background:var(--verde-medio)':'background:var(--cinza-300)'};display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff">
          ${u.avatar_url
            ? `<img id="avatar-admin-img" src="${esc(u.avatar_url)}" alt="${esc(u.nome_completo)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
            : `<span id="avatar-admin-ini">${mkIniciais(u.nome_completo)}</span>`}
        </div>
        <div class="avatar-overlay">${u.avatar_url ? '🔍' : '📷'}</div>
      </div>
      <div>
        <div style="font-size:16px;font-weight:700;color:var(--cinza-900)">${esc(u.nome_completo)}</div>
        <div style="font-size:12px;color:var(--cinza-500)">${esc(u.email)}</div>
        <div style="display:flex;gap:6px;margin-top:4px">
          <span class="perfil-badge pb-${u.perfil}">${PERFIS[u.perfil]||u.perfil}</span>
          <span style="font-size:10px;padding:2px 8px;border-radius:99px;${u.ativo?'background:#D1FAE5;color:#065F46':'background:#F3F4F6;color:#6B7280'}">${u.ativo?'Ativo':'Inativo'}</span>
        </div>
        <div style="font-size:10px;color:var(--cinza-400);margin-top:4px">${u.avatar_url ? 'Clique para ver ou trocar a foto' : 'Clique para adicionar uma foto'}</div>
      </div>
    </div>

    <!-- Dados -->
    <div class="grid-2" style="margin-bottom:14px">
      <div class="form-group"><label class="form-label">Nome completo</label>
        <input class="form-control" id="eu-nome" type="text" value="${esc(u.nome_completo||'')}"></div>
      <div class="form-group"><label class="form-label">Perfil</label>
        <select class="form-control" id="eu-perfil">
          ${PERFIS_LIST.map(p=>`<option value="${p}" ${u.perfil===p?'selected':''}>${PERFIS[p]}</option>`).join('')}
        </select></div>
      <div class="form-group"><label class="form-label">Telefone</label>
        <input class="form-control" id="eu-tel" type="text" value="${esc(u.telefone||'')}"></div>
      <div class="form-group"><label class="form-label">WhatsApp?</label>
        <div style="display:flex;align-items:center;gap:8px;height:36px">
          <input type="checkbox" id="eu-whats" ${u.telefone_whatsapp?'checked':''} style="width:16px;height:16px">
          <label for="eu-whats" style="font-size:13px">Sim, é WhatsApp</label>
        </div></div>
    </div>

    <!-- Histórico de acesso -->
    <div style="background:var(--cinza-50);border:1px solid var(--borda);border-radius:var(--raio);padding:12px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--cinza-500);margin-bottom:8px">Histórico</div>
      ${[
        ['Criado em',fmtDT(u.criado_em)],
        ['Primeiro acesso',fmtDT(u.primeiro_acesso_em)],
        ['Último acesso',fmtDT(u.ultimo_acesso_em)],
        ['Deve trocar senha',u.deve_trocar_senha?'⚠ Sim':'Não'],
      ].map(([l,v])=>`<div style="display:flex;gap:8px;font-size:12px;padding:3px 0;border-bottom:1px solid var(--borda)">
        <span style="color:var(--cinza-500);min-width:140px">${l}</span>
        <span style="color:var(--cinza-900)">${v}</span>
      </div>`).join('')}
    </div>

    <!-- Permissões de acesso -->
    <div style="border:1px solid var(--borda);border-radius:var(--raio);overflow:hidden;margin-bottom:14px">
      <div style="padding:10px 14px;background:var(--cinza-50);border-bottom:1px solid var(--borda);display:flex;align-items:center;gap:8px">
        <span style="font-size:14px">🔐</span>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--cinza-900)">Permissões de acesso</div>
          <div style="font-size:10px;color:var(--cinza-500)">Módulos com <span style="background:#D1FAE5;color:#065F46;padding:0 4px;border-radius:3px">perfil</span> já são acessíveis pelo perfil do usuário. Os demais podem ser liberados individualmente com validade opcional.</div>

async function salvarUsuario(id){
  const nome=document.getElementById('eu-nome')?.value.trim();
  const perfil=document.getElementById('eu-perfil')?.value;
  const tel=document.getElementById('eu-tel')?.value.trim();
  const whats=document.getElementById('eu-whats')?.checked;
  const senha=document.getElementById('eu-senha')?.value.trim();
  if(!nome){toast('Nome obrigatório.','error');return;}

  // Atualizar dados do usuário
  const{error}=await db.from('usuarios').update({
    nome_completo:nome,perfil,
    telefone:tel||null,telefone_whatsapp:whats,
    atualizado_em:new Date().toISOString()
  }).eq('id',id);
  if(error){toast('Erro: '+error.message,'error');return;}

  // Resetar senha se preenchida
  if(senha){
    if(senha.length<8){toast('Senha mínima de 8 caracteres.','error');return;}
    const{error:sErr}=await db.rpc('fn_resetar_senha_usuario',{
      p_usuario_id:id, p_nova_senha:senha
    });
    if(sErr){toast('Erro ao resetar senha: '+sErr.message,'error');return;}
    toast('Senha temporária definida! Usuário deverá trocar no próximo acesso.','success');
  } else {
    toast('Usuário atualizado!','success');
  }
  fecharModal();await carregarDados();
}

function togglePermRow(modulo, userId){
  const chk=document.getElementById(`perm-chk-${modulo}`);
  const dtWrap=document.getElementById(`perm-dt-wrap-${modulo}`);
  if(dtWrap) dtWrap.style.display=chk?.checked?'flex':'none';

async function salvarPermissoes(userId){
  const agora=appState.usuario.id;
  const ops=[];

  for(const m of MODULOS_LISTA){
    const chk=document.getElementById(`perm-chk-${m.id}`);
    if(!chk||chk.disabled) continue; // módulos do perfil: ignorar

    const marcado=chk.checked;
    const dtEl=document.getElementById(`perm-dt-${m.id}`);
    const validAte=dtEl?.value ? new Date(dtEl.value).toISOString() : null;

    if(marcado){
      // UPSERT: inserir ou atualizar
      ops.push(
        db.from('usuario_permissoes').upsert({
          usuario_id:  userId,
          modulo:      m.id,
          ativo:       true,
          valido_de:   new Date().toISOString(),
          valido_ate:  validAte,
          concedido_por: agora,
          concedido_em:  new Date().toISOString(),
          revogado_por:  null,
          revogado_em:   null,
          motivo:        null
        },{onConflict:'usuario_id,modulo'})
      );
    } else {
      // Revogar: ativo=false + registrar quem revogou
      ops.push(
        db.from('usuario_permissoes').update({
          ativo:       false,
          revogado_por: agora,
          revogado_em:  new Date().toISOString()
        }).eq('usuario_id', userId).eq('modulo', m.id)
      );
    }
  }

  const resultados=await Promise.all(ops);
  const erros=resultados.filter(r=>r.error);
  if(erros.length){
    toast('Erro ao salvar permissões: '+erros[0].error.message,'error');
    return;
  }
  toast('Permissões salvas com sucesso!','success');
  // Reabrir para refletir estado atualizado
  fecharModal();
  await carregarDados();
  setTimeout(()=>abrirUsuario(userId),200);
}

async function toggleAtivo(id,estaAtivo){
  const acao=estaAtivo?'desativar':'ativar';
  if(!confirm(`Deseja ${acao} este usuário?`))return;
  await db.from('usuarios').update({ativo:!estaAtivo,atualizado_em:new Date().toISOString()}).eq('id',id);
  toast(`Usuário ${estaAtivo?'desativado':'ativado'}.`,'info');
  fecharModal();await carregarDados();
}

async function criarUsuario(){
  const nome=document.getElementById('nu-nome')?.value.trim();
  const email=document.getElementById('nu-email')?.value.trim();
  const perfil=document.getElementById('nu-perfil')?.value;
  const tel=document.getElementById('nu-tel')?.value.trim();
  const senha=document.getElementById('nu-senha')?.value.trim();
  if(!nome||!email||!senha){toast('Nome, e-mail e senha são obrigatórios.','error');return;}
  if(senha.length<8){toast('Senha mínima de 8 caracteres.','error');return;}
  if(!email.includes('@')){toast('E-mail inválido.','error');return;}

  // Criar usuário via Supabase Auth Admin (precisa de service role — não disponível no front)
  // Alternativa: usar signUp + depois atualizar a tabela usuarios
  toast('Criando usuário...','info');
  const{data,error}=await db.auth.admin?.createUser({
    email, password:senha,
    email_confirm:true,
    user_metadata:{nome_completo:nome}
  });

  // Fallback: signUp normal (limitação do front-end sem service role)
  if(error||!data){
    // Inserir direto na tabela se o auth já foi criado externamente
    toast('Para criar novos usuários, utilize o painel Supabase ou configure a service key no servidor.','error');
    return;
  }

  // Atualizar tabela usuarios com os dados extras
  await db.from('usuarios').update({
    nome_completo:nome,perfil,
    telefone:tel||null,
    deve_trocar_senha:true,
    senha_temporaria_usada:false,
  }).eq('id',data.user.id);

  toast('Usuário criado! Senha temporária definida.','success');
  fecharModal();await carregarDados();
}

async function trocarSenhaPropria(){
  const atual=document.getElementById('p-senha-atual')?.value;
  const nova=document.getElementById('p-senha-nova')?.value;
  const conf=document.getElementById('p-senha-conf')?.value;
  if(!atual||!nova||!conf){toast('Preencha todos os campos de senha.','error');return;}
  if(nova.length<8){toast('Nova senha deve ter pelo menos 8 caracteres.','error');return;}
  if(nova!==conf){toast('Nova senha e confirmação não coincidem.','error');return;}

  // Verificar senha atual via signInWithPassword
  const email=appState.usuario.email;
  const{data:sessaoOriginal}=await db.auth.getSession();

  const{error:loginErr}=await db.auth.signInWithPassword({email,password:atual});
  if(loginErr){
    // Restaurar sessão original
    if(sessaoOriginal?.session)await db.auth.setSession(sessaoOriginal.session);
    toast('Senha atual incorreta.','error');return;
  }
  // Restaurar sessão original imediatamente
  if(sessaoOriginal?.session)await db.auth.setSession(sessaoOriginal.session);

  // Atualizar para nova senha
  const{error}=await db.auth.updateUser({password:nova});
  if(error){toast('Erro ao alterar senha: '+error.message,'error');return;}

  // Limpar deve_trocar_senha se estava marcado
  await db.from('usuarios').update({
    deve_trocar_senha:false,senha_temporaria_usada:true,
    atualizado_em:new Date().toISOString()
  }).eq('id',appState.usuario.id);

  // Limpar campos
  ['p-senha-atual','p-senha-nova','p-senha-conf'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  const bar=document.getElementById('p-senha-bar');
  if(bar){bar.style.width='0%';}

  toast('Senha alterada com sucesso!','success');
}

async function solicitarResetAdmin(){

function avaliarSenha(senha,barId){
  const bar=document.getElementById(barId);if(!bar)return;
  let forca=0;
  if(senha.length>=8)forca+=25;
  if(senha.length>=12)forca+=15;
  if(/[A-Z]/.test(senha))forca+=20;
  if(/[0-9]/.test(senha))forca+=20;
  if(/[^A-Za-z0-9]/.test(senha))forca+=20;
  const cor=forca<40?'#EF4444':forca<70?'#F59E0B':'#10B981';
  bar.style.width=forca+'%';bar.style.background=cor;
}

function gerarSenhaAleatoria(campoId='eu-senha'){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$';
  let senha='';
  for(let i=0;i<12;i++)senha+=chars[Math.floor(Math.random()*chars.length)];
  const el=document.getElementById(campoId);
  if(el){el.value=senha;el.type='text';avaliarSenha(senha,campoId==='eu-senha'?'eu-senha-bar':'nu-senha-bar');}
  toast('Senha gerada: '+senha,'info',5000);
}

// ── UPLOAD DE AVATAR ──────────────────────────────────────────
async function uploadAvatar(file){
  if(!file)return;
  const tipos=['image/jpeg','image/jpg','image/png','image/webp'];
  if(!tipos.includes(file.type)){toast('Formato inválido. Use JPG, PNG ou WEBP.','error');return;}
  if(file.size>2*1024*1024){toast('Imagem muito grande. Máximo 2MB.','error');return;}
  toast('Enviando foto...','info');
  const ext=file.name.split('.').pop().toLowerCase();
  const path=`avatares/${appState.usuario.id}/avatar.${ext}`;
  const{error:upErr}=await db.storage.from('avatares').upload(path,file,{upsert:true,contentType:file.type});
  if(upErr){toast('Erro no upload: '+upErr.message,'error');return;}
  const{data:urlData}=db.storage.from('avatares').getPublicUrl(path);
  const avatarUrl=urlData.publicUrl+'?t='+Date.now();
  const{error}=await db.from('usuarios').update({avatar_url:avatarUrl,atualizado_em:new Date().toISOString()}).eq('id',appState.usuario.id);
  if(error){toast('Erro ao salvar: '+error.message,'error');return;}
  appState.usuario.avatar_url=avatarUrl;
  // Atualizar imagem na tela sem recarregar
  const imgEl=document.getElementById('avatar-img');
  const iniEl=document.getElementById('avatar-ini');
  if(imgEl){imgEl.src=avatarUrl;}
  else if(iniEl){
    const wrap=iniEl.parentNode;
    const img=document.createElement('img');
    img.id='avatar-img';img.src=avatarUrl;img.alt='avatar';
    img.style.cssText='width:100%;height:100%;object-fit:cover';
    wrap.replaceChild(img,iniEl);
  }
  // Atualizar sidebar
  const sidebarAvatar=document.querySelector('.sidebar-avatar');
  if(sidebarAvatar){
    sidebarAvatar.style.background='transparent';sidebarAvatar.style.padding='0';
    sidebarAvatar.innerHTML=`<img src="${avatarUrl}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  }
  toast('Foto atualizada!','success');
}

// ── MODAL VISUALIZAR FOTO ─────────────────────────────────────
let _fotoContexto=null; // 'proprio' | 'admin'

function abrirModalFoto(contexto){
  const u = contexto==='admin' ? usuarioAtual : appState.usuario;
  if(!u?.avatar_url) return;
  _fotoContexto=contexto;
  document.getElementById('modal-foto-img').src=u.avatar_url;
  document.getElementById('modal-foto-nome').textContent=u.nome_completo||'—';
  document.getElementById('modal-foto-cargo').textContent=PERFIS[u.perfil]||u.perfil||'';
  document.getElementById('modal-foto').classList.add('aberto');
}

function fecharModalFoto(e){
  if(e && e.target!==document.getElementById('modal-foto') && !e.target.classList.contains('modal-foto-fechar')) return;
  document.getElementById('modal-foto').classList.remove('aberto');
}

function trocarFotoModal(){
  document.getElementById('modal-foto').classList.remove('aberto');
  const inputId=_fotoContexto==='admin' ? 'inp-avatar-admin' : 'inp-avatar';
  setTimeout(()=>document.getElementById(inputId)?.click(), 150);
}

async function removerFotoModal(){
  const u=_fotoContexto==='admin' ? usuarioAtual : appState.usuario;
  if(!u) return;
  if(!confirm('Remover a foto de perfil?')) return;
  document.getElementById('modal-foto').classList.remove('aberto');

  const{error}=await db.from('usuarios')
    .update({avatar_url:null, atualizado_em:new Date().toISOString()})
    .eq('id',u.id);
  if(error){toast('Erro ao remover foto: '+error.message,'error');return;}

  u.avatar_url=null;

  if(_fotoContexto==='proprio'){
    // Atualizar avatar no perfil pessoal
    const imgEl=document.getElementById('avatar-img');
    const wrap=imgEl?.parentNode;
    if(imgEl&&wrap){
      const ini=document.createElement('span');
      ini.id='avatar-ini';ini.textContent=mkIniciais(u.nome_completo);
      wrap.replaceChild(ini,imgEl);
    }
    // Atualizar onclick para abrir picker diretamente
    const uploadWrap=document.querySelector('#perfil-content .avatar-upload-wrap');
    if(uploadWrap){
      uploadWrap.setAttribute('onclick',"document.getElementById('inp-avatar').click()");
      uploadWrap.setAttribute('title','Clique para adicionar uma foto');
      const overlay=uploadWrap.querySelector('.avatar-overlay');
      if(overlay) overlay.textContent='📷';
    }
    // Atualizar sidebar
    const sidebarAvatar=document.querySelector('.sidebar-avatar');
    if(sidebarAvatar){
      sidebarAvatar.style.background='';sidebarAvatar.style.padding='';
      sidebarAvatar.innerHTML=mkIniciais(u.nome_completo);
    }
  } else {
    // Atualizar avatar no modal admin
    const imgEl=document.getElementById('avatar-admin-img');
    const iniEl=document.getElementById('avatar-admin-ini');
    const wrap=document.getElementById('avatar-admin-wrap');
    if(imgEl&&wrap){
      const ini=document.createElement('span');
      ini.id='avatar-admin-ini';ini.textContent=mkIniciais(u.nome_completo);
      wrap.replaceChild(ini,imgEl);
    }
    const uploadWrap=wrap?.closest('.avatar-upload-wrap');
    if(uploadWrap){
      uploadWrap.setAttribute('onclick',"document.getElementById('inp-avatar-admin').click()");
      uploadWrap.setAttribute('title','Clique para adicionar uma foto');
      const overlay=uploadWrap.querySelector('.avatar-overlay');
      if(overlay) overlay.textContent='📷';
    }
    const uLocal=todosUsuarios.find(x=>x.id===u.id);
    if(uLocal) uLocal.avatar_url=null;
  }
  toast('Foto removida.','success');
}

function fecharModal(){
  document.getElementById('modal-usr').classList.remove('aberto');
  usuarioAtual=null;
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('modal-foto').classList.contains('aberto')){
      document.getElementById('modal-foto').classList.remove('aberto');
    } else {
      fecharModal();
    }
  }
});
