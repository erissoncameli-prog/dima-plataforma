<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Viagens e Diárias</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../css/global.css" rel="stylesheet">
<style>
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc-g::after{background:var(--verde-claro)}.sc-b::after{background:var(--azul-medio)}
.sc-a::after{background:var(--aviso)}.sc-r::after{background:var(--erro)}.sc-t::after{background:#0D9488}
.stat-lbl{font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:600;color:var(--cinza-900);}
.stat-sub{font-size:10px;color:var(--cinza-500);margin-top:3px;}

.sit-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;}
.sb-solicitado{background:#EFF6FF;color:#1E40AF}
.sb-aprovado{background:#FEF3C7;color:#92400E}
.sb-realizado{background:#D1FAE5;color:#065F46}
.sb-cancelado{background:#F3F4F6;color:#6B7280}

.viagem-card{background:var(--branco);border:1px solid var(--borda);border-radius:var(--raio-lg);padding:16px 18px;margin-bottom:10px;transition:all .15s;}
.viagem-card:hover{border-color:var(--verde-claro);box-shadow:0 2px 10px rgba(45,106,79,.08);}
.viagem-card.cancelado{opacity:.6;}

.spd-num{font-family:var(--font-mono);font-size:12px;font-weight:600;background:var(--cinza-100);padding:2px 8px;border-radius:4px;color:var(--cinza-700);}
.rota{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--cinza-900);}
.rota-sep{color:var(--cinza-400,#9CA3AF);font-size:16px;}
.beneficiario-tag{font-size:11px;color:var(--cinza-700);background:var(--azul-bg);padding:2px 8px;border-radius:99px;}

.vals-mini{display:flex;gap:16px;margin-top:8px;}
.vm-item{text-align:center;}
.vm-lbl{font-size:9px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.vm-val{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--cinza-900);}

.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--borda);margin-bottom:16px;}
.tab-btn{padding:8px 14px;font-size:12px;font-weight:500;color:var(--cinza-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);white-space:nowrap;}
.tab-btn.ativo{color:var(--verde-medio);border-bottom-color:var(--verde-medio);}
.tab-content{display:none;}
.tab-content.ativo{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.upload-mini{border:1px dashed var(--borda-forte);border-radius:var(--raio);padding:10px;text-align:center;cursor:pointer;font-size:11px;color:var(--cinza-500);transition:all .15s;}
.upload-mini:hover{border-color:var(--verde-claro);color:var(--verde-medio);}
.upload-mini.tem{border-color:var(--verde-claro);background:var(--sucesso-bg);color:var(--sucesso);}

.diaria-row{display:grid;grid-template-columns:1fr 80px 100px 100px 40px;gap:8px;align-items:center;margin-bottom:8px;}
.diaria-row-header{font-size:10px;font-weight:600;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.05em;}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#6B7280">
    <div style="text-align:center">
      <div style="width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2D6A4F;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      Carregando viagens...
    </div>
  </div>
</div>

<!-- MODAL VIAGEM -->
<div class="modal-overlay" id="modal-viagem">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="mv-titulo">Viagem</div>
        <div style="font-size:11px;color:var(--cinza-500);margin-top:2px" id="mv-sub"></div>
      </div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body" id="mv-body" style="padding:16px 24px"></div>
    <div class="modal-footer" id="mv-footer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
let todasViagens=[], atividades=[], beneficiarios=[];
let viagemEditando=null, arquivoComp=null;
let diariasCadastradas=[];

const SIT_LABELS={solicitado:'Solicitado',aprovado:'Aprovado',realizado:'Realizado',cancelado:'Cancelado'};
const TIPO_PASSAGEM=['Aérea','Rodoviária','Fluvial','Outros'];
const FUNCOES=['Servidor SEMA','Consultor','Coordenador','Técnico','Parceiro','Convidado'];

(async()=>{
  const usuario=await carregarUsuario();
  if(!usuario){window.location.href='../index.html';return;}
  if(!PODE.verFinanceiro()){
    document.getElementById('app').innerHTML=
      gerarLayout('Viagens e Diárias','viagens')+
      `<div class="alert alert-danger" style="max-width:500px">🔒 Acesso restrito ao perfil financeiro.</div>`+
      `</div></div></div>`;
    return;
  }

  document.getElementById('app').innerHTML=
    gerarLayout('Viagens e Diárias','viagens')+`
    <div class="fade-in">
      <div class="stat-row" id="stats"></div>
      <div class="filter-bar">
        <input class="form-control" type="text" id="busca" style="width:230px"
          placeholder="Buscar SPD, beneficiário ou destino..." oninput="filtrar()">
        <select class="form-control" id="fil-sit" onchange="filtrar()" style="width:150px">
          <option value="">Todas situações</option>
          ${Object.entries(SIT_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
        </select>
        <div style="display:flex;align-items:center;gap:6px;background:var(--verde-bg);border:1px solid var(--verde-claro);border-radius:var(--raio);padding:4px 10px;font-size:11px;color:var(--verde-medio);font-weight:600">
          📋 Atividade 2.1.7 — Passagens e Diárias
        </div>
        <span id="cont" style="font-size:12px;color:var(--cinza-500);margin-left:auto"></span>
        <button class="btn btn-secondary btn-sm" onclick="exportarCSV()">⬇ CSV</button>
        <button class="btn btn-primary btn-sm" onclick="abrirNovo()">+ Nova viagem</button>
      </div>
      <div id="lista"></div>
    </div>`+`</div></div></div>`;

  await carregar();
})();

async function carregar(){
  try{
    const [{data:viagens},{data:ativs},{data:benefs}]=await Promise.all([
      db.from('viagens_diarias').select(`
        *,
        atividades(id,codigo,nome_pt),
        passagens:viagem_passagens(*),
        diarias:viagem_diarias(*)
      `).order('dt_saida',{ascending:false}),
      db.from('atividades').select('id,codigo,nome_pt').order('codigo'),
      db.from('beneficiarios_viagem').select('*').order('nome')
    ]);
    todasViagens=viagens||[];
    atividades=ativs||[];
    beneficiarios=benefs||[];

    // Preencher filtro atividades
    // Atividade 2.1.7 fixa — sem filtro dinâmico
    if(false){
      const opt=document.createElement('option');
      opt.value=a.id;opt.textContent=`${a.codigo} — ${a.nome_pt?.substring(0,40)}`;
      fil.appendChild(opt);
    });

    renderStats();filtrar();
  }catch(e){
    console.error(e);
    toast('Erro ao carregar viagens.','error');
  }
}

function calcTotal(v){
  const passagens=(v.passagens||[]).reduce((s,p)=>s+parseFloat(p.valor||0),0);
  const diarias=(v.diarias||[]).reduce((s,d)=>s+parseFloat(d.quantidade||0)*parseFloat(d.valor_unitario||0),0);
  return passagens+diarias;
}

function renderStats(){
  const total=todasViagens.length;
  const realizadas=todasViagens.filter(v=>v.situacao==='realizado');
  const aprovadas=todasViagens.filter(v=>v.situacao==='aprovado').length;
  const solicitadas=todasViagens.filter(v=>v.situacao==='solicitado').length;
  const totalGasto=realizadas.reduce((s,v)=>s+calcTotal(v),0);
  const totalPassagens=realizadas.reduce((s,v)=>s+(v.passagens||[]).reduce((ss,p)=>ss+parseFloat(p.valor||0),0),0);
  const totalDiarias=realizadas.reduce((s,v)=>s+(v.diarias||[]).reduce((ss,d)=>ss+parseFloat(d.quantidade||0)*parseFloat(d.valor_unitario||0),0),0);

  document.getElementById('stats').innerHTML=`
    <div class="stat-card sc-b">
      <div class="stat-lbl">Total Viagens</div>
      <div class="stat-val">${total}</div>
      <div class="stat-sub">${realizadas.length} realizadas</div>
    </div>
    <div class="stat-card sc-a">
      <div class="stat-lbl">Aguardando</div>
      <div class="stat-val">${solicitadas}</div>
      <div class="stat-sub">${aprovadas} aprovadas</div>
    </div>
    <div class="stat-card sc-g">
      <div class="stat-lbl">Total Gasto</div>
      <div class="stat-val" style="font-size:15px">${fmtBRL(totalGasto)}</div>
      <div class="stat-sub">viagens realizadas</div>
    </div>
    <div class="stat-card sc-t">
      <div class="stat-lbl">Passagens</div>
      <div class="stat-val" style="font-size:15px">${fmtBRL(totalPassagens)}</div>
      <div class="stat-sub">valor total</div>
    </div>
    <div class="stat-card sc-r">
      <div class="stat-lbl">Diárias</div>
      <div class="stat-val" style="font-size:15px">${fmtBRL(totalDiarias)}</div>
      <div class="stat-sub">valor total</div>
    </div>`;
}

function filtrar(){
  const b=document.getElementById('busca').value.toLowerCase();
  const s=document.getElementById('fil-sit').value;
  const a='44b7a6fc-dab6-49ba-bc1f-9764a99bb9d0'; // fixo 2.1.7

  const fil=todasViagens.filter(v=>{
    if(b&&!(v.numero_spd||'').toLowerCase().includes(b)&&
       !(v.beneficiario_nome||'').toLowerCase().includes(b)&&
       !(v.destino||'').toLowerCase().includes(b))return false;
    if(s&&v.situacao!==s)return false;
    if(a&&v.atividade_id!==a)return false;
    return true;
  });

  document.getElementById('cont').textContent=`${fil.length} de ${todasViagens.length} viagens`;

  const el=document.getElementById('lista');
  if(!fil.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">✈</div><div class="empty-state-msg">Nenhuma viagem encontrada.</div></div>`;
    return;
  }

  el.innerHTML=fil.map(v=>{
    const total=calcTotal(v);
    const passTotal=(v.passagens||[]).reduce((s,p)=>s+parseFloat(p.valor||0),0);
    const diarTotal=(v.diarias||[]).reduce((s,d)=>s+parseFloat(d.quantidade||0)*parseFloat(d.valor_unitario||0),0);
    const numDias=v.dt_retorno&&v.dt_saida?
      Math.ceil((new Date(v.dt_retorno)-new Date(v.dt_saida))/(1000*60*60*24)):0;

    return`<div class="viagem-card ${v.situacao==='cancelado'?'cancelado':''}" onclick="abrirDetalhe('${v.id}')">
      <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
            ${v.numero_spd?`<span class="spd-num">SPD ${v.numero_spd}</span>`:''}
            <span class="sit-badge sb-${v.situacao}">${SIT_LABELS[v.situacao]||v.situacao}</span>
            ${v.atividades?`<span style="font-family:var(--font-mono);font-size:11px;color:var(--cinza-500)">${v.atividades.codigo}</span>`:''}
            ${v.comprovante_url?`<span class="badge" style="background:var(--azul-medio)">📎 Comprovante</span>`:''}
          </div>
          <div class="rota">
            <span>${v.origem||'—'}</span>
            <span class="rota-sep">→</span>
            <span style="font-weight:600">${v.destino||'—'}</span>
          </div>
          <div style="display:flex;gap:10px;margin-top:5px;flex-wrap:wrap">
            ${v.beneficiario_nome?`<span class="beneficiario-tag">👤 ${v.beneficiario_nome}${v.beneficiario_funcao?' · '+v.beneficiario_funcao:''}</span>`:''}
            ${v.dt_saida?`<span style="font-size:11px;color:var(--cinza-500)">📅 ${fmtData(v.dt_saida)}${v.dt_retorno?' → '+fmtData(v.dt_retorno):''}</span>`:''}
            ${numDias>0?`<span style="font-size:11px;color:var(--cinza-500)">${numDias} dia(s)</span>`:''}
          </div>
          ${v.objetivo?`<div style="font-size:11px;color:var(--cinza-600,#4B5563);margin-top:5px;line-height:1.4">${v.objetivo.substring(0,100)}${v.objetivo.length>100?'…':''}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;text-align:right">
          <div style="font-size:18px;font-weight:700;font-family:var(--font-mono);color:var(--cinza-900)">${fmtBRL(total)}</div>
          <div style="font-size:10px;color:var(--cinza-500)">total</div>
          <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();abrirEditar('${v.id}')">✏️</button>
        </div>
      </div>
      <div class="vals-mini" style="border-top:1px solid var(--borda);padding-top:8px">
        <div class="vm-item">
          <div class="vm-lbl">Passagens (${(v.passagens||[]).length})</div>
          <div class="vm-val">${fmtBRL(passTotal)}</div>
        </div>
        <div class="vm-item">
          <div class="vm-lbl">Diárias (${(v.diarias||[]).reduce((s,d)=>s+parseInt(d.quantidade||0),0)} noites)</div>
          <div class="vm-val">${fmtBRL(diarTotal)}</div>
        </div>
        <div class="vm-item">
          <div class="vm-lbl">Total viagem</div>
          <div class="vm-val" style="color:var(--verde-medio)">${fmtBRL(total)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── DETALHE ───────────────────────────────────────────────────
async function abrirDetalhe(id){
  viagemEditando=todasViagens.find(v=>v.id===id);
  if(!viagemEditando)return;
  const v=viagemEditando;
  const total=calcTotal(v);
  const passTotal=(v.passagens||[]).reduce((s,p)=>s+parseFloat(p.valor||0),0);
  const diarTotal=(v.diarias||[]).reduce((s,d)=>s+parseFloat(d.quantidade||0)*parseFloat(d.valor_unitario||0),0);

  document.getElementById('mv-titulo').textContent=`SPD ${v.numero_spd||'—'}`;
  document.getElementById('mv-sub').textContent=`${v.origem||'—'} → ${v.destino||'—'} · ${v.beneficiario_nome||'—'} · ${SIT_LABELS[v.situacao]}`;

  document.getElementById('mv-body').innerHTML=`
    <div class="tab-bar">
      <button class="tab-btn ativo" onclick="aba('resumo',this)">Resumo</button>
      <button class="tab-btn" onclick="aba('passagens',this)">Passagens (${(v.passagens||[]).length})</button>
      <button class="tab-btn" onclick="aba('diarias',this)">Diárias (${(v.diarias||[]).length})</button>
    </div>

    <!-- RESUMO -->
    <div class="tab-content ativo" id="tab-resumo">
      <!-- Totais -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        ${[
          ['Passagens',fmtBRL(passTotal),'var(--azul-medio)'],
          ['Diárias',fmtBRL(diarTotal),'var(--aviso)'],
          ['Total Viagem',fmtBRL(total),'var(--verde-medio)'],
        ].map(([l,val,cor])=>`
          <div style="text-align:center;background:var(--cinza-50);border-radius:var(--raio-lg);padding:14px;border:1px solid var(--borda)">
            <div style="font-size:10px;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">${l}</div>
            <div style="font-size:20px;font-weight:700;font-family:var(--font-mono);color:${cor}">${val}</div>
          </div>`).join('')}
      </div>
      <!-- Informações -->
      <div class="grid-2" style="gap:12px">
        <div>
          ${[
            ['Nº SPD',v.numero_spd],
            ['Situação',`<span class="sit-badge sb-${v.situacao}">${SIT_LABELS[v.situacao]}</span>`],
            ['Atividade',v.atividades?`${v.atividades.codigo} — ${v.atividades.nome_pt?.substring(0,40)}`:null],
            ['Origem',v.origem],['Destino',v.destino],
            ['Data saída',v.dt_saida?fmtData(v.dt_saida):null],
            ['Data retorno',v.dt_retorno?fmtData(v.dt_retorno):null],
          ].map(([l,val])=>val?`
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--borda)">
              <span style="color:var(--cinza-500)">${l}</span>
              <span style="font-weight:500;color:var(--cinza-900)">${val}</span>
            </div>`:'').join('')}
        </div>
        <div>
          ${[
            ['Beneficiário',v.beneficiario_nome],
            ['Função',v.beneficiario_funcao],
            ['CPF',v.beneficiario_cpf],
          ].map(([l,val])=>val?`
            <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--borda)">
              <span style="color:var(--cinza-500)">${l}</span>
              <span style="font-weight:500;color:var(--cinza-900);font-family:${l==='CPF'?'var(--font-mono)':'inherit'}">${val}</span>
            </div>`:'').join('')}
          ${v.objetivo?`<div style="margin-top:10px"><div style="font-size:11px;font-weight:600;color:var(--cinza-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Objetivo</div>
            <div style="font-size:12px;color:var(--cinza-700);line-height:1.5;background:var(--cinza-50);padding:8px 10px;border-radius:var(--raio);border:1px solid var(--borda)">${v.objetivo}</div>
          </div>`:''}
        </div>
      </div>
      ${v.comprovante_url?`<div style="margin-top:14px">
        <button class="btn btn-secondary btn-sm" onclick="abrirComp('${v.comprovante_url}')">📎 Abrir comprovante</button>
      </div>`:''}
      ${v.observacoes?`<div style="margin-top:12px"><div class="alert alert-info" style="font-size:12px">${v.observacoes}</div></div>`:''}
    </div>

    <!-- PASSAGENS -->
    <div class="tab-content" id="tab-passagens">
      ${(v.passagens||[]).length?`
        <table>
          <thead><tr>
            <th>Trecho</th><th>Tipo</th><th>Nº Bilhete</th>
            <th style="width:80px">Data</th><th style="width:110px;text-align:right">Valor</th>
          </tr></thead>
          <tbody>
            ${(v.passagens||[]).map(p=>`<tr>
              <td style="font-size:12px">${p.origem||'—'} → ${p.destino||'—'}</td>
              <td style="font-size:11px">${p.tipo||'—'}</td>
              <td class="mono">${p.numero_bilhete||'—'}</td>
              <td style="font-size:12px">${p.dt_viagem?fmtData(p.dt_viagem):'—'}</td>
              <td style="text-align:right;font-family:var(--font-mono);font-size:12px;font-weight:600">${fmtBRL(p.valor)}</td>
            </tr>`).join('')}
            <tr style="background:var(--cinza-50)">
              <td colspan="4" style="font-size:12px;font-weight:600;text-align:right;padding-right:16px">Total passagens:</td>
              <td style="text-align:right;font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--azul-medio)">${fmtBRL(passTotal)}</td>
            </tr>
          </tbody>
        </table>` :
        `<div class="empty-state"><div class="empty-state-msg">Nenhuma passagem registrada.</div></div>`}
    </div>

    <!-- DIÁRIAS -->
    <div class="tab-content" id="tab-diarias">
      ${(v.diarias||[]).length?`
        <table>
          <thead><tr>
            <th>Tipo de diária</th><th style="width:80px;text-align:right">Qtd.</th>
            <th style="width:110px;text-align:right">Valor unit.</th>
            <th style="width:120px;text-align:right">Subtotal</th>
          </tr></thead>
          <tbody>
            ${(v.diarias||[]).map(d=>`<tr>
              <td style="font-size:12px">${d.tipo_diaria||'Diária'}</td>
              <td style="text-align:right;font-family:var(--font-mono);font-size:12px">${d.quantidade}</td>
              <td style="text-align:right;font-family:var(--font-mono);font-size:12px">${fmtBRL(d.valor_unitario)}</td>
              <td style="text-align:right;font-family:var(--font-mono);font-size:12px;font-weight:600">${fmtBRL(parseFloat(d.quantidade||0)*parseFloat(d.valor_unitario||0))}</td>
            </tr>`).join('')}
            <tr style="background:var(--cinza-50)">
              <td colspan="3" style="font-size:12px;font-weight:600;text-align:right;padding-right:16px">Total diárias:</td>
              <td style="text-align:right;font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--aviso)">${fmtBRL(diarTotal)}</td>
            </tr>
          </tbody>
        </table>` :
        `<div class="empty-state"><div class="empty-state-msg">Nenhuma diária registrada.</div></div>`}
    </div>
  `;

  document.getElementById('mv-footer').innerHTML=`
    <button class="btn btn-secondary" onclick="fecharModal()">Fechar</button>
    <button class="btn btn-primary" onclick="abrirEditar('${v.id}')">✏️ Editar</button>
    ${v.situacao==='solicitado'?`<button class="btn btn-ouro" onclick="avancarSit('${v.id}','aprovado')">✓ Aprovar</button>`:''}
    ${v.situacao==='aprovado'?`<button class="btn btn-primary" onclick="avancarSit('${v.id}','realizado')">✓ Marcar realizada</button>`:''}`;

  document.getElementById('modal-viagem').classList.add('aberto');
}

async function avancarSit(id,sit){
  await db.from('viagens_diarias').update({situacao:sit}).eq('id',id);
  const v=todasViagens.find(x=>x.id===id);
  if(v)v.situacao=sit;
  fecharModal();renderStats();filtrar();
  toast(`Viagem marcada como "${SIT_LABELS[sit]}"!`,'success');
}

    </div>

    <div class="form-group" style="margin:0">
      <label class="form-label" style="font-size:10px">Valor R$ <span class="obrig">*</span></label>

function addPassagem(){
  passagensCount++;
  const idx=passagemIdx++;
  const el=document.createElement('div');
  el.innerHTML=renderPassagemRow(idx,null);
  document.getElementById('passagens-lista').appendChild(el.firstChild||el);
}

function removerPassagem(idx){
  document.getElementById('pass-'+idx)?.remove();

}

function calcTotalPassagens(){

let diariaIdx=0;
function renderDiariaRow(idx,d){
  diariaIdx=Math.max(diariaIdx,idx+1);
  const sub=parseFloat(d?.quantidade||0)*parseFloat(d?.valor_unitario||0);
  return`<div class="diaria-row" id="diar-${idx}">
    <input class="form-control" name="diar-tipo-${idx}" type="text"
      value="${d?.tipo_diaria||'Diária padrão'}" placeholder="Tipo de diária"
      style="height:34px;font-size:12px">
    <input class="form-control" name="diar-qtd-${idx}" type="number" min="0"
      value="${d?.quantidade||1}" style="height:34px;font-size:12px;text-align:right"
      oninput="calcSubDiaria(${idx})">
    <input class="form-control" name="diar-unit-${idx}" type="number" step="0.01"
      value="${d?.valor_unitario||''}" placeholder="0,00"
      style="height:34px;font-size:12px;text-align:right"
      oninput="calcSubDiaria(${idx})">
    <div id="diar-sub-${idx}" style="font-family:var(--font-mono);font-size:12px;font-weight:600;text-align:right;padding:0 4px">${fmtBRL(sub)}</div>
    <button class="btn btn-sm btn-danger btn-icon" onclick="removerDiaria(${idx})" style="padding:4px 6px">✕</button>

function addDiaria(){
  const idx=diariaIdx++;
  const el=document.createElement('div');
  el.innerHTML=renderDiariaRow(idx,null);
  document.getElementById('diarias-lista').appendChild(el.firstChild||el);
}

function removerDiaria(idx){
  document.getElementById('diar-'+idx)?.remove();
  calcTotalDiarias();
}

function calcSubDiaria(idx){
  const qtd=parseFloat(document.querySelector(`[name="diar-qtd-${idx}"]`)?.value||0);
  const unit=parseFloat(document.querySelector(`[name="diar-unit-${idx}"]`)?.value||0);
  const sub=qtd*unit;
  const el=document.getElementById('diar-sub-'+idx);
  if(el)el.textContent=fmtBRL(sub);
  calcTotalDiarias();
}

function calcTotalDiarias(){
  let total=0;
  document.querySelectorAll('[name^="diar-qtd-"]').forEach(q=>{
    const idx=q.name.split('-').pop();
    const qtd=parseFloat(q.value||0);
    const unit=parseFloat(document.querySelector(`[name="diar-unit-${idx}"]`)?.value||0);
    total+=qtd*unit;
  });
  const el=document.getElementById('total-diarias');
  if(el)el.textContent=fmtBRL(total);
}

function selecionarCompViagem(file){
  if(!file)return;
  arquivoComp=file;
  const el=document.getElementById('upload-comp-v');
  if(el){el.classList.add('tem');el.textContent=`✓ ${file.name}`;}
}

async function abrirComp(url){
  try{
    const urlObj=new URL(url);
    const match=urlObj.pathname.match(/\/object\/public\/tdrs-arquivos\/(.+)/);
    if(match){
      const{data,error}=await db.storage.from('tdrs-arquivos').createSignedUrl(match[1],3600);
      if(!error&&data?.signedUrl){window.open(data.signedUrl,'_blank');return;}
    }
    window.open(url,'_blank');
  }catch(e){window.open(url,'_blank');}
}

async function salvar(){
  const spd=document.getElementById('f-spd').value.trim();
  const obj=document.getElementById('f-obj').value.trim();
  const orig=document.getElementById('f-orig').value.trim();
  const dest=document.getElementById('f-dest').value.trim();
  const benNome=document.getElementById('f-ben-nome').value.trim();
  if(!spd||!obj||!orig||!dest||!benNome){
    toast('Preencha SPD, objetivo, rota e beneficiário.','error');return;
  }

  const dados={
    numero_spd:spd,
    situacao:document.getElementById('f-sit').value,
    atividade_id:document.getElementById('f-ativ').value||null,
    objetivo:obj,
    origem:orig,destino:dest,
    dt_saida:document.getElementById('f-saida').value||null,
    dt_retorno:document.getElementById('f-retorno').value||null,
    beneficiario_nome:benNome,
    beneficiario_funcao:document.getElementById('f-ben-func').value.trim()||null,
    beneficiario_cpf:document.getElementById('f-ben-cpf').value.trim()||null,
    observacoes:document.getElementById('f-obs').value.trim()||null,
    criado_por:appState.usuario.id,
  };

  // Coletar passagens
  const passagens=[];
  document.querySelectorAll('[name^="pass-orig-"]').forEach(el=>{
    const idx=el.name.split('-').pop();
    const val=parseFloat(document.querySelector(`[name="pass-val-${idx}"]`)?.value||0);
    if(val>0)passagens.push({
      origem:el.value||null,
      destino:document.querySelector(`[name="pass-dest-${idx}"]`)?.value||null,
      tipo:document.querySelector(`[name="pass-tipo-${idx}"]`)?.value||null,
      numero_bilhete:document.querySelector(`[name="pass-bil-${idx}"]`)?.value||null,
      dt_viagem:document.querySelector(`[name="pass-dt-${idx}"]`)?.value||null,
      valor:val,
    });
  });

  // Coletar diárias
  const diarias=[];
  document.querySelectorAll('[name^="diar-qtd-"]').forEach(el=>{
    const idx=el.name.split('-').pop();
    const qtd=parseFloat(el.value||0);
    const unit=parseFloat(document.querySelector(`[name="diar-unit-${idx}"]`)?.value||0);
    if(qtd>0&&unit>0)diarias.push({
      tipo_diaria:document.querySelector(`[name="diar-tipo-${idx}"]`)?.value||'Diária',
      quantidade:qtd,valor_unitario:unit,
    });
  });

  try{
    let id=viagemEditando?.id;
    if(!viagemEditando){
      const{data,error}=await db.from('viagens_diarias').insert(dados).select().single();
      if(error)throw error;
      id=data.id;
      data.passagens=[];data.diarias=[];data.atividades=atividades.find(a=>a.id===dados.atividade_id)||null;
      todasViagens.unshift(data);
      toast(`Viagem SPD ${spd} registrada!`,'success');
    }else{
      const{error}=await db.from('viagens_diarias').update(dados).eq('id',id);
      if(error)throw error;
      Object.assign(viagemEditando,dados);
      toast('Viagem atualizada!','success');
    }

    // Salvar passagens
    if(id&&passagens.length){
      await db.from('viagem_passagens').delete().eq('viagem_id',id);
      await db.from('viagem_passagens').insert(passagens.map(p=>({...p,viagem_id:id})));
      const v=todasViagens.find(x=>x.id===id);
      if(v)v.passagens=passagens;
    }

    // Salvar diárias
    if(id&&diarias.length){
      await db.from('viagem_diarias').delete().eq('viagem_id',id);
      await db.from('viagem_diarias').insert(diarias.map(d=>({...d,viagem_id:id})));
      const v=todasViagens.find(x=>x.id===id);
      if(v)v.diarias=diarias;
    }

    // Upload comprovante
    if(arquivoComp&&id){
      const ext=arquivoComp.name.split('.').pop();
      const path=`viagem-${id}-comprovante.${ext}`;
      const{error:upErr}=await db.storage.from('tdrs-arquivos').upload(path,arquivoComp,{upsert:true});
      if(!upErr){
        const{data:urlData}=db.storage.from('tdrs-arquivos').getPublicUrl(path);
        await db.from('viagens_diarias').update({
          comprovante_url:urlData.publicUrl,comprovante_nome:arquivoComp.name
        }).eq('id',id);
        const v=todasViagens.find(x=>x.id===id);
        if(v){v.comprovante_url=urlData.publicUrl;v.comprovante_nome=arquivoComp.name;}
      }
    }

    fecharModal();renderStats();filtrar();
  }catch(e){toast('Erro ao salvar: '+(e.message||e),'error');}
}

async function cancelarViagem(id){
  if(!confirm('Cancelar esta viagem?'))return;
  await db.from('viagens_diarias').update({situacao:'cancelado'}).eq('id',id);
  const v=todasViagens.find(x=>x.id===id);if(v)v.situacao='cancelado';
  fecharModal();renderStats();filtrar();
  toast('Viagem cancelada.','info');
}

function exportarCSV(){
  const headers=['SPD','Beneficiário','Função','Origem','Destino','Saída','Retorno','Objetivo','Passagens R$','Diárias R$','Total R$','Situação','Atividade'];
  const rows=todasViagens.map(v=>{
    const passTotal=(v.passagens||[]).reduce((s,p)=>s+parseFloat(p.valor||0),0);
    const diarTotal=(v.diarias||[]).reduce((s,d)=>s+parseFloat(d.quantidade||0)*parseFloat(d.valor_unitario||0),0);
    return[
      v.numero_spd||'',
      `"${(v.beneficiario_nome||'').replace(/"/g,'""')}"`,
      v.beneficiario_funcao||'',
      v.origem||'',v.destino||'',
      v.dt_saida||'',v.dt_retorno||'',
      `"${(v.objetivo||'').replace(/"/g,'""')}"`,
      passTotal.toFixed(2).replace('.',','),
      diarTotal.toFixed(2).replace('.',','),
      (passTotal+diarTotal).toFixed(2).replace('.',','),
      SIT_LABELS[v.situacao]||v.situacao,
      v.atividades?.codigo||''
    ];
  });
  const csv=[headers.join(';'),...rows.map(r=>r.join(';'))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`viagens-dima-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();URL.revokeObjectURL(url);
  toast('CSV exportado!','success');
}

function aba(id,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('ativo'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('ativo'));
  document.getElementById('tab-'+id)?.classList.add('ativo');btn.classList.add('ativo');
}

function fecharModal(){
  document.getElementById('modal-viagem').classList.remove('aberto');
  viagemEditando=null;arquivoComp=null;
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')fecharModal();});
</script>
